<!DOCTYPE html>

            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #submit-btn {
            background-color: #2ecc71;
            width: 100%;
            font-size: 18px;
            padding: 15px;
            margin-top: 20px;
        }
        #submit-btn:hover {
            background-color: #27ae60;
        }
        .question-card {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #34495e;
        }
        .options-list {
            list-style: none;
            padding: 0;
        }
        .options-list li {
            margin-bottom: 10px;
        }
        .options-list label {
            display: flex;
            align-items: center;
            background: #ecf0f1;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .options-list label:hover {
            background: #dfe6e9;
        }
        .options-list input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }
        .correct {
            background-color: #d4edda !important;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        #result-container {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>हरियाणा करंट अफेयर्स (सितंबर 2025)</h1>
    <div class="controls">
        <button onclick="initQuiz()">प्रश्नों को शफल (Shuffle) करें</button>
        <span id="score-display" style="font-size: 18px; font-weight: bold; margin-top: 10px;"></span>
    </div>
    
    <div id="quiz-container"></div>
    
    <button id="submit-btn" onclick="checkAnswers()">क्विज़ सबमिट करें</button>
    <div id="result-container"></div>
</div>

    // शफल अल्गोरिथम (Fisher-Yates)
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let currentQuizData = [];

    function initQuiz() {
        // रिजल्ट छुपाएं
        document.getElementById('result-container').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('score-display').innerText = '';
        
        // प्रश्न और उनके विकल्पों को शफल करें
        currentQuizData = JSON.parse(JSON.stringify(quizData));
        shuffleArray(currentQuizData);
        
        currentQuizData.forEach(item => {
            shuffleArray(item.options);
        });

        const quizContainer = document.getElementById('quiz-container');
        quizContainer.innerHTML = ''; // पुराना डेटा साफ करें

        currentQuizData.forEach((item, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-card';
            questionDiv.id = `q-card-${index}`;

            const questionTitle = document.createElement('div');
            questionTitle.className = 'question-text';
            questionTitle.innerText = `${index + 1}. ${item.q}`;
            questionDiv.appendChild(questionTitle);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optIndex) => {
                const li = document.createElement('li');
                const label = document.createElement('label');
                label.id = `label-${index}-${optIndex}`;
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question${index}`;
                radio.value = option;
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(option));
                li.appendChild(label);
                optionsList.appendChild(li);
            });

            questionDiv.appendChild(optionsList);
            quizContainer.appendChild(questionDiv);
        });
    }

    function checkAnswers() {
        let score = 0;

        currentQuizData.forEach((item, index) => {
            const selectedOption = document.querySelector(`input[name="question${index}"]:checked`);
            const options = document.getElementsByName(`question${index}`);

            options.forEach((opt, optIndex) => {
                const label = document.getElementById(`label-${index}-${optIndex}`);
                // सही उत्तर को हरा करें
                if (opt.value === item.answer) {
                    label.classList.add('correct');
                }
                // अगर गलत चुना है तो उसे लाल करें
                if (opt.checked && opt.value !== item.answer) {
                    label.classList.add('incorrect');
                }
                
                // इनपुट को डिसेबल करें ताकि दोबारा क्लिक न हो सके
                opt.disabled = true;
            });

            if (selectedOption && selectedOption.value === item.answer) {
                score++;
            }
        });

        // परिणाम दिखाएं
        const resultContainer = document.getElementById('result-container');
        resultContainer.innerHTML = `आपका स्कोर: <span style="color:#2ecc71">${score}</span> / 40`;
        resultContainer.style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';
        
        // टॉप पर स्कोर भी अपडेट करें
        document.getElementById('score-display').innerText = `स्कोर: ${score} / 40`;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // पेज लोड होने पर पहली बार क्विज़ बनाएं
    window.onload = initQuiz;
</script>

</body>
</html>
