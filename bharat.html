<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography Notes Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .question {
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .options {
            list-style-type: none;
            padding: 0;
        }
        .options li {
            background: #e9ecef;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .options li:hover {
            background: #d4d8dd;
        }
        .options li.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .options li.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .options li.disabled {
            pointer-events: none;
        }
        .btn {
            display: none;
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #2980b9;
        }
        .score-box {
            text-align: center;
            display: none;
        }
        .score-text {
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz">
        <h2>भूगोल रिवीजन टेस्ट 🌍</h2>
        <div class="question" id="question">प्रश्न यहाँ आएगा</div>
        <ul class="options" id="options">
            </ul>
        <button class="btn" id="next-btn" onclick="nextQuestion()">अगला प्रश्न</button>
    </div>
    
    <div class="score-box" id="score-box">
        <h2>क्विज़ समाप्त! 🎉</h2>
        <p class="score-text">आपका स्कोर: <span id="score">0</span> / 20</p>
        <button class="btn" style="display: block;" onclick="location.reload()">फिर से खेलें</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "मध्य प्रदेश की सीमा इनमें से किस राज्य से लगती है?", options: ["बिहार", "गुजरात", "पंजाब", "केरल"], ans: 1 },
        { q: "पश्चिम बंगाल की सीमा इनमें से किस देश के साथ नहीं लगती है?", options: ["बांग्लादेश", "नेपाल", "म्यांमार", "भूटान"], ans: 2 },
        { q: "पश्चिम बंगाल कितने भारतीय राज्यों के साथ अपनी सीमा साझा करता है?", options: ["3", "4", "5", "6"], ans: 2 },
        { q: "बंगाल की खाड़ी भारत की किस दिशा में स्थित है?", options: ["उत्तर", "दक्षिण", "पूर्व", "पश्चिम"], ans: 2 },
        { q: "भारत के पश्चिम दिशा में इनमें से क्या स्थित है?", options: ["अरब सागर", "बंगाल की खाड़ी", "हिन्द महासागर", "प्रशांत महासागर"], ans: 0 },
        { q: "भारत के दक्षिण में कौन सा महासागर स्थित है?", options: ["प्रशांत महासागर", "हिन्द महासागर", "अटलांटिक महासागर", "आर्कटिक महासागर"], ans: 1 },
        { q: "भारत का कौन सा राज्य सबसे अधिक अन्य राज्यों के साथ सीमा बनाता है?", options: ["मध्य प्रदेश", "असम", "उत्तर प्रदेश", "महाराष्ट्र"], ans: 2 },
        { q: "उत्तर प्रदेश कुल कितने राज्यों के साथ अपनी सीमा साझा करता है?", options: ["7", "8", "9", "6"], ans: 1 },
        { q: "'पृथ्वी का वर्णन करना' क्या कहलाता है?", options: ["इतिहास", "पर्यावरण", "भूगोल", "खगोल विज्ञान"], ans: 2 },
        { q: "'India' शब्द की उत्पत्ति किस भाषा से मानी जाती है?", options: ["लैटिन (Latin)", "अरबी (Arabic)", "फारसी (Persian)", "ग्रीक (Greek)"], ans: 3 },
        { q: "इनमें से कौन सा नाम भारत का प्राचीन नाम नहीं है?", options: ["आर्यावर्त", "जम्बूद्वीप", "निप्पॉन", "हिन्दुस्तान"], ans: 2 },
        { q: "भारत को 'जम्बूद्वीप' किस ऐतिहासिक काल में कहा गया था?", options: ["वैदिक काल", "बौद्ध काल", "मौर्य काल", "गुप्त काल"], ans: 1 },
        { q: "भारत का भौगोलिक आकार (Shape) कैसा है?", options: ["त्रिभुजाकार", "गोलाकार", "आयताकार", "चतुष्कोणीय"], ans: 3 },
        { q: "भारत में वर्तमान में कुल कितने केंद्रशासित प्रदेश हैं?", options: ["7", "8", "9", "10"], ans: 1 },
        { q: "भारत में वर्तमान में कुल कितने राज्य हैं?", options: ["27", "28", "29", "30"], ans: 1 },
        { q: "भारत का कुल क्षेत्रफल (Area) कितना है?", options: ["32,87,263 वर्ग किमी", "31,87,263 वर्ग किमी", "32,87,200 वर्ग किमी", "33,87,263 वर्ग किमी"], ans: 0 },
        { q: "भारत का क्षेत्रफल पृथ्वी के कुल क्षेत्रफल का कितना प्रतिशत है?", options: ["2.2%", "2.4%", "2.8%", "3.2%"], ans: 1 },
        { q: "क्षेत्रफल की दृष्टि से भारत विश्व का कौन सा सबसे बड़ा देश है?", options: ["5वां", "6ठा", "7वां", "8वां"], ans: 2 },
        { q: "कर्क रेखा (Tropic of Cancer) का अक्षांशीय मान क्या है?", options: ["23½° दक्षिणी अक्षांश", "23½° उत्तरी अक्षांश", "0° अक्षांश", "66½° उत्तरी अक्षांश"], ans: 1 },
        { q: "भूमध्य रेखा (Equator/0° रेखा) को अन्य किस नाम से जाना जाता है?", options: ["मकर रेखा", "विषुवत रेखा", "कर्क रेखा", "अक्षांश रेखा"], ans: 1 }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const quizDiv = document.getElementById("quiz");
    const scoreBox = document.getElementById("score-box");
    const scoreEl = document.getElementById("score");

    function loadQuestion() {
        nextBtn.style.display = "none";
        optionsEl.innerHTML = "";
        
        const currentQuizData = quizData[currentQuestion];
        questionEl.innerText = `Q${currentQuestion + 1}. ${currentQuizData.q}`;

        currentQuizData.options.forEach((option, index) => {
            const li = document.createElement("li");
            li.innerText = option;
            li.onclick = () => selectAnswer(li, index, currentQuizData.ans);
            optionsEl.appendChild(li);
        });
    }

    function selectAnswer(li, selectedIndex, correctIndex) {
        const allOptions = optionsEl.children;
        for(let i=0; i<allOptions.length; i++) {
            allOptions[i].classList.add("disabled");
            if(i === correctIndex) {
                allOptions[i].classList.add("correct");
            }
        }
        
        if(selectedIndex === correctIndex) {
            score++;
        } else {
            li.classList.add("incorrect");
        }
        
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestion++;
        if(currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            quizDiv.style.display = "none";
            scoreBox.style.display = "block";
            scoreEl.innerText = score;
        }
    }

    // Initialize
    loadQuestion();
</script>

</body>
</html>
