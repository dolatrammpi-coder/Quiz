<body>

</div>

<div class="container" id="result-screen">

</div>

        { org: "जीवाणु प्रौद्योगिकी संस्थान", place: "चंडीगढ़" },
        { org: "भारतीय वन्यजीव संस्थान", place: "देहरादून" },
        { org: "केंद्रीय खाद्य प्रौद्योगिकी अनुसंधान संस्थान", place: "मैसूर (कर्नाटक)" },
        { org: "केंद्रीय शुष्क क्षेत्र अनुसंधान संस्थान", place: "जोधपुर" },
        { org: "भारतीय तंबाकू बोर्ड", place: "राजमुंदरी" },
        { org: "केंद्रीय खनन एवं ईंधन अनुसंधान संस्थान", place: "धनबाद" },
        { org: "भारतीय भूवैज्ञानिक सर्वेक्षण", place: "कोलकाता" },
        { org: "केंद्रीय समुद्री मत्स्य अनुसंधान संस्थान", place: "कोच्चि (केरल)" },
        { org: "राष्ट्रीय महासागर प्रौद्योगिकी संस्थान", place: "चेन्नई" },
        { org: "प्लाज्मा अनुसंधान संस्थान", place: "गांधीनगर (गुजरात)" }
    ];

    let currentMode = '';
    let quizData = [];
    let userAnswers = [];
    let currentQuestionIndex = 0;
    let score = 0;

    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startQuiz(mode) {
        currentMode = mode;
        
        // Prepare Quiz Data specific to mode with pre-generated options
        let shuffledData = shuffleArray(data);
        quizData = shuffledData.map(item => {
            let qText, correctAns, allOptionsPool;
            if (mode === 'orgToPlace') {
                qText = item.org + " कहाँ स्थित है?";
                correctAns = item.place;
                allOptionsPool = [...new Set(data.map(d => d.place))];
            } else {
                qText = item.place + " में कौन सा संस्थान स्थित है?";
                correctAns = item.org;
                allOptionsPool = [...new Set(data.map(d => d.org))];
            }
            
            let options = [correctAns];
            allOptionsPool = shuffleArray(allOptionsPool.filter(opt => opt !== correctAns));
            for (let i = 0; i < 3 && i < allOptionsPool.length; i++) {
                options.push(allOptionsPool[i]);
            }
            return { questionText: qText, correctAnswer: correctAns, options: shuffleArray(options) };
        });

        userAnswers = new Array(quizData.length).fill(null);
        currentQuestionIndex = 0;
        score = 0;
        
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('total-q').innerText = quizData.length;
        
        buildProgressBar();
        loadQuestion(0);
    }

    function buildProgressBar() {
        const grid = document.getElementById('progress-grid');
        grid.innerHTML = '';
        for(let i = 0; i < quizData.length; i++) {
            const item = document.createElement('div');
            item.className = 'prog-item';
            item.innerText = i + 1;
            item.id = 'prog-' + i;
            item.onclick = () => loadQuestion(i);
            grid.appendChild(item);
        }
    }

    function updateProgressBarUI() {
        for(let i = 0; i < quizData.length; i++) {
            const item = document.getElementById('prog-' + i);
            item.classList.remove('active');
            
            if (i === currentQuestionIndex) {
                item.classList.add('active');
            }
            
            if (userAnswers[i]) {
                if (userAnswers[i].isCorrect) {
                    item.classList.add('ans-correct');
                    item.classList.remove('ans-wrong');
                } else {
                    item.classList.add('ans-wrong');
                    item.classList.remove('ans-correct');
                }
            }
        }
    }

    function loadQuestion(index) {
        currentQuestionIndex = index;
        document.getElementById('q-num').innerText = currentQuestionIndex + 1;
        document.getElementById('score').innerText = score;
        
        const qData = quizData[currentQuestionIndex];
        document.getElementById('question').innerText = qData.questionText;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        const savedAnswer = userAnswers[currentQuestionIndex];

        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            
            if (savedAnswer) {
                btn.disabled = true;
                if (opt === qData.correctAnswer) {
                    btn.classList.add('correct');
                } else if (opt === savedAnswer.selected) {
                    btn.classList.add('wrong');
                }
            } else {
                btn.onclick = () => checkAnswer(btn, opt, qData.correctAnswer, qData.questionText);
            }
            optionsContainer.appendChild(btn);
        });

        // Navigation Buttons Logic
        document.getElementById('prev-btn').disabled = (currentQuestionIndex === 0);
        
        const allAnswered = userAnswers.every(ans => ans !== null);
        if (allAnswered || currentQuestionIndex === quizData.length - 1) {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
        } else {
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none';
        }

        updateProgressBarUI();
    }

    function checkAnswer(selectedBtn, selectedOpt, correctOpt, qText) {
        const isCorrect = (selectedOpt === correctOpt);
        
        userAnswers[currentQuestionIndex] = {
            question: qText,
            selected: selectedOpt,
            correct: correctOpt,
            isCorrect: isCorrect
        };

        if (isCorrect) score++;

        // Reload to show colors and lock options
        loadQuestion(currentQuestionIndex);
        
        // Auto navigate to next unanswered question (optional)
        setTimeout(() => {
            let nextUnanswered = userAnswers.indexOf(null);
            if (nextUnanswered !== -1) {
                loadQuestion(nextUnanswered);
            }
        }, 800);
    }

    function navigateQuestion(step) {
        let newIndex = currentQuestionIndex + step;
        if (newIndex >= 0 && newIndex < quizData.length) {
            loadQuestion(newIndex);
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        document.getElementById('final-total').innerText = quizData.length;

        generateSummary();
    }

    function generateSummary() {
        const section = document.getElementById('summary-section');
        let correctHTML = '<div class="summary-box correct-box"><h3>✔ Sahi Jawab</h3>';
        let wrongHTML = '<div class="summary-box wrong-box"><h3>✖ Galat ya Chhute hue Jawab</h3>';
        
        let correctCount = 0;
        let wrongCount = 0;

        quizData.forEach((qData, i) => {
            const ans = userAnswers[i];
            if (ans && ans.isCorrect) {
                correctCount++;
                correctHTML += `
                    <div class="summary-item">
                        <div class="s-q">Q${i+1}: ${qData.questionText}</div>
                        <div class="s-c">Answer: ${qData.correctAnswer}</div>
                    </div>`;
            } else {
                wrongCount++;
                let userChoice = ans ? ans.selected : "Not Attempted";
                wrongHTML += `
                    <div class="summary-item">
                        <div class="s-q">Q${i+1}: ${qData.questionText}</div>
                        <div class="s-a">Aapka Jawab: ${userChoice}</div>
                        <div class="s-c">Sahi Jawab: ${qData.correctAnswer}</div>
                    </div>`;
            }
        });

        if (correctCount === 0) correctHTML += "<p>Koi sahi jawab nahi.</p>";
        if (wrongCount === 0) wrongHTML += "<p>Aapne sabhi sahi jawab diye!</p>";

        correctHTML += '</div>';
        wrongHTML += '</div>';

        section.innerHTML = correctHTML + wrongHTML;
    }

    function goHome() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }
</script>

</body>
</html>
