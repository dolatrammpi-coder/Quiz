            answer: "मुंशी प्रेमचंद"
        },
        {
            question: "हाल ही में किस राज्य/UT में भारत का पहला 'डार्क स्काई रिजर्व' (Dark Sky Reserve) स्थापित किया गया है?",
            options: ["लद्दाख", "हिमाचल प्रदेश", "उत्तराखंड", "सिक्किम", "जम्मू-कश्मीर", "अरुणाचल प्रदेश"],
            answer: "लद्दाख"
        },
        {
            question: "भारत के वर्तमान (2024) मुख्य चुनाव आयुक्त कौन हैं?",
            options: ["राजीव कुमार", "सुशील चंद्रा", "सुनील अरोड़ा", "ओम प्रकाश रावत", "सुकुमार सेन", "टी.एन. शेषन"],
            answer: "राजीव कुमार"
        },
        {
            question: "G20 शिखर सम्मेलन 2024 की मेजबानी किस देश ने की है?",
            options: ["भारत", "ब्राजील", "इटली", "इंडोनेशिया", "जापान", "दक्षिण अफ्रीका"],
            answer: "ब्राजील"
        }
    ];

    let questions = [];
    let currentQuestionIndex = 0;
    let userAnswers = {}; 
    let isCurrentAnswered = false;

    // शफल फंक्शन
    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function initQuiz() {
        if(originalQuestions.length === 0) {
            document.getElementById('question-text').innerText = "कृपया 'originalQuestions' एरे में प्रश्न जोड़ें।";
            return;
        }
        
        // प्रश्नों को शफल करें
        questions = shuffleArray(originalQuestions);
        
        // 6 विकल्पों में से 4 को रैंडमली चुनें (जिसमें 1 सही और 3 गलत हों)
        questions.forEach(q => {
            // सही उत्तर को हटाकर बाकी 5 गलत विकल्पों का ऐरे बनाएँ
            let distractors = q.options.filter(opt => opt !== q.answer);
            // 5 गलत विकल्पों को शफल करें
            distractors = shuffleArray(distractors);
            // सही उत्तर और शुरू के 3 शफल्ड गलत विकल्पों को मिलाएँ
            let selectedOptions = [q.answer, distractors[0], distractors[1], distractors[2]];
            // इन 4 विकल्पों को फिर से शफल कर दें ताकि सही उत्तर हमेशा एक ही जगह न रहे
            q.displayOptions = shuffleArray(selectedOptions);
        });
        
        document.getElementById('total-q-num').innerText = questions.length;
        renderQuestion();
        renderPagination();
    }

    function renderQuestion() {
        isCurrentAnswered = !!userAnswers[currentQuestionIndex];
        const qText = document.getElementById('question-text');
        const optionsList = document.getElementById('options-list');
        const resultText = document.getElementById('result-text');
        const qData = questions[currentQuestionIndex];

        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
        qText.innerText = `${currentQuestionIndex + 1}. ${qData.question}`;
        optionsList.innerHTML = '';
        resultText.innerText = '';

        // केवल 4 रैंडम विकल्प (displayOptions) दिखाएँगे
        qData.displayOptions.forEach((opt) => {
            const li = document.createElement('li');
            li.innerText = opt;
            
            if (!isCurrentAnswered) {
                li.onclick = () => selectOption(opt, li);
            } else {
                li.classList.add('disabled');
                if (opt === qData.answer) {
                    li.classList.add('correct');
                } else if (userAnswers[currentQuestionIndex] === opt && opt !== qData.answer) {
                    li.classList.add('wrong');
                }
            }
            optionsList.appendChild(li);
        });

        updateButtons();
        updatePaginationHighlight();
    }

    function selectOption(selectedOpt, liElement) {
        if (isCurrentAnswered) return;
        isCurrentAnswered = true;
        
        userAnswers[currentQuestionIndex] = selectedOpt;
        const correctAns = questions[currentQuestionIndex].answer;
        const allLis = document.getElementById('options-list').querySelectorAll('li');
        const resultText = document.getElementById('result-text');

        allLis.forEach(li => {
            li.classList.add('disabled');
            li.onclick = null;
            if (li.innerText === correctAns) {
                li.classList.add('correct');
            }
            if (li.innerText === selectedOpt && selectedOpt !== correctAns) {
                li.classList.add('wrong');
            }
        });

        if (selectedOpt === correctAns) {
            resultText.innerText = "✅ सही उत्तर!";
            resultText.style.color = "green";
        } else {
            resultText.innerText = "❌ गलत उत्तर!";
            resultText.style.color = "red";
        }
        
        updatePaginationHighlight();
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    function renderPagination() {
        const container = document.getElementById('pagination-container');
        container.innerHTML = '';

        questions.forEach((_, index) => {
            const div = document.createElement('div');
            div.className = 'page-num';
            div.id = `page-${index}`;
            div.innerText = index + 1;
            div.onclick = () => {
                currentQuestionIndex = index;
                renderQuestion();
            };
            container.appendChild(div);
        });
        updatePaginationHighlight();
    }

    function updatePaginationHighlight() {
        const pages = document.querySelectorAll('.page-num');
        pages.forEach((page, index) => {
            page.classList.remove('active', 'answered-correct', 'answered-wrong');
            
            if (index === currentQuestionIndex) {
                page.classList.add('active');
                page.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            if (userAnswers[index]) {
                if (userAnswers[index] === questions[index].answer) {
                    page.classList.add('answered-correct');
                } else {
                    page.classList.add('answered-wrong');
                }
            }
        });
    }

    function updateButtons() {
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        document.getElementById('next-btn').disabled = currentQuestionIndex === questions.length - 1;
    }

    function showSummary() {
        document.getElementById('quiz-main-container').style.display = 'none';
        const summaryContainer = document.getElementById('summary-container');
        summaryContainer.style.display = 'block';
        
        let score = 0;
        let summaryHTML = `<div class="header"><h2>टेस्ट का परिणाम (Summary)</h2></div>`;
        
        let listHTML = '';
        questions.forEach((q, index) => {
            const userAns = userAnswers[index];
            const isCorrect = userAns === q.answer;
            let itemClass = 'summary-unattempted';
            
            if (userAns) {
                if (isCorrect) {
                    score++;
                    itemClass = 'summary-correct';
                } else {
                    itemClass = 'summary-wrong';
                }
            }

            listHTML += `
                <div class="summary-item ${itemClass}">
                    <p><strong>प्रश्न ${index + 1}:</strong> ${q.question}</p>
                    <p style="color: ${!userAns ? '#856404' : (isCorrect ? '#155724' : '#721c24')}">
                        <strong>आपका उत्तर:</strong> ${userAns || 'कोई उत्तर नहीं दिया (Unattempted)'}
                    </p>
                    ${!isCorrect ? `<p style="color: #155724;"><strong>सही उत्तर:</strong> ${q.answer}</p>` : ''}
                </div>
            `;
        });
        
        summaryHTML += `<div class="score-board">आपका स्कोर: <span style="color:#007bff">${score}</span> / ${questions.length}</div>`;
        summaryHTML += listHTML;
        summaryHTML += `<button class="submit-btn" onclick="location.reload()" style="margin-top:20px;">फिर से टेस्ट दें (Restart)</button>`;
        
        summaryContainer.innerHTML = summaryHTML;
        window.scrollTo(0, 0); 
    }

    window.onload = initQuiz;

</script>

</body>
