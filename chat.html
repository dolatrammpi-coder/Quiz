<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Network - Live Call</title>
    
    <!-- CryptoJS for AES-256 Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Paho MQTT for Untraceable Routing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 450px; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        input[type="password"], input[type="text"] { padding: 10px; width: 80%; margin-bottom: 15px; border: 1px solid #333; border-radius: 4px; background: #2c2c2c; color: white; }
        button { padding: 10px 15px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        
        /* Specific Buttons */
        .btn-primary { background-color: #bb86fc; color: #121212; }
        .btn-green { background-color: #03dac6; color: #121212; width: 48%; }
        .btn-red { background-color: #cf6679; color: #121212; width: 48%; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        #login-screen { display: block; }
        #chat-screen { display: none; }
        
        #chat-box { height: 220px; border: 1px solid #333; border-radius: 4px; padding: 10px; overflow-y: auto; margin-bottom: 15px; background-color: #121212; text-align: left; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 4px; background-color: #333; word-wrap: break-word; font-size: 14px; }
        
        .call-controls { display: flex; justify-content: space-between; margin-top: 15px; }
        #status { font-size: 14px; color: #03dac6; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Access Screen -->
    <div class="container" id="login-screen">
        <h3>Ghost Network (Encrypted)</h3>
        <p style="font-size: 12px; color: #aaa;">Access requires the 15-word key</p>
        <input type="password" id="pwdInput" placeholder="Enter passphrase...">
        <br>
        <button class="btn-primary" onclick="startConnection()">Open Secure Tunnel</button>
    </div>

    <!-- Main Communication Screen -->
    <div class="container" id="chat-screen">
        <div id="status">Connecting to Ghost Relay...</div>
        
        <div id="chat-box"></div>
        
        <div style="display: flex;">
            <input type="text" id="msgInput" placeholder="Secret text..." style="flex: 1; border-radius: 4px 0 0 4px; margin-bottom: 0; width: auto;">
            <button class="btn-primary" onclick="sendTextMessage()" style="border-radius: 0 4px 4px 0;">Send</button>
        </div>

        <!-- Live Call Buttons -->
        <div class="call-controls">
            <button id="callBtn" class="btn-green" onclick="startCall()">📞 Start Live Call</button>
            <button id="answerBtn" class="btn-green" onclick="answerCall()" style="display:none;">📲 Answer Call</button>
            <button id="hangupBtn" class="btn-red" onclick="hangup()" disabled>❌ End Call</button>
        </div>

        <!-- Visible Audio Player to Bypass Browser Auto-play Policy -->
        <audio id="remoteAudio" autoplay controls style="width: 100%; margin-top: 15px; height: 35px;"></audio>
    </div>

    <script>
        const SECRET_PASSWORD = "quantum velocity phantom eclipse nebula horizon paradox cipher matrix catalyst zenith vortex bastion enigma cobalt"; 
        
        // UNIQUE ID: Taki hume khud ki aawaz aur data wapas na mile
        const myUserId = "user_" + Math.random().toString(36).substr(2, 9); 
        
        let mqttClient;
        let chatTopic;
        
        // WebRTC Variables
        let peerConnection;
        let localStream;
        let pendingCandidates = []; 

        // Powerful STUN/TURN Servers (Bypasses Jio/Airtel Strict Firewalls)
        const iceConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ] 
        };

        function startConnection() {
            const enteredPwd = document.getElementById('pwdInput').value.trim();
            if (enteredPwd === SECRET_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
                
                // Room Name is also hidden via SHA256 Hash
                chatTopic = "ghost_live/" + CryptoJS.SHA256(SECRET_PASSWORD).toString().substring(0, 20);
                connectMQTT();
            } else {
                alert("Incorrect Passphrase!");
            }
        }

        // ================= AES ENCRYPTED SIGNALING VIA MQTT =================
        function connectMQTT() {
            mqttClient = new Paho.MQTT.Client("broker.emqx.io", 8084, myUserId);
            mqttClient.onMessageArrived = onMessageArrived;
            mqttClient.connect({
                useSSL: true,
                onSuccess: () => {
                    document.getElementById('status').innerText = "Encrypted Tunnel Active 🔒";
                    mqttClient.subscribe(chatTopic);
                }
            });
        }

        function sendData(payloadObj) {
            payloadObj.senderId = myUserId; // Add ID to avoid echo
            const jsonStr = JSON.stringify(payloadObj);
            
            // Encrypt the entire package
            const encrypted = CryptoJS.AES.encrypt(jsonStr, SECRET_PASSWORD).toString();
            const message = new Paho.MQTT.Message(encrypted);
            message.destinationName = chatTopic;
            mqttClient.send(message);
        }

        function sendTextMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                sendData({ type: 'text', content: input.value.trim() });
                displayMessage(`💬 You: ${input.value.trim()}`);
                input.value = "";
            }
        }

        function onMessageArrived(message) {
            try {
                // Decrypt the incoming data
                const decryptedBytes = CryptoJS.AES.decrypt(message.payloadString, SECRET_PASSWORD);
                const decryptedStr = decryptedBytes.toString(CryptoJS.enc.Utf8);
                const data = JSON.parse(decryptedStr);

                if (data.senderId === myUserId) return; // Ignore own messages

                if (data.type === 'text') {
                    displayMessage(`💬 Ghost: ${data.content}`);
                } else if (data.type === 'offer') {
                    handleOffer(data.offer);
                } else if (data.type === 'answer') {
                    handleAnswer(data.answer);
                } else if (data.type === 'ice-candidate') {
                    handleNewICECandidateMsg(data.candidate);
                }
            } catch (e) {
                console.log("Ignored unreadable network noise.");
            }
        }

        function displayMessage(text) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="message">${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // ================= WEBRTC LIVE CALL ENGINE =================
        async function initWebRTC() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                peerConnection = new RTCPeerConnection(iceConfig);

                // Add mic audio to connection
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                // Listen for partner's audio
                peerConnection.ontrack = event => {
                    const remoteAudio = document.getElementById('remoteAudio');
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play().catch(e => console.error("Audio blocked by browser."));
                };

                // Send network routing details securely
                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        sendData({ type: 'ice-candidate', candidate: event.candidate });
                    }
                };

                // Watch connection status
                peerConnection.oniceconnectionstatechange = () => {
                    if (peerConnection.iceConnectionState === "connected") {
                        document.getElementById('status').innerText = "Live Call Connected 🟢";
                    } else if (peerConnection.iceConnectionState === "disconnected") {
                        hangup();
                    }
                };
            } catch (err) {
                alert("Microphone permission is required for Live Call!");
            }
        }

        async function startCall() {
            document.getElementById('callBtn').disabled = true;
            document.getElementById('hangupBtn').disabled = false;
            document.getElementById('status').innerText = "Calling Securely... 🔄";
            
            await initWebRTC();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            sendData({ type: 'offer', offer: offer });
            displayMessage("📞 <i>Live Call initiated...</i>");
        }

        async function handleOffer(offer) {
            document.getElementById('callBtn').style.display = 'none';
            document.getElementById('answerBtn').style.display = 'inline-block';
            document.getElementById('status').innerText = "Incoming Secure Call... 🔔";
            displayMessage("🔔 <i>Incoming Live Call...</i>");
            
            await initWebRTC();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            
            // Inject delayed network details
            pendingCandidates.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)));
            pendingCandidates = [];
        }

        async function answerCall() {
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('hangupBtn').disabled = false;
            document.getElementById('status').innerText = "Connecting Voice... ⚙️";
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            sendData({ type: 'answer', answer: answer });
        }

        async function handleAnswer(answer) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            
            // Inject delayed network details
            pendingCandidates.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)));
            pendingCandidates = [];
        }

        async function handleNewICECandidateMsg(candidate) {
            if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } else {
                pendingCandidates.push(candidate);
            }
        }

        function hangup() {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
            
            document.getElementById('callBtn').style.display = 'inline-block';
            document.getElementById('callBtn').disabled = false;
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('hangupBtn').disabled = true;
            
            document.getElementById('status').innerText = "Encrypted Tunnel Active 🔒";
            displayMessage("❌ <i>Call ended.</i>");
        }
    </script>
</body>
</html>
