<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat Room</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        /* Login Screen Styles */
        #login-screen {
            text-align: center;
        }
        #login-screen input {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #login-screen button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        /* Chat Screen Styles */
        #chat-screen {
            display: none; /* Hidden by default */
        }
        #chat-box {
            height: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
            background-color: #fafafa;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            background-color: #e9ecef;
            word-wrap: break-word;
        }
        .input-group {
            display: flex;
        }
        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
        }
        .input-group button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Password Prompt Screen -->
    <div class="container" id="login-screen">
        <h3>Chat Access</h3>
        <p>Kripya chat access karne ke liye password enter karein:</p>
        <input type="password" id="pwdInput" placeholder="Password yahan daalein...">
        <br>
        <button onclick="checkPassword()">Access Chat</button>
        <p id="error-msg" style="color: red; display: none;">Galat password, kripya dobara try karein.</p>
    </div>

    <!-- Main Chat Interface -->
    <div class="container" id="chat-screen">
        <h3>Live Chat</h3>
        <div id="chat-box">
            <!-- Messages will appear here -->
        </div>
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Message likhein...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Set your secret 15-word password here
const SECRET_PASSWORD = "quantum velocity phantom eclipse nebula horizon paradox cipher matrix catalyst zenith vortex bastion enigma cobalt";  

        function checkPassword() {
            const enteredPwd = document.getElementById('pwdInput').value;
            if (enteredPwd === SECRET_PASSWORD) {
                // Hide login, show chat
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
            } else {
                // Show error message
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function sendMessage() {
            const msgInput = document.getElementById('msgInput');
            const message = msgInput.value.trim();

            if (message !== "") {
                const chatBox = document.getElementById('chat-box');
                const newMsgDiv = document.createElement('div');
                
                newMsgDiv.classList.add('message');
                newMsgDiv.textContent = message; // Using textContent for security against XSS
                
                chatBox.appendChild(newMsgDiv);
                
                // Clear input and scroll to bottom
                msgInput.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
