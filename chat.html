<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untraceable Ghost Chat</title>
    
    <!-- CryptoJS for AES-256 End-to-End Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Paho MQTT for Serverless/Database-less Real-time Messaging -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #2c2c2c;
            color: white;
        }
        button {
            padding: 10px 20px;
            background-color: #bb86fc;
            color: #121212;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #login-screen { text-align: center; }
        #chat-screen { display: none; }
        #chat-box {
            height: 300px;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
            background-color: #121212;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            background-color: #333;
            word-wrap: break-word;
        }
        .input-group { display: flex; }
        .input-group input {
            flex: 1; border-radius: 4px 0 0 4px; margin-bottom: 0; width: auto;
        }
        .input-group button {
            border-radius: 0 4px 4px 0;
        }
        #status { font-size: 12px; color: #03dac6; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div class="container" id="login-screen">
        <h3>Ghost Chat (Untraceable)</h3>
        <p>Connect karne ke liye passphrase daalein:</p>
        <input type="password" id="pwdInput" placeholder="15-word password...">
        <br>
        <button onclick="startConnection()">Connect Securely</button>
        <p id="error-msg" style="color: #cf6679; display: none;">Error connecting...</p>
    </div>

    <!-- Chat Screen -->
    <div class="container" id="chat-screen">
        <h3>Encrypted Session</h3>
        <div id="status">Connecting to Ghost Network...</div>
        <div id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Secret message likhein...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Aapka strong 15-word password
        const SECRET_PASSWORD = "quantum velocity phantom eclipse nebula horizon paradox cipher matrix catalyst zenith vortex bastion enigma cobalt"; 
        
        let mqttClient;
        let chatTopic;

        function startConnection() {
            const enteredPwd = document.getElementById('pwdInput').value.trim();
            
            if (enteredPwd === SECRET_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
                
                // Password ko hash karke ek unique hidden room (topic) banate hain
                chatTopic = "ghostchat/" + CryptoJS.SHA256(SECRET_PASSWORD).toString().substring(0, 20);
                connectToNetwork();
            } else {
                alert("Galat passphrase!");
            }
        }

        function connectToNetwork() {
            // Free public MQTT broker (No database, just routing)
            const brokerUrl = "broker.emqx.io"; 
            const port = 8084; // Secure WSS port for GitHub Pages
            const clientId = "ghost_" + Math.random().toString(16).substr(2, 8); // Random ID for each user

            mqttClient = new Paho.MQTT.Client(brokerUrl, port, clientId);

            mqttClient.onConnectionLost = onConnectionLost;
            mqttClient.onMessageArrived = onMessageArrived;

            const options = {
                useSSL: true,
                onSuccess: onConnect,
                onFailure: function (message) {
                    document.getElementById('status').innerText = "Connection Failed. Retrying...";
                    document.getElementById('status').style.color = "#cf6679";
                }
            };

            mqttClient.connect(options);
        }

        function onConnect() {
            document.getElementById('status').innerText = "Connected & Encrypted 🔒";
            // Hidden room ko join karein
            mqttClient.subscribe(chatTopic);
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                document.getElementById('status').innerText = "Disconnected. Refresh page.";
                document.getElementById('status').style.color = "#cf6679";
            }
        }

        function sendMessage() {
            const msgInput = document.getElementById('msgInput');
            const rawMessage = msgInput.value.trim();

            if (rawMessage !== "") {
                // 1. Message ko browser mein hi encrypt karein
                const encryptedMessage = CryptoJS.AES.encrypt(rawMessage, SECRET_PASSWORD).toString();
                
                // 2. Encrypted message ko network par bhejein
                const message = new Paho.MQTT.Message(encryptedMessage);
                message.destinationName = chatTopic;
                mqttClient.send(message);

                msgInput.value = "";
            }
        }

        function onMessageArrived(message) {
            try {
                // 1. Network se aaye kachre (encrypted data) ko decrypt karein
                const decryptedBytes = CryptoJS.AES.decrypt(message.payloadString, SECRET_PASSWORD);
                const originalMessage = decryptedBytes.toString(CryptoJS.enc.Utf8);

                if (originalMessage) {
                    displayMessage(originalMessage);
                }
            } catch (e) {
                // Agar koi bahar ka insan galat password se is room mein aaya, toh error aayega
                console.log("Decryption failed. Ignoring message.");
            }
        }

        function displayMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const newMsgDiv = document.createElement('div');
            
            newMsgDiv.classList.add('message');
            newMsgDiv.textContent = text; 
            
            chatBox.appendChild(newMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
