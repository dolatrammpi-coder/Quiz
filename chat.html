<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Call (MQTT Continuous Stream)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 450px; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        input[type="password"] { padding: 10px; width: 80%; margin-bottom: 15px; border: 1px solid #333; border-radius: 4px; background: #2c2c2c; color: white; }
        
        .btn-green { background-color: #03dac6; color: #121212; width: 48%; padding: 15px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        .btn-red { background-color: #cf6679; color: #121212; width: 48%; padding: 15px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        #login-screen { display: block; }
        #chat-screen { display: none; }
        
        #status { font-size: 15px; color: #03dac6; margin-bottom: 20px; font-weight: bold; height: 20px; }
        
        .pulse-animation {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); color: #cf6679; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h3>Ghost Call (No WebRTC)</h3>
        <p style="font-size: 12px; color: #aaa;">Bypass All Firewalls</p>
        <input type="password" id="pwdInput" placeholder="Enter passphrase...">
        <br><br>
        <button class="btn-green" style="width: 80%;" onclick="startConnection()">Connect Securely</button>
    </div>

    <div class="container" id="chat-screen">
        <div id="status">Connected to Encrypted Relay 🔒</div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 30px;">
            <button id="callBtn" class="btn-green" onclick="initiateCall()">📞 Call</button>
            <button id="answerBtn" class="btn-green" onclick="answerCall()" style="display:none; animation: pulse 1s infinite;">📲 Answer</button>
            <button id="hangupBtn" class="btn-red" onclick="endCall()" disabled>❌ End</button>
        </div>
        
        <p style="font-size: 11px; color: #888; margin-top: 20px;">
            Yeh call audio packets ko encrypt karke text network par bhejti hai. WebRTC ya direct connection block hone par bhi chalegi.
        </p>
    </div>

    <script>
        const SECRET_PASSWORD = "quantum velocity phantom eclipse nebula horizon paradox cipher matrix catalyst zenith vortex bastion enigma cobalt"; 
        const myUserId = "user_" + Math.random().toString(36).substr(2, 9); 
        
        let mqttClient;
        let chatTopic;
        
        // Continuous Audio Variables
        let mediaRecorder;
        let isCalling = false;
        let audioQueue = [];
        let isPlaying = false;
        const RECORDING_SLICE_MS = 1000; // Har 1 second ka audio chunk jayega

        function startConnection() {
            const enteredPwd = document.getElementById('pwdInput').value.trim();
            if (enteredPwd === SECRET_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
                chatTopic = "ghost_live_stream/" + CryptoJS.SHA256(SECRET_PASSWORD).toString().substring(0, 20);
                connectMQTT();
            } else {
                alert("Incorrect Passphrase!");
            }
        }

        function connectMQTT() {
            mqttClient = new Paho.MQTT.Client("broker.emqx.io", 8084, myUserId);
            mqttClient.onMessageArrived = onMessageArrived;
            mqttClient.connect({
                useSSL: true,
                onSuccess: () => {
                    document.getElementById('status').innerText = "Connected & Encrypted 🔒";
                    mqttClient.subscribe(chatTopic);
                }
            });
        }

        function sendData(payloadObj) {
            payloadObj.senderId = myUserId;
            const jsonStr = JSON.stringify(payloadObj);
            const encrypted = CryptoJS.AES.encrypt(jsonStr, SECRET_PASSWORD).toString();
            const message = new Paho.MQTT.Message(encrypted);
            message.destinationName = chatTopic;
            mqttClient.send(message);
        }

        function onMessageArrived(message) {
            try {
                const decryptedBytes = CryptoJS.AES.decrypt(message.payloadString, SECRET_PASSWORD);
                const decryptedStr = decryptedBytes.toString(CryptoJS.enc.Utf8);
                const data = JSON.parse(decryptedStr);

                if (data.senderId === myUserId) return; 

                if (data.type === 'call_ring') {
                    handleIncomingRing();
                } else if (data.type === 'call_accept') {
                    handleCallAccepted();
                } else if (data.type === 'call_end') {
                    handleRemoteEndCall();
                } else if (data.type === 'audio_stream') {
                    if (isCalling) {
                        queueAudio(data.content);
                    }
                }
            } catch (e) {
                // Ignore noise
            }
        }

        // ================= CONTINUOUS AUDIO ENGINE =================

        async function startAudioStreaming() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                isCalling = true;

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0 && isCalling) {
                        const reader = new FileReader();
                        reader.readAsDataURL(event.data);
                        reader.onloadend = () => {
                            sendData({ type: 'audio_stream', content: reader.result });
                        };
                    }
                };

                // Continuous slicing
                mediaRecorder.start(RECORDING_SLICE_MS); 
            } catch (err) {
                alert("Microphone permission is required!");
                endCall();
            }
        }

        function queueAudio(base64Data) {
            audioQueue.push(base64Data);
            if (!isPlaying) {
                playNextAudio();
            }
        }

        function playNextAudio() {
            if (audioQueue.length === 0 || !isCalling) {
                isPlaying = false;
                return;
            }

            isPlaying = true;
            const nextAudioBase64 = audioQueue.shift();
            const audioObj = new Audio(nextAudioBase64);
            
            audioObj.play().catch(e => console.error("Audio blocked"));
            
            audioObj.onended = () => {
                playNextAudio();
            };
        }

        function stopAudioStreaming() {
            isCalling = false;
            audioQueue = []; // Clear remaining audio
            isPlaying = false;
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
        }

        // ================= CALL CONTROLS =================

        function initiateCall() {
            document.getElementById('callBtn').disabled = true;
            document.getElementById('hangupBtn').disabled = false;
            document.getElementById('status').innerText = "Ringing... 🔔";
            
            sendData({ type: 'call_ring' });
        }

        function handleIncomingRing() {
            if (!isCalling) {
                document.getElementById('callBtn').style.display = 'none';
                document.getElementById('answerBtn').style.display = 'inline-block';
                document.getElementById('status').innerText = "Incoming Call... 📞";
            }
        }

        function answerCall() {
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('callBtn').style.display = 'inline-block';
            document.getElementById('callBtn').disabled = true;
            document.getElementById('hangupBtn').disabled = false;
            document.getElementById('status').innerText = "Call Connected 🎙️";
            document.getElementById('status').classList.add("pulse-animation");

            sendData({ type: 'call_accept' });
            startAudioStreaming();
        }

        function handleCallAccepted() {
            document.getElementById('status').innerText = "Call Connected 🎙️";
            document.getElementById('status').classList.add("pulse-animation");
            startAudioStreaming();
        }

        function endCall() {
            stopAudioStreaming();
            sendData({ type: 'call_end' });
            resetUI();
        }

        function handleRemoteEndCall() {
            stopAudioStreaming();
            resetUI();
        }

        function resetUI() {
            document.getElementById('callBtn').style.display = 'inline-block';
            document.getElementById('callBtn').disabled = false;
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('hangupBtn').disabled = true;
            document.getElementById('status').innerText = "Connected & Encrypted 🔒";
            document.getElementById('status').classList.remove("pulse-animation");
        }
    </script>
</body>
</html>
