<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Chat & Audio (Fixed)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 450px; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 10px; width: 80%; margin-bottom: 15px; border: 1px solid #333; border-radius: 4px; background: #2c2c2c; color: white; }
        button { padding: 10px 15px; background-color: #bb86fc; color: #121212; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        .btn-green { background-color: #03dac6; }
        .btn-red { background-color: #cf6679; }
        #login-screen { text-align: center; }
        #chat-screen { display: none; }
        #chat-box { height: 200px; border: 1px solid #333; border-radius: 4px; padding: 10px; overflow-y: auto; margin-bottom: 10px; background-color: #121212; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 4px; background-color: #333; word-wrap: break-word; }
        .input-group { display: flex; margin-bottom: 15px; }
        .input-group input { flex: 1; border-radius: 4px 0 0 4px; margin-bottom: 0; width: auto; }
        .input-group button { border-radius: 0 4px 4px 0; }
        .call-controls { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid #333; }
        #status { font-size: 13px; color: #03dac6; margin-bottom: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h3>Ghost Network</h3>
        <input type="password" id="pwdInput" placeholder="15-word passphrase...">
        <br>
        <button onclick="startConnection()">Connect Securely</button>
    </div>

    <div class="container" id="chat-screen">
        <div id="status">Connecting to Chat...</div>
        
        <div id="chat-box"></div>
        
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Secret message...">
            <button onclick="sendTextMessage()">Send</button>
        </div>

        <div class="call-controls">
            <button id="callBtn" class="btn-green" onclick="startCall()">📞 Call</button>
            <button id="answerBtn" class="btn-green" onclick="answerCall()" style="display:none;">📲 Answer</button>
            <button id="hangupBtn" class="btn-red" onclick="hangup()" disabled>❌ End Call</button>
        </div>
        
        <audio id="remoteAudio" autoplay controls style="margin-top: 15px; width: 100%;"></audio>
    </div>

    <script>
        const SECRET_PASSWORD = "quantum velocity phantom eclipse nebula horizon paradox cipher matrix catalyst zenith vortex bastion enigma cobalt"; 
        
        let mqttClient;
        let chatTopic;
        
        let peerConnection;
        let localStream;
        let pendingCandidates = []; // Queue system for timing issues

                // Puraana STUN server list hata kar yeh naya STUN + TURN server list daalein
        const servers = { 
            iceServers: [
                // Google STUN Servers (First priority)
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                
                // Free Public TURN Servers (Bypasses Jio/Airtel strict network blocks)
                { 
                    urls: 'turn:openrelay.metered.ca:80', 
                    username: 'openrelayproject', 
                    credential: 'openrelayproject' 
                },
                { 
                    urls: 'turn:openrelay.metered.ca:443', 
                    username: 'openrelayproject', 
                    credential: 'openrelayproject' 
                },
                { 
                    urls: 'turn:openrelay.metered.ca:443?transport=tcp', 
                    username: 'openrelayproject', 
                    credential: 'openrelayproject' 
                }
            ] 
        }; 

        function startConnection() {
            const enteredPwd = document.getElementById('pwdInput').value.trim();
            if (enteredPwd === SECRET_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
                chatTopic = "ghost_webrtc/" + CryptoJS.SHA256(SECRET_PASSWORD).toString().substring(0, 20);
                connectMQTT();
            } else {
                alert("Galat passphrase!");
            }
        }

        function connectMQTT() {
            const clientId = "peer_" + Math.random().toString(16).substr(2, 8);
            mqttClient = new Paho.MQTT.Client("broker.emqx.io", 8084, clientId);
            mqttClient.onMessageArrived = onMessageArrived;
            mqttClient.connect({
                useSSL: true,
                onSuccess: () => {
                    document.getElementById('status').innerText = "Connected to Network 🔒";
                    mqttClient.subscribe(chatTopic);
                },
                onFailure: () => {
                    document.getElementById('status').innerText = "Network Connection Failed!";
                    document.getElementById('status').style.color = "#cf6679";
                }
            });
        }

        function sendData(payloadObj) {
            const jsonStr = JSON.stringify(payloadObj);
            const encrypted = CryptoJS.AES.encrypt(jsonStr, SECRET_PASSWORD).toString();
            const message = new Paho.MQTT.Message(encrypted);
            message.destinationName = chatTopic;
            mqttClient.send(message);
        }

        function sendTextMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                sendData({ type: 'chat', text: input.value.trim() });
                input.value = "";
            }
        }

        function onMessageArrived(message) {
            try {
                const decryptedBytes = CryptoJS.AES.decrypt(message.payloadString, SECRET_PASSWORD);
                const decryptedStr = decryptedBytes.toString(CryptoJS.enc.Utf8);
                const data = JSON.parse(decryptedStr);

                if (data.type === 'chat') {
                    displayMessage(data.text);
                } else if (data.type === 'offer') {
                    handleOffer(data.offer);
                } else if (data.type === 'answer') {
                    handleAnswer(data.answer);
                } else if (data.type === 'ice-candidate') {
                    handleNewICECandidateMsg(data.candidate);
                }
            } catch (e) {}
        }

        function displayMessage(text) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="message">${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function initWebRTC() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            peerConnection = new RTCPeerConnection(servers);

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = event => {
                const remoteAudio = document.getElementById('remoteAudio');
                remoteAudio.srcObject = event.streams[0];
                remoteAudio.play().catch(e => console.error("Auto-play blocked"));
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    sendData({ type: 'ice-candidate', candidate: event.candidate });
                }
            };

            // Monitor connection status
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                if (state === "connected") {
                    document.getElementById('status').innerText = "Live Call Connected 🟢";
                    document.getElementById('status').style.color = "#03dac6";
                } else if (state === "disconnected" || state === "failed") {
                    document.getElementById('status').innerText = "Call Failed (Network Blocked) 🔴";
                    document.getElementById('status').style.color = "#cf6679";
                    hangup();
                }
            };
        }

        async function startCall() {
            document.getElementById('callBtn').disabled = true;
            document.getElementById('hangupBtn').disabled = false;
            document.getElementById('status').innerText = "Ringing...";
            
            await initWebRTC();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            sendData({ type: 'offer', offer: offer });
        }

        async function handleOffer(offer) {
            document.getElementById('callBtn').style.display = 'none';
            document.getElementById('answerBtn').style.display = 'inline-block';
            document.getElementById('status').innerText = "Incoming Call... 🔔";
            
            await initWebRTC();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            
            // Add any pending candidates that arrived early
            pendingCandidates.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)));
            pendingCandidates = [];
        }

        async function answerCall() {
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('hangupBtn').disabled = false;
            document.getElementById('status').innerText = "Connecting Audio...";
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            sendData({ type: 'answer', answer: answer });
        }

        async function handleAnswer(answer) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            
            // Add any pending candidates that arrived early
            pendingCandidates.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)));
            pendingCandidates = [];
        }

        async function handleNewICECandidateMsg(candidate) {
            if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } else {
                // If remote description isn't set yet, hold the candidate in queue
                pendingCandidates.push(candidate);
            }
        }

        function hangup() {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
            
            document.getElementById('callBtn').style.display = 'inline-block';
            document.getElementById('callBtn').disabled = false;
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('hangupBtn').disabled = true;
            document.getElementById('status').innerText = "Call Ended.";
            document.getElementById('status').style.color = "#03dac6";
        }
    </script>
</body>
</html>
