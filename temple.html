<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भारत के प्रमुख मंदिर - 3 Sets Quiz</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --danger: #d32f2f;
            --bg: #f4f7f6;
            --text: #333;
            --card: #fff;
            --hover: #e8f5e9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .container {
            background: var(--card);
            width: 90%;
            max-width: 700px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }
        .back-btn {
            text-decoration: none;
            color: white;
            background-color: #1976d2;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .back-btn:hover { background-color: #1565c0; }
        
        /* Set Selection Screen */
        #set-selection-screen {
            text-align: center;
        }
        .set-btn {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .set-btn:hover { background-color: #1b5e20; }

        /* Quiz Screen */
        #question-screen { display: none; }
        .question-box { margin-bottom: 20px; }
        .question {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #111;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease-in-out;
            text-align: left;
            font-weight: 500;
        }
        .option:hover { background: #f9f9f9; border-color: #bbb; }
        .option.selected {
            border-color: var(--primary);
            background: var(--hover);
            color: var(--primary);
        }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; }
        button.nav-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: var(--primary-light);
            transition: 0.3s;
        }
        button.nav-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        button.nav-btn:hover:not(:disabled) { background-color: var(--primary); }
        #submit-btn { background-color: #f57c00; }
        #submit-btn:hover { background-color: #e65100; }

        /* Progress Bar */
        .progress-container { margin-top: 35px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); }
        .progress-text { font-size: 15px; color: #555; margin-top: 8px; font-weight: 500; }

        /* Result Screen */
        #result-screen { display: none; }
        .summary-item {
            padding: 15px;
            border-left: 5px solid #ccc;
            margin-bottom: 10px;
            background-color: #fafafa;
            border-radius: 4px;
        }
        .summary-item.correct { border-left-color: var(--primary); }
        .summary-item.wrong { border-left-color: var(--danger); }
        .correct-text { color: var(--primary); font-weight: bold; }
        .wrong-text { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="history.html" class="back-btn">⬅ इतिहास</a>
        <h3 style="margin: 0; color: #333;" id="main-title">मंदिर क्विज़ पोर्टल</h3>
    </div>

    <div id="set-selection-screen">
        <h3 style="color: #444; margin-bottom: 20px;">आप कौन सा सेट हल करना चाहते हैं?</h3>
        <button class="set-btn" onclick="startQuiz(1)">Set 1: मंदिर और उनके स्थान (50 MCQs)</button>
        <button class="set-btn" onclick="startQuiz(2)">Set 2: मंदिर, देवता और निर्माता (50 MCQs)</button>
        <button class="set-btn" onclick="startQuiz(3)">Set 3: वास्तुकला और विशेषताएँ (50 MCQs)</button>
    </div>

    <div id="question-screen">
        <div class="question-box">
            <div class="question" id="question-text">प्रश्न यहाँ आएगा</div>
            <div class="options" id="options-container"></div>
        </div>

        <div class="nav-buttons">
            <button id="prev-btn" class="nav-btn" onclick="prevQuestion()">पिछला</button>
            <button id="next-btn" class="nav-btn" onclick="nextQuestion()">अगला</button>
            <button id="submit-btn" class="nav-btn" onclick="showResults()" style="display: none;">सबमिट करें</button>
        </div>

        <div class="progress-container">
            <input type="range" id="progress-bar" min="1" max="50" value="1" oninput="seekQuestion(this.value)">
            <div class="progress-text">प्रश्न: <span id="current-q-num">1</span> / <span id="total-q-num">50</span></div>
        </div>
    </div>

    <div id="result-screen">
        <h2 style="text-align: center; color: #333;">परिणाम (Result Summary)</h2>
        <h3 id="score-text" style="text-align: center; font-size: 24px; color: var(--primary);"></h3>
        <div id="detailed-summary" style="max-height: 450px; overflow-y: auto; text-align: left; padding-right: 10px; margin-top: 20px;"></div>
        <button class="set-btn" onclick="location.reload()" style="margin-top: 25px;">⬅ वापस मेन मेनू पर जाएं</button>
    </div>
</div>

            { q: "नासिक का त्र्यंबकेश्वर मंदिर (हेमाडपंती/नागर शैली) किस नदी का स्रोत है?", a: "गोदावरी नदी", options: ["गोदावरी नदी", "कृष्णा नदी", "कावेरी नदी", "नर्मदा नदी"] },
            { q: "किस कलिंग शैली के मंदिर को 'ब्लैक पगोडा' कहा কতটা है जिसके पहिए धूपघड़ी हैं?", a: "कोणार्क सूर्य मंदिर", options: ["कोणार्क सूर्य मंदिर", "मोढेरा का सूर्य मंदिर", "सूर्यनारायण मंदिर", "लिंगराज मंदिर"] },
            { q: "भुवनेश्वर का लिंगराज मंदिर किस शैली में बनवाया गया है?", a: "कलिंग (देउल शैली)", options: ["कलिंग (देउल शैली)", "नागर (भूमिजा)", "द्रविड़", "विजयनगर"] },
            { q: "राजपूत व मुगल शैली में बना कौन सा मंदिर 'चूहों का मंदिर' कहलाता है?", a: "करणी माता मंदिर", options: ["करणी माता मंदिर", "नेघोरिटिंग शिव देउल", "बहुचरा माता मंदिर", "दंतेश्वरी मंदिर"] },
            { q: "काकतीय वंश द्वारा निर्मित किस मंदिर का आकार 'ताराकार' है और इसमें 1000 स्तंभ हैं?", a: "हजार स्तंभ मंदिर", options: ["हजार स्तंभ मंदिर", "रामप्पा मंदिर", "होयसालेश्वर मंदिर", "चेन्नाकेशव मंदिर"] },
            { q: "काकतीय वंश के रामप्पा मंदिर की विशेषता क्या है?", a: "दीवारों पर जटिल नक्कासियां और रामप्पा/नंदी की मूर्तियां", options: ["दीवारों पर जटिल नक्कासियां और रामप्पा/नंदी की मूर्तियां", "कामुक मूर्तियां", "पत्थर का रथ", "लटकते स्तम्भ"] },
            { q: "महाबलीपुरम का शोर मंदिर (द्रविड़ शैली) किस प्रकार के निर्माण के लिए जाना जाता है?", a: "चट्टान काट कर बनाए गए मंदिर (रॉक-कट)", options: ["चट्टान काट कर बनाए गए मंदिर (रॉक-कट)", "ईंटों का मंदिर", "संगमरमर का मंदिर", "लकड़ी का मंदिर"] },
            { q: "मदुरै का मीनाक्षी मंदिर (द्रविड़ शैली) किसके लिए प्रसिद्ध है?", a: "विशाल प्रकरम और 1000 स्तंभों के हॉल", options: ["विशाल प्रकरम और 1000 स्तंभों के हॉल", "ताराकार डिजाइन", "धूपघड़ी पहिए", "कामुक मूर्तियां"] },
            { q: "किस मंदिर की मूल मूर्ति 'अत्यधिक विषैली जड़ी-बूटियों (बोग सिद्धार)' का उपयोग करके बनाई गई मानी जाती है?", a: "मुरुगन मंदिर (पलनी)", options: ["मुरुगन मंदिर (पलनी)", "सबरीमाला मंदिर", "कामाख्या मंदिर", "लिंगराज मंदिर"] },
            { q: "तंजावुर का बृहदेश्वर मंदिर किस वास्तुकला का भव्य उदाहरण है जहाँ दीवारों पर भित्ति चित्र हैं?", a: "चोल वास्तुकला (द्रविड़)", options: ["चोल वास्तुकला (द्रविड़)", "विजयनगर वास्तुकला", "होयसल वास्तुकला", "काकतीय वास्तुकला"] },
            { q: "श्रीरंगम का रंगनाथस्वामी मंदिर (द्रविड़ शैली) कहाँ स्थित है?", a: "कावेरी नदी में एक द्वीप पर", options: ["कावेरी नदी में एक द्वीप पर", "ब्रह्मपुत्र नदी के द्वीप पर", "गोदावरी के तट पर", "पहाड़ी की चोटी पर"] },
            { q: "त्रिपुरा का उनाकोटी गुफा मंदिर किस प्रकार की वास्तुकला के लिए जाना जाता है?", a: "चट्टान पर अद्भुत नक्काशी (रॉक-कट)", options: ["चट्टान पर अद्भुत नक्काशी (रॉक-कट)", "ताराकार डिजाइन", "देउल शैली", "हेमाडपंती शैली"] },
            { q: "कोलकाता का दक्षिणेश्वर मंदिर किस वास्तुकला शैली में निर्मित है?", a: "नवरत्न शैली", options: ["नवरत्न शैली", "मारू-गुर्जर", "द्रविड़", "विजयनगर"] }
        ]
    };

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let userAnswers = [];

    // Shuffle Function
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Start Quiz Based on Set Selection
    function startQuiz(setNum) {
        document.getElementById('set-selection-screen').style.display = 'none';
        document.getElementById('question-screen').style.display = 'block';
        
        // Update Title
        const titles = {1: "Set 1: मंदिर और उनके स्थान", 2: "Set 2: मंदिर, देवता और निर्माता", 3: "Set 3: वास्तुकला और विशेषताएँ"};
        document.getElementById('main-title').innerText = titles[setNum];

        // Load & Shuffle Set
        let selectedData = JSON.parse(JSON.stringify(allSets[setNum])); // Deep copy
        currentQuestions = shuffleArray(selectedData).map(q => {
            return { ...q, options: shuffleArray([...q.options]) };
        });

        userAnswers = new Array(currentQuestions.length).fill(null);
        document.getElementById('progress-bar').max = currentQuestions.length;
        document.getElementById('total-q-num').innerText = currentQuestions.length;
        
        loadQuestion(0);
    }

    // Load Question to UI
    function loadQuestion(index) {
        currentQuestionIndex = index;
        const qData = currentQuestions[index];
        
        document.getElementById('question-text').innerText = `प्रश्न ${index + 1}: ${qData.q}`;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option';
            if (userAnswers[index] === opt) btn.classList.add('selected');
            btn.innerText = opt;
            btn.onclick = () => selectOption(opt);
            optionsContainer.appendChild(btn);
        });

        updateNavAndProgress();
    }

    // Handle Option Selection
    function selectOption(selectedOpt) {
        userAnswers[currentQuestionIndex] = selectedOpt;
        loadQuestion(currentQuestionIndex); 
    }

    // Update UI Buttons
    function updateNavAndProgress() {
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        
        if (currentQuestionIndex === currentQuestions.length - 1) {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
        } else {
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none';
        }

        document.getElementById('progress-bar').value = currentQuestionIndex + 1;
        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
    }

    function nextQuestion() {
        if (currentQuestionIndex < currentQuestions.length - 1) loadQuestion(currentQuestionIndex + 1);
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex - 1);
    }

    function seekQuestion(val) {
        loadQuestion(parseInt(val) - 1);
    }

    // Show Results
    function showResults() {
        let score = 0;
        let summaryHTML = '';

        currentQuestions.forEach((q, index) => {
            const userAnswer = userAnswers[index];
            const isCorrect = userAnswer === q.a;
            if (isCorrect) score++;

            summaryHTML += `
                <div class="summary-item ${isCorrect ? 'correct' : 'wrong'}">
                    <p style="margin: 0 0 8px 0; font-size: 16px;"><strong>Q${index + 1}: ${q.q}</strong></p>
                    <p style="margin: 0 0 5px 0; font-size: 15px;">
                        आपका उत्तर: <span class="${isCorrect ? 'correct-text' : 'wrong-text'}">
                        ${userAnswer ? userAnswer : 'छोड़ दिया (Not Attempted)'}</span>
                    </p>
                    ${!isCorrect ? `<p style="margin: 0; font-size: 15px; background: #e8f5e9; padding: 5px; border-radius: 4px; display: inline-block;">सही उत्तर: <span class="correct-text">${q.a}</span></p>` : ''}
                </div>
            `;
        });

        document.getElementById('question-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        document.getElementById('score-text').innerText = `कुल स्कोर: ${score} / ${currentQuestions.length}`;
        document.getElementById('detailed-summary').innerHTML = summaryHTML;
    }
</script>
