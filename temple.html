<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भारत के प्रमुख मंदिर - 3 Sets Mega Quiz</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #4caf50;
            --danger: #d32f2f;
            --bg: #f4f7f6;
            --text: #333;
            --card: #fff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .container {
            background: var(--card);
            width: 90%;
            max-width: 700px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }
        .back-btn {
            text-decoration: none;
            color: white;
            background-color: #1976d2;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .back-btn:hover { background-color: #1565c0; }
        
        /* Set Selection Screen */
        #set-selection-screen { text-align: center; }
        .set-btn {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .set-btn:hover { background-color: #1b5e20; }

        /* Quiz Screen */
        #question-screen { display: none; }
        .question-box { margin-bottom: 20px; }
        .question {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #111;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease-in-out;
            text-align: left;
            font-weight: 500;
        }
        .option:hover:not(.disabled) { background: #f9f9f9; border-color: #bbb; }
        
        /* Instant Feedback Colors */
        .option.correct { background-color: #c8e6c9 !important; border-color: var(--primary) !important; color: #1b5e20; font-weight: bold; }
        .option.wrong { background-color: #ffcdd2 !important; border-color: var(--danger) !important; color: #b71c1c; font-weight: bold; }
        .option.disabled { pointer-events: none; }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; }
        button.nav-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: var(--primary-light);
            transition: 0.3s;
        }
        button.nav-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        button.nav-btn:hover:not(:disabled) { background-color: var(--primary); }
        #submit-btn { background-color: #f57c00; }
        #submit-btn:hover { background-color: #e65100; }

        /* Progress Bar */
        .progress-container { margin-top: 35px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary); }
        .progress-text { font-size: 15px; color: #555; margin-top: 8px; font-weight: 500; }

        /* Result Screen */
        #result-screen { display: none; }
        .summary-item {
            padding: 15px;
            border-left: 5px solid #ccc;
            margin-bottom: 10px;
            background-color: #fafafa;
            border-radius: 4px;
        }
        .summary-item.correct-item { border-left-color: var(--primary); }
        .summary-item.wrong-item { border-left-color: var(--danger); }
        .correct-text { color: var(--primary); font-weight: bold; }
        .wrong-text { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="history.html" class="back-btn">⬅ इतिहास</a>
        <h3 style="margin: 0; color: #333;" id="main-title">मंदिर क्विज़ पोर्टल</h3>
    </div>

    <div id="set-selection-screen">
        <h3 style="color: #444; margin-bottom: 20px;">आप कौन सा सेट हल करना चाहते हैं?</h3>
        <button class="set-btn" onclick="startQuiz(1)">Set 1: मंदिर और उनके स्थान (51 MCQs)</button>
        <button class="set-btn" onclick="startQuiz(2)">Set 2: मंदिर और समर्पित देवता (51 MCQs)</button>
        <button class="set-btn" onclick="startQuiz(3)">Set 3: वास्तुकला और विशेषताएँ (51 MCQs)</button>
    </div>

    <div id="question-screen">
        <div class="question-box">
            <div class="question" id="question-text">प्रश्न यहाँ आएगा</div>
            <div class="options" id="options-container"></div>
        </div>

        <div class="nav-buttons">
            <button id="prev-btn" class="nav-btn" onclick="prevQuestion()">पिछला</button>
            <button id="next-btn" class="nav-btn" onclick="nextQuestion()">अगला</button>
            <button id="submit-btn" class="nav-btn" onclick="showResults()" style="display: none;">परिणाम देखें</button>
        </div>

        <div class="progress-container">
            <input type="range" id="progress-bar" min="1" max="51" value="1" oninput="seekQuestion(this.value)">
            <div class="progress-text">प्रश्न: <span id="current-q-num">1</span> / <span id="total-q-num">51</span></div>
        </div>
    </div>

    <div id="result-screen">
        <h2 style="text-align: center; color: #333;">परिणाम (Result Summary)</h2>
        <h3 id="score-text" style="text-align: center; font-size: 24px; color: var(--primary);"></h3>
        <div id="detailed-summary" style="max-height: 450px; overflow-y: auto; text-align: left; padding-right: 10px; margin-top: 20px;"></div>
        <button class="set-btn" onclick="location.reload()" style="margin-top: 25px;">⬅ वापस मेन मेनू पर जाएं</button>
    </div>
</div>

        { name: "उनाकोटी गुफा मंदिर", loc: "त्रिपुरा", god: "भगवान शिव", feat: "चट्टान पर अद्भुत रॉक-कट नक्काशी देखी जा सकती है" },
        { name: "विश्वनाथ मंदिर", loc: "वाराणसी (उत्तर प्रदेश)", god: "भगवान शिव", feat: "1780 में निर्मित 12 ज्योतिर्लिंगों में से एक" },
        { name: "दक्षिणेश्वर मंदिर", loc: "कोलकाता (पश्चिम बंगाल)", god: "देवी काली", feat: "संत रामकृष्ण परमहंस द्वारा स्थापित (नवरत्न शैली)" }
    ];

    let allSets = { 1: [], 2: [], 3: [] };

    // डायनामिक रूप से 3 सेट जेनरेट करना
    masterData.forEach(t => {
        // Set 1: Location
        allSets[1].push({ q: `${t.name} कहाँ स्थित है?`, a: t.loc, options: [t.loc, "हम्पी (कर्नाटक)", "तंजावुर (तमिलनाडु)", "द्वारका (गुजरात)", "उज्जैन (मध्य प्रदेश)", "वाराणसी (उत्तर प्रदेश)", "गुवाहाटी (असम)", "बस्तर (छत्तीसगढ़)", "नासिक (महाराष्ट्र)"] });
        // Set 2: Deity Only
        allSets[2].push({ q: `${t.name} किसे समर्पित है?`, a: t.god, options: [t.god, "भगवान शिव", "भगवान विष्णु", "सूर्य देव", "देवी दुर्गा", "भगवान कृष्ण", "मां कामाख्या", "भगवान कार्तिकेय"] });
        // Set 3: Features
        allSets[3].push({ q: `${t.name} की प्रमुख विशेषता क्या है?`, a: t.feat, options: [t.feat, "यहाँ लटकते स्तम्भ पाए जाते हैं", "इसे 'ब्लैक पगोडा' कहा जाता है", "यहाँ कामुक मूर्तियां पाई जाती हैं", "यह चट्टान काट कर बना है (रॉक-कट)", "यहाँ 1000 स्तंभों का हॉल है", "मूर्ति चंदन लेप से ढकी रहती है"] });
    });

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let userAnswers = [];

    // Shuffle Array Helper
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // विकल्पों को 4 तक सीमित करना और सही उत्तर सुनिश्चित करना
    function prepareOptions(correctAnswer, allOptions) {
        let uniqueWrongOptions = [...new Set(allOptions.filter(o => o !== correctAnswer))];
        let shuffledWrong = shuffleArray(uniqueWrongOptions).slice(0, 3);
        return shuffleArray([correctAnswer, ...shuffledWrong]);
    }

    function startQuiz(setNum) {
        document.getElementById('set-selection-screen').style.display = 'none';
        document.getElementById('question-screen').style.display = 'block';
        
        const titles = {1: "Set 1: मंदिर और उनके स्थान", 2: "Set 2: मंदिर और समर्पित देवता", 3: "Set 3: वास्तुकला और विशेषताएँ"};
        document.getElementById('main-title').innerText = titles[setNum];

        let selectedData = JSON.parse(JSON.stringify(allSets[setNum]));
        currentQuestions = shuffleArray(selectedData).map(q => {
            return { ...q, options: prepareOptions(q.a, q.options) };
        });

        userAnswers = new Array(currentQuestions.length).fill(null);
        document.getElementById('progress-bar').max = currentQuestions.length;
        document.getElementById('total-q-num').innerText = currentQuestions.length;
        
        loadQuestion(0);
    }

    function loadQuestion(index) {
        currentQuestionIndex = index;
        const qData = currentQuestions[index];
        const hasAnswered = userAnswers[index] !== null;
        
        document.getElementById('question-text').innerText = `प्रश्न ${index + 1}: ${qData.q}`;
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        qData.options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            
            if (hasAnswered) {
                btn.classList.add('disabled');
                if (opt === qData.a) {
                    btn.classList.add('correct');
                } else if (opt === userAnswers[index]) {
                    btn.classList.add('wrong');
                }
            } else {
                btn.onclick = () => selectOption(opt, qData.a);
            }
            
            optionsContainer.appendChild(btn);
        });

        updateNavAndProgress();
    }

    function selectOption(selectedOpt, correctOpt) {
        userAnswers[currentQuestionIndex] = selectedOpt;
        loadQuestion(currentQuestionIndex); // Reload to show instant colors
    }

    function updateNavAndProgress() {
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        
        if (currentQuestionIndex === currentQuestions.length - 1) {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
        } else {
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none';
        }

        document.getElementById('progress-bar').value = currentQuestionIndex + 1;
        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
    }

    function nextQuestion() {
        if (currentQuestionIndex < currentQuestions.length - 1) loadQuestion(currentQuestionIndex + 1);
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex - 1);
    }

    function seekQuestion(val) {
        loadQuestion(parseInt(val) - 1);
    }

    function showResults() {
        let score = 0;
        let summaryHTML = '';

        currentQuestions.forEach((q, index) => {
            const userAnswer = userAnswers[index];
            const isCorrect = userAnswer === q.a;
            if (isCorrect) score++;

            summaryHTML += `
                <div class="summary-item ${isCorrect ? 'correct-item' : 'wrong-item'}">
                    <p style="margin: 0 0 8px 0; font-size: 16px;"><strong>Q${index + 1}: ${q.q}</strong></p>
                    <p style="margin: 0 0 5px 0; font-size: 15px;">
                        आपका उत्तर: <span class="${isCorrect ? 'correct-text' : 'wrong-text'}">
                        ${userAnswer ? userAnswer : 'छोड़ दिया (Not Attempted)'}</span>
                    </p>
                    ${!isCorrect ? `<p style="margin: 0; font-size: 15px; background: #e8f5e9; padding: 5px; border-radius: 4px; display: inline-block;">सही उत्तर: <span class="correct-text">${q.a}</span></p>` : ''}
                </div>
            `;
        });

        document.getElementById('question-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        document.getElementById('score-text').innerText = `कुल स्कोर: ${score} / ${currentQuestions.length}`;
        document.getElementById('detailed-summary').innerHTML = summaryHTML;
    }
</script>

</body>
</html>
