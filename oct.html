    ];

    const quizContainer = document.getElementById('quiz-container');

    // Generate Quiz DOM
    quizData.forEach((item, index) => {
        const questionDiv = document.createElement('div');
        questionDiv.className = 'question-block';
        questionDiv.id = `qb-${index}`;
        
        questionDiv.innerHTML = `<h3>प्र. ${index + 1}: ${item.q}</h3>`;
        
        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';
        
        item.o.forEach((opt, optIndex) => {
            const label = document.createElement('label');
            label.innerHTML = `
                <input type="radio" name="q${index}" value="${optIndex}">
                ${opt}
            `;
            optionsDiv.appendChild(label);
        });
        
        const correctAnsDiv = document.createElement('div');
        correctAnsDiv.className = 'correct-ans';
        correctAnsDiv.id = `ca-${index}`;
        correctAnsDiv.innerText = `सही उत्तर: ${item.o[item.a]}`;

        questionDiv.appendChild(optionsDiv);
        questionDiv.appendChild(correctAnsDiv);
        quizContainer.appendChild(questionDiv);
    });

    function calculateScore() {
        let score = 0;
        
        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const block = document.getElementById(`qb-${index}`);
            const correctText = document.getElementById(`ca-${index}`);
            
            correctText.style.display = 'block'; // Show correct answer

            if (selected) {
                if (parseInt(selected.value) === item.a) {
                    score++;
                    block.style.backgroundColor = '#d4edda'; // Green for correct
                    block.style.borderColor = '#c3e6cb';
                } else {
                    block.style.backgroundColor = '#f8d7da'; // Red for incorrect
                    block.style.borderColor = '#f5c6cb';
                }
            } else {
                block.style.backgroundColor = '#fff3cd'; // Yellow for unattempted
                block.style.borderColor = '#ffeeba';
            }
        });
        
        const resultDiv = document.getElementById('result');
        resultDiv.innerText = `आपका स्कोर: ${score} / 50`;
        resultDiv.style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
