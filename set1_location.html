<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Prelims Mock Test - Art & Culture</title>
    <style>
        :root {
            --primary: #1e3a8a; /* Deep Navy Blue */
            --secondary: #3b82f6;
            --success: #059669;
            --danger: #dc2626;
            --bg: #f8fafc;
            --text: #1e293b;
            --card: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-top: 6px solid var(--primary);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h2 { margin: 0; color: var(--primary); font-size: 24px; }
        .header p { margin: 5px 0 0; color: #64748b; font-weight: 500; }
        
        .q-type-badge {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        
        .question-text {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.6;
            color: #0f172a;
        }
        
        /* Lists for Statements & Matching */
        .stmt-list, .match-list {
            margin: 0 0 20px 0;
            padding: 15px 20px;
            background: #f1f5f9;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.7;
            color: #334155;
            list-style-type: none;
        }
        .stmt-list li { margin-bottom: 10px; }
        .stmt-list li:last-child { margin-bottom: 0; }
        
        .code-instruction { font-weight: 600; margin-bottom: 15px; color: #1e293b; }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .option {
            padding: 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: 0.2s ease;
            background: #fff;
        }
        .option:hover:not(.disabled) { background: #f8fafc; border-color: #94a3b8; }
        
        /* Feedback Colors */
        .option.correct { background-color: #ecfdf5 !important; border-color: var(--success) !important; color: var(--success); font-weight: 700; }
        .option.wrong { background-color: #fef2f2 !important; border-color: var(--danger) !important; color: var(--danger); font-weight: 700; }
        .option.disabled { pointer-events: none; }

        /* Explanation Section */
        .explanation {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #fffbeb;
            border-left: 5px solid #f59e0b;
            border-radius: 6px;
        }
        .exp-title { font-weight: bold; color: #b45309; margin-bottom: 8px; font-size: 16px; }
        .exp-text { font-size: 15px; line-height: 1.6; color: #78350f; }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        button.nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            background-color: var(--secondary);
            cursor: pointer;
            transition: 0.3s;
        }
        button.nav-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        button.nav-btn:hover:not(:disabled) { background-color: var(--primary); }
        
        .progress { font-weight: 600; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>UPSC Mock Test: कला एवं संस्कृति</h2>
        <p>भारत के प्रमुख मंदिर एवं वास्तुकला</p>
    </div>

    <div id="quiz-area">
        <span class="q-type-badge" id="q-type">कथन आधारित</span>
        <div class="question-text" id="q-text">प्रश्न यहाँ आएगा...</div>
        
        <ul id="list-container" class="stmt-list" style="display:none;"></ul>
        
        <div class="code-instruction" id="instruction-text">नीचे दिए गए कूट का प्रयोग कर सही उत्तर चुनिए:</div>
        
        <div class="options-grid" id="options-container"></div>
        
        <div class="explanation" id="explanation-box">
            <div class="exp-title">विस्तृत व्याख्या (Explanation):</div>
            <div class="exp-text" id="exp-content"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <button id="prev-btn" class="nav-btn" onclick="prevQuestion()">⬅ पिछला</button>
        <span class="progress">प्रश्न <span id="current-q">1</span> / <span id="total-q">15</span></span>
        <button id="next-btn" class="nav-btn" onclick="nextQuestion()">अगला ➡</button>
    </div>
</div>

    let currentQIndex = 0;
    let userSelections = new Array(quizData.length).fill(null);

    document.getElementById('total-q').innerText = quizData.length;

    // Shuffle Array Helper
    function shuffleOptions(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Initialize Shuffled Options
    quizData.forEach(q => {
        q.shuffledOptions = shuffleOptions(q.options);
    });

    function renderQuestion(index) {
        const q = quizData[index];
        const hasAnswered = userSelections[index] !== null;

        // Set Headers
        document.getElementById('q-type').innerText = q.type;
        document.getElementById('q-text').innerText = `Q${index + 1}. ${q.q}`;
        
        // Handle Lists
        const listContainer = document.getElementById('list-container');
        if (q.list && q.list.length > 0) {
            listContainer.style.display = 'block';
            listContainer.innerHTML = q.list.map(item => `<li>${item}</li>`).join('');
        } else {
            listContainer.style.display = 'none';
        }

        document.getElementById('instruction-text').innerText = q.instruction;

        // Handle Options
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = '';
        
        q.shuffledOptions.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            
            if (hasAnswered) {
                btn.classList.add('disabled');
                if (opt === q.ans) {
                    btn.classList.add('correct');
                } else if (opt === userSelections[index]) {
                    btn.classList.add('wrong');
                }
            } else {
                btn.onclick = () => handleSelection(opt, q.ans);
            }
            optContainer.appendChild(btn);
        });

        // Handle Explanation
        const expBox = document.getElementById('explanation-box');
        if (hasAnswered) {
            expBox.style.display = 'block';
            document.getElementById('exp-content').innerText = q.exp;
        } else {
            expBox.style.display = 'none';
        }

        updateNavButtons();
    }

    function handleSelection(selectedOption, correctOption) {
        userSelections[currentQIndex] = selectedOption;
        renderQuestion(currentQIndex);
    }

    function updateNavButtons() {
        document.getElementById('prev-btn').disabled = currentQIndex === 0;
        document.getElementById('next-btn').disabled = currentQIndex === quizData.length - 1;
        document.getElementById('current-q').innerText = currentQIndex + 1;
    }

    function nextQuestion() {
        if (currentQIndex < quizData.length - 1) {
            currentQIndex++;
            renderQuestion(currentQIndex);
        }
    }

    function prevQuestion() {
        if (currentQIndex > 0) {
            currentQIndex--;
            renderQuestion(currentQIndex);
        }
    }

    // Start
    renderQuestion(0);
</script>
