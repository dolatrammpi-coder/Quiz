<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अनुसंधान संस्थान क्विज</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 600px;
            background: white;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .option-btn {
            display: block;
            width: 100%;
            background-color: #e7e7e7;
            color: #333;
            border: 2px solid transparent;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover {
            background-color: #d4d4d4;
        }
        .correct {
            background-color: #8bc34a !important;
            color: white;
        }
        .wrong {
            background-color: #f44336 !important;
            color: white;
        }
        #quiz-box {
            display: none;
            margin-top: 20px;
        }
        #question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #222;
        }
        /* Falling Animation CSS */
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .emoji {
            position: fixed;
            top: -50px;
            font-size: 40px;
            animation: fall linear forwards;
            z-index: 1000;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>महत्वपूर्ण अनुसंधान संस्थान</h1>
        <div id="home">
            <p>क्विज का प्रकार चुनें:</p>
            <button class="btn" onclick="startQuiz('orgToLoc')">संस्थान से स्थान पहचानें</button>
            <button class="btn" onclick="startQuiz('locToOrg')">स्थान से संस्थान पहचानें</button>
        </div>

        <div id="quiz-box">
            <h2 id="score-board">स्कोर: 0 / 10</h2>
            <div id="question"></div>
            <div id="options"></div>
            <button class="btn" id="next-btn" style="display:none;" onclick="nextQuestion()">अगला प्रश्न</button>
            <button class="btn" id="home-btn" style="display:none; background-color: #2196F3;" onclick="goHome()">होम पर जाएँ</button>
        </div>
    </div>

    <script>
        const data = [
            { org: "भारतीय गन्ना अनुसंधान संस्थान", loc: "लखनऊ" },
            { org: "केन्द्रीय औषधि अनुसंधान संस्थान", loc: "लखनऊ" },
            { org: "राष्ट्रीय वनस्पति अनुसंधान संस्थान", loc: "लखनऊ" },
            { org: "भारतीय दलहन अनुसंधान संस्थान", loc: "कानपुर" },
            { org: "राष्ट्रीय बकरी अनुसंधान संस्थान", loc: "मथुरा" },
            { org: "भारतीय पशु चिकित्सा अनुसंधान संस्थान", loc: "बरेली" },
            { org: "भारतीय चारागाह एवं चारा अनुसंधान संस्थान", loc: "झांसी" },
            { org: "केन्द्रीय वन अनुसंधान संस्थान", loc: "देहरादून" },
            { org: "भारतीय पेट्रोलियम संस्थान", loc: "देहरादून" },
            { org: "केन्द्रीय भवन निर्माण संस्थान", loc: "रुड़की" },
            { org: "राष्ट्रीय डेयरी अनुसंधान संस्थान", loc: "करनाल" },
            { org: "भारतीय कृषि अनुसंधान संस्थान", loc: "नई दिल्ली" },
            { org: "भारतीय मौसम विज्ञान संस्थान", loc: "नई दिल्ली" },
            { org: "केंद्रीय कपास अनुसंधान संस्थान", loc: "नागपुर" },
            { org: "भाभा परमाणु अनुसंधान संस्थान", loc: "ट्राम्बे (महाराष्ट्र)" },
            { org: "भारतीय विज्ञान संस्थान", loc: "बेंगलुरु" },
            { org: "भारतीय अंतरिक्ष अनुसंधान संगठन", loc: "बेंगलुरु" },
            { org: "भारतीय मसाला अनुसंधान संस्थान", loc: "कोझिकोड (केरल)" },
            { org: "विक्रम साराभाई अंतरिक्ष केंद्र", loc: "तिरुवनंतपुरम" },
            { org: "सतीश धवन अंतरिक्ष केंद्र", loc: "श्रीहरिकोटा" },
            { org: "केन्द्रीय चमड़ा अनुसंधान संस्थान", loc: "चेन्नई" },
            { org: "केन्द्रीय आलू अनुसंधान संस्थान", loc: "शिमला" },
            { org: "केन्द्रीय चावल अनुसंधान संस्थान", loc: "कटक (ओडिशा)" },
            { org: "राष्ट्रीय भू-भौतिकी अनुसंधान संस्थान", loc: "हैदराबाद" },
            { org: "भारतीय हीरा संस्थान", loc: "सूरत" },
            { org: "राष्ट्रीय लाख अनुसंधान संस्थान", loc: "रांची" },
            { org: "राष्ट्रीय समुद्र विज्ञान संस्थान", loc: "पणजी (गोवा)" },
            { org: "भारतीय उष्णकटिबंधीय मौसम विज्ञान संस्थान", loc: "पुणे" },
            { org: "जीवाणु प्रौद्योगिकी संस्थान", loc: "चंडीगढ़" },
            { org: "केन्द्रीय खनन एवं ईंधन अनुसंधान संस्थान", loc: "धनबाद" },
            { org: "केन्द्रीय नमक और समुद्री रसायन अनुसंधान संस्थान", loc: "भावनगर" },
            { org: "भारतीय भूवैज्ञानिक सर्वेक्षण", loc: "कोलकाता" },
            { org: "प्लाज्मा अनुसंधान संस्थान", loc: "गांधीनगर" }
        ];

        let currentQuizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let quizMode = '';

        // Shuffle Array Helper
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz(mode) {
            quizMode = mode;
            score = 0;
            currentQuestionIndex = 0;
            document.getElementById('home').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';
            document.getElementById('home-btn').style.display = 'none';
            
            // Randomize and pick 10 questions
            currentQuizData = shuffle([...data]).slice(0, 10);
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('score-board').innerText = `स्कोर: ${score} / 10`;
            const qData = currentQuizData[currentQuestionIndex];
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            let questionText = '';
            let correctAnswer = '';
            let wrongAnswersPool = [];

            if (quizMode === 'orgToLoc') {
                questionText = `${qData.org} कहाँ स्थित है?`;
                correctAnswer = qData.loc;
                // Get wrong options (locations that are not the correct answer)
                let otherLocs = [...new Set(data.map(d => d.loc).filter(l => l !== correctAnswer))];
                wrongAnswersPool = shuffle(otherLocs).slice(0, 3);
            } else {
                questionText = `इनमें से कौन सा संस्थान ${qData.loc} में स्थित है?`;
                correctAnswer = qData.org;
                // Get wrong options (organizations that are NOT in the correct location)
                let otherOrgs = data.filter(d => d.loc !== qData.loc).map(d => d.org);
                wrongAnswersPool = shuffle(otherOrgs).slice(0, 3);
            }

            document.getElementById('question').innerText = `प्रश्न ${currentQuestionIndex + 1}: ${questionText}`;

            let options = shuffle([correctAnswer, ...wrongAnswersPool]);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, correctAnswer);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true); // Disable after selection

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
                triggerFlowers();
            } else {
                btn.classList.add('wrong');
                triggerElephants();
                // Show correct answer
                allBtns.forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct');
                });
            }

            document.getElementById('score-board').innerText = `स्कोर: ${score} / 10`;
            
            if (currentQuestionIndex < currentQuizData.length - 1) {
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                document.getElementById('question').innerText = `क्विज समाप्त! आपका फाइनल स्कोर: ${score} / 10`;
                document.getElementById('options').innerHTML = '';
                document.getElementById('home-btn').style.display = 'inline-block';
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            showQuestion();
        }

        function goHome() {
            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('home').style.display = 'block';
        }

        // Animations
        function triggerFlowers() {
            for (let i = 0; i < 40; i++) {
                createEmoji('🌸', Math.random() * 3 + 2);
            }
        }

        function triggerElephants() {
            for (let i = 0; i < 20; i++) {
                createEmoji('🐘', Math.random() * 2 + 1.5); // Elephants fall a bit faster and heavier
            }
        }

        function createEmoji(symbol, duration) {
            const el = document.createElement('div');
            el.innerHTML = symbol;
            el.className = 'emoji';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = duration + 's';
            // slight random size variation
            el.style.fontSize = (Math.random() * 20 + 30) + 'px'; 
            document.body.appendChild(el);
            
            setTimeout(() => {
                el.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
