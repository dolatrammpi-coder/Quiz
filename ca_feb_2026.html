<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamesh MCQ Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .option {
            margin-bottom: 10px;
            display: block;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: background 0.3s;
        }
        .option:hover {
            background-color: #eef;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
        .correct {
            color: green;
        }
        .wrong {
            color: red;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Q: Kamesh shaitan bachha kyon hai? 🤔</h2>
    
    <form id="quizForm">
        <label class="option">
            <input type="radio" name="kamesh" value="A"> A) Kyonki woh din bhar video games khelta hai.
        </label>
        <label class="option">
            <input type="radio" name="kamesh" value="B"> B) Kyonki woh homework ki jagah bahane banata hai.
        </label>
        <label class="option">
            <input type="radio" name="kamesh" value="C"> C) Kyonki chupke se fridge se mithai chura kar khata hai.
        </label>
        <label class="option">
            <input type="radio" name="kamesh" value="D"> D) Upar diye gaye sabhi karan!
        </label>
        
        <button type="button" onclick="checkAnswer()">Jawab Check Karein</button>
    </form>

    <div id="result"></div>
</div>

<script>
    function checkAnswer() {
        const options = document.getElementsByName('kamesh');
        let selectedValue = null;
        const resultDiv = document.getElementById('result');

        for (const option of options) {
            if (option.checked) {
                selectedValue = option.value;
                break;
            }
        }

        if (selectedValue === null) {
            resultDiv.innerHTML = "<span class='wrong'>Bhai, pehle koi option toh select karo!</span>";
        } else if (selectedValue === 'D') {
            resultDiv.innerHTML = "<span class='correct'>Sahi Jawab! Kamesh sach mein ek number ka shaitan hai. 🎉</span>";
        } else {
            resultDiv.innerHTML = "<span class='wrong'>Galat Jawab! Kamesh isse bhi zyada shaitan hai. Sahi jawab D hai. 😂</span>";
        }
    }
</script>

</body>
</html>
