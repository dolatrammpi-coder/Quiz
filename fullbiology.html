<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .score-board {
            text-align: center;
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .question-number {
            font-weight: bold;
            color: #3498db;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            padding: 12px 15px;
            font-size: 16px;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover {
            background-color: #e2e6ea;
            border-color: #dae0e5;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }
        .wrong {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        .nav-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .nav-btn:hover {
            background-color: #2980b9;
        }
        .nav-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #result-screen {
            display: none;
            text-align: center;
        }
        .final-score {
            font-size: 30px;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <h1>जीव विज्ञान 100 MCQ क्विज़</h1>
    <div class="score-board">स्कोर: <span id="score">0</span> / 100</div>
    
    <div id="quiz-content">
        <div class="question-number">प्रश्न <span id="q-num">1</span>/100</div>
        <div class="question-text" id="question"></div>
        <div class="options" id="options"></div>
        
        <div class="nav-buttons">
            <button class="nav-btn" id="prev-btn" onclick="prevQuestion()" disabled>पिछला</button>
            <button class="nav-btn" id="next-btn" onclick="nextQuestion()" disabled>अगला</button>
        </div>
    </div>

    <div id="result-screen">
        <h2>क्विज़ समाप्त!</h2>
        <p>आपने 100 में से</p>
        <div class="final-score" id="final-score">0</div>

        <button class="nav-btn" onclick="location.reload()">फिर से खेलें</button>
    </div>
</div>

        { q: "कौन-सा विटामिन वसा (Fat) में घुलनशील है?", o: ["B और C", "A, D, E, K", "केवल A", "केवल C"], a: 1 },
        { q: "गैस्ट्रिक जूस (जठर रस) में कौन-सा अम्ल पाया जाता है?", o: ["सल्फ्यूरिक अम्ल", "हाइड्रोक्लोरिक अम्ल (HCl)", "नाइट्रिक अम्ल", "एसिटिक अम्ल"], a: 1 },
        { q: "हॉर्मोन 'एड्रीनलीन' को किस नाम से जाना जाता है?", o: ["ग्रोथ हार्मोन", "लड़ो या उड़ो (Fight or Flight)", "स्लीप हार्मोन", "लव हार्मोन"], a: 1 },

        { q: "पादप कोशिका भित्ति किसकी बनी होती है?", o: ["प्रोटीन", "लिपिड", "सेल्युलोज", "काइटिन"], a: 2 },
        { q: "कवक की कोशिका भित्ति किसकी बनी होती है?", o: ["सेल्युलोज", "काइटिन", "प्रोटीन", "स्टार्च"], a: 1 },
        { q: "दूध को दही में बदलने वाला जीवाणु कौन-सा है?", o: ["राइजोबियम", "लैक्टोबैसिलस", "ई. कोलाई", "स्ट्रेप्टोकोकस"], a: 1 },
        { q: "'किसान का मित्र' किसे कहा जाता है?", o: ["केंचुआ", "चूहा", "सांप", "टिड्डी"], a: 0 },
        { q: "सबसे लम्बा जीवित वृक्ष कौन-सा है?", o: ["नीलगिरी", "सिकोया (Sequoia)", "बरगद", "देवदार"], a: 1 },
        { q: "बांस (Bamboo) क्या है?", o: ["वृक्ष", "झाड़ी", "घास (Grass)", "जड़ी-बूटी"], a: 2 },
        { q: "हृदय की धड़कन को नियंत्रित करने वाला खनिज कौन-सा है?", o: ["सोडियम", "पोटेशियम", "लोहा", "कैल्शियम"], a: 1 },
        { q: "प्याज और लहसुन में गंध किसके कारण होती है?", o: ["सल्फर", "पोटेशियम", "क्लोरीन", "सोडियम"], a: 0 },
        { q: "गाजर का नारंगी रंग किसके कारण होता है?", o: ["कैरोटीन", "क्लोरोफिल", "लाइकोपीन", "बिटानिन"], a: 0 },
        { q: "टमाटर का लाल रंग किसके कारण होता है?", o: ["लाइकोपीन", "कैरोटीन", "एंथोसायनिन", "हीमोग्लोबिन"], a: 0 },

        { q: "लौंग (Clove) किससे प्राप्त होती है?", o: ["जड़ से", "तने से", "सूखी पुष्प कली से", "बीज से"], a: 2 },
        { q: "कॉफी पाउडर के साथ मिलाया जाने वाला 'चिकोरी' चूर्ण किससे प्राप्त होता है?", o: ["जड़ों से", "पत्तियों से", "बीजों से", "तने से"], a: 0 },
        { q: "कुनैन (मलेरिया की दवा) किस पेड़ की छाल से प्राप्त होती है?", o: ["नीम", "सिनकोना", "यूकेलिप्टस", "बरगद"], a: 1 },
        { q: "'ओरिजन ऑफ स्पीशीज' (Origin of Species) पुस्तक किसने लिखी?", o: ["चार्ल्स डार्विन", "लैमार्क", "ह्यूगो डी व्रीस", "मेंडल"], a: 0 },
        { q: "आरएनए (RNA) में थायमीन की जगह कौन-सा नाइट्रोजन बेस होता है?", o: ["एडेनिन", "गुआनिन", "साइटोसिन", "यूरेसिल"], a: 3 },
        { q: "रक्त जमने (Blood Clotting) में किस खनिज की आवश्यकता होती है?", o: ["लोहा", "कैल्शियम", "सोडियम", "पोटेशियम"], a: 1 },
        { q: "मानव शरीर में रक्त का थक्का बनने में लगभग कितना समय लगता है?", o: ["1-2 मिनट", "2-7 मिनट", "10-15 मिनट", "आधा घंटा"], a: 1 }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const qNumEl = document.getElementById("q-num");
    const scoreEl = document.getElementById("score");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    
    function loadQuestion() {
        const q = quizData[currentQuestionIndex];
        qNumEl.innerText = currentQuestionIndex + 1;
        questionEl.innerText = q.q;
        optionsEl.innerHTML = "";
        
        q.o.forEach((option, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = option;
            
            // If already answered
            if (userAnswers[currentQuestionIndex] !== null) {
                btn.disabled = true;
                if (index === q.a) {
                    btn.classList.add("correct");
                } else if (index === userAnswers[currentQuestionIndex]) {
                    btn.classList.add("wrong");
                }
            } else {
                btn.onclick = () => selectAnswer(index, btn);
            }
            
            optionsEl.appendChild(btn);
        });

        prevBtn.disabled = currentQuestionIndex === 0;
        
        if (currentQuestionIndex === quizData.length - 1) {
            nextBtn.innerText = "परिणाम देखें";
            nextBtn.disabled = userAnswers[currentQuestionIndex] === null;
        } else {
            nextBtn.innerText = "अगला";
            nextBtn.disabled = userAnswers[currentQuestionIndex] === null;
        }
    }

    function selectAnswer(selectedIndex, btn) {
        const q = quizData[currentQuestionIndex];
        userAnswers[currentQuestionIndex] = selectedIndex;
        
        const allButtons = optionsEl.children;
        for (let i = 0; i < allButtons.length; i++) {
            allButtons[i].disabled = true;
            if (i === q.a) {
                allButtons[i].classList.add("correct");
            }
        }
        
        if (selectedIndex === q.a) {
            score++;
            scoreEl.innerText = score;
        } else {
            btn.classList.add("wrong");
        }
        
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function showResult() {
        document.getElementById("quiz-content").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = score;
    }

    // Initialize Quiz
    loadQuestion();
</script>
