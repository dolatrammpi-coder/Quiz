<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">

<title>Harappa & Sindhu Civilization - Complete Line-by-Line Quiz</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  body { 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background-color: #f0f2f5; 
    margin: 0; 
    padding: 20px; 
    display: flex; 
    justify-content: center; 
  }
  .quiz-container { 
    background-color: white; 
    border-radius: 12px; 
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
    padding: 25px; 
    max-width: 700px; 
    width: 100%; 
    position: relative;
    overflow: hidden;
  }
  h2 { color: #1c1e21; font-size: 1.25em; margin-top: 10px; line-height: 1.4;}

  .back-btn { text-decoration: none; color: #1a73e8; font-weight: bold; font-size: 1em; margin-right: 15px; padding: 6px 12px; background: #e8f0fe; border-radius: 8px; transition: background 0.2s;}

  .page-title { margin: 0; font-size: 1.4em; color: #1c1e21; }

  .progress-container {
    width: 100%;
    background-color: #e4e6eb;
    border-radius: 5px;
    height: 8px;
    margin-bottom: 20px;
  }
  .progress-bar {
    height: 10px;
    background-color: #1a73e8;
    border-radius: 5px;
    width: 0%;

  }

  .header-info { 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    margin-bottom: 15px; 
    color: #606770; 
    font-size: 1em;

    padding: 5px 12px;

    align-items: center;

    border: 2px solid transparent; 
    padding: 15px; 
    width: 100%; 
    text-align: left; 
    margin-bottom: 10px; 
    border-radius: 8px;

  .wrong { background-color: #fce8e6; color: #c5221f; border: 2px solid #c5221f; animation: shake 0.4s ease; }
  
  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }

    background-color: #1a73e8; 
    color: white; 
    border: none; 
    padding: 14px 20px; 
    border-radius: 8px; 
    cursor: pointer; 
    font-size: 1.1em; 
    font-weight: bold;

  .s-wrong { color: #c5221f; font-size: 0.95em; margin-bottom: 4px;}

</head>
<body>

  { q: "सिन्धु घाटी सभ्यता में किस स्थल से घरों में कुँओं के अवशेष मिले हैं?", options: ["लोथल", "मोहनजोदड़ो", "कालीबंगा", "धोलावीरा"], ans: 1 },

  { q: "चन्हुदड़ो के उत्खनन का निर्देशन किसने किया था?", options: ["दयाराम साहनी ने", "जे. एच. मैके ने", "माधोस्वरूप वत्स ने", "फजल अहमद खाँ ने"], ans: 1 },
  { q: "सिन्धु सभ्यता का पत्तन नगर (बन्दरगाह) था?", options: ["कालीबंगा", "रोपड़", "लोथल", "बनवाली"], ans: 2 },
  { q: "किस स्थल से युगल शवाधान/द्विशव संस्कार का प्रमाण मिला है?", options: ["मोहनजोदड़ो", "हड़प्पा", "लोथल", "धोलावीरा"], ans: 2 },
  { q: "सिन्धु सभ्यता की मुहरों पर बने 'स्वास्तिक' के चिह्न से किस देवता की उपासना का अनुमान लगाया जाता है?", options: ["सूर्य देवता का", "अग्नि देवता का", "इन्द्र देवता का", "वरुण देवता का"], ans: 0 },
  { q: "सिन्धु सभ्यता का समूचा क्षेत्र कैसा है?", options: ["वर्गाकार", "आयताकार", "त्रिभुजाकार", "गोलाकार"], ans: 2 },
  { q: "सैंधव सभ्यता का पश्चिमी विस्तार कहाँ तक है?", options: ["आलमगीरपुर", "सुत्कागेंडोर", "माण्डा", "दैमाबाद"], ans: 1 },
  { q: "सैंधव सभ्यता में मुहरों पर किस पशु का सर्वाधिक उत्कीर्णन हुआ है?", options: ["हाथी", "शेर", "घोड़ा", "कूबड़वाला वृषभ (सांड)"], ans: 3 },
  { q: "सैंधव सभ्यता के महान स्नानागार कहाँ से प्राप्त हुए हैं?", options: ["हड़प्पा से", "लोथल से", "मोहनजोदड़ो से", "कालीबंगा से"], ans: 2 },
  { q: "सैंधव सभ्यताकालीन अर्थव्यवस्था प्रमुख रूप से किस पर आधारित थी?", options: ["व्यापार पर", "कृषि पर", "पशुपालन पर", "शिल्प पर"], ans: 1 },

  { q: "सैंधव सभ्यता के निवासियों द्वारा किस धातु का प्रयोग सर्वाधिक किया गया?", options: ["लोहे का", "तांबे का", "कांस्य का", "चांदी का"], ans: 2 },
  { q: "सैंधव निवासियों के लिए किस वस्तु का आयात सबसे महत्वपूर्ण था?", options: ["कपड़ा", "अन्न", "धातु एवं बहुमूल्य पत्थर", "हथियार"], ans: 2 },
  { q: "हड़प्पा शहर किस नदी के किनारे स्थित था?", options: ["सिन्धु", "रावी", "सतलज", "घग्घर"], ans: 1 },
  { q: "आलमगीरपुर किस नदी के किनारे स्थित था?", options: ["हिण्डन", "भोगवा", "मादर", "दाश्क"], ans: 0 }
];

let currentQuiz = 0;
let score = 0;
let answered = false;
let timeLeft = 15;
let timerInterval;
let userAnswers = []; 

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const quizDiv = document.getElementById("quiz");
const scoreBox = document.getElementById("scoreBox");
const finalScore = document.getElementById("finalScore");
const qCount = document.getElementById("q-count");
const scoreTracker = document.getElementById("score-tracker");
const timeEl = document.getElementById("time");
const progressBar = document.getElementById("progressBar");
const summaryBox = document.getElementById("summaryBox");
const topBar = document.getElementById("topBar");

function startTimer() {
  timeLeft = 15;
  timeEl.innerText = timeLeft;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timeEl.innerText = timeLeft;
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimeOut();
    }
  }, 1000);
}

function handleTimeOut() {
  if(answered) return;
  answered = true;
  const correctAns = quizData[currentQuiz].ans;
  const allBtns = optionsEl.querySelectorAll(".option");
  
  allBtns[correctAns].classList.add("correct");
  allBtns.forEach(b => {
      b.disabled = true;
      b.style.cursor = "default";
      b.style.opacity = "0.7";
  });
  
  userAnswers.push({
      q: quizData[currentQuiz].q,
      selected: "समय समाप्त ⏱",
      correct: quizData[currentQuiz].options[correctAns],
      isCorrect: false
  });

  nextBtn.style.display = "block";
  checkQuizEnd();
}

function loadQuiz() {
  answered = false;
  nextBtn.style.display = "none";
  const currentData = quizData[currentQuiz];
  
  const progressPercent = ((currentQuiz) / quizData.length) * 100;
  progressBar.style.width = progressPercent + "%";
  
  questionEl.innerText = currentData.q;
  qCount.innerText = "प्र " + (currentQuiz + 1) + " / " + quizData.length;
  scoreTracker.innerText = "⭐ " + score;
  optionsEl.innerHTML = "";
  
  currentData.options.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.classList.add("option");
    btn.onclick = () => selectOption(index, btn);
    optionsEl.appendChild(btn);
  });
  
  startTimer();
}

function selectOption(index, btn) {
  if(answered) return;
  answered = true;
  clearInterval(timerInterval); 
  
  const correctAns = quizData[currentQuiz].ans;
  const allBtns = optionsEl.querySelectorAll(".option");
  const isCorrect = index === correctAns;
  
  if(isCorrect) {
    btn.classList.add("correct");
    score++;
    scoreTracker.innerText = "⭐ " + score;
  } else {
    btn.classList.add("wrong");
    allBtns[correctAns].classList.add("correct");
  }

  userAnswers.push({
      q: quizData[currentQuiz].q,
      selected: quizData[currentQuiz].options[index],
      correct: quizData[currentQuiz].options[correctAns],
      isCorrect: isCorrect
  });
  
  allBtns.forEach(b => {
      b.disabled = true; 
      b.style.cursor = "default";
  });
  
  nextBtn.style.display = "block";
  checkQuizEnd();
}

function checkQuizEnd() {
    if(currentQuiz === quizData.length - 1) {
      nextBtn.innerText = "रिजल्ट देखें 🏆";
  }
}

function nextQuestion() {
  currentQuiz++;
  if(currentQuiz < quizData.length) {
    loadQuiz();
  } else {
    showScore();
  }
}

function showScore() {
  quizDiv.style.display = "none";
  topBar.style.display = "none";
  scoreBox.style.display = "block";
  progressBar.style.width = "100%";
  finalScore.innerText = score + " / " + quizData.length;
  
  let summaryHTML = "<h3 style='text-align:center; margin-top:0; color:#1c1e21;'>उत्तरों की समीक्षा (Review)</h3>";
  userAnswers.forEach((ans, i) => {
      summaryHTML += `<div class="summary-item">
          <div class="s-q">Q${i+1}. ${ans.q}</div>
          ${ans.isCorrect
              ? `<div class="s-correct">✅ आपका उत्तर: ${ans.selected}</div>`
              : `<div class="s-wrong">❌ आपका उत्तर: ${ans.selected}</div>
                 <div class="s-true-ans">👉 सही उत्तर: ${ans.correct}</div>`
          }
      </div>`;
  });
  summaryBox.innerHTML = summaryHTML;

  confetti({
    particleCount: 150,
    spread: 80,
    origin: { y: 0.6 },
    colors: ['#1a73e8', '#34a853', '#fbbc04', '#ea4335']
  });
}

function retryQuiz() {
  currentQuiz = 0;
  score = 0;
  userAnswers = []; 
  quizDiv.style.display = "block";
  topBar.style.display = "flex";
  scoreBox.style.display = "none";
  nextBtn.innerText = "अगला प्रश्न ➔";
  loadQuiz();
}

// Initialize
loadQuiz();
</script>
