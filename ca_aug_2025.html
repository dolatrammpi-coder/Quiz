const paletteEl = document.getElementById("palette");
const summaryBox = document.getElementById("summaryBox");

// Init Question Palette
function initPalette() {
  paletteEl.innerHTML = "";
  for(let i = 0; i < quizData.length; i++) {
    const btn = document.createElement("button");
    btn.innerText = i + 1;
    btn.classList.add("palette-btn");
    btn.id = "pal-btn-" + i;
    btn.onclick = () => goToQuestion(i);
    paletteEl.appendChild(btn);
  }
}

function updatePaletteUI() {
  const allPalBtns = document.querySelectorAll(".palette-btn");
  allPalBtns.forEach((btn, index) => {
    // Remove old classes
    btn.classList.remove("current", "answered-correct", "answered-wrong", "timeout");
    
    // Check if answered
    if(userState[index]) {
      if(userState[index].status === "timeout") {
        btn.classList.add("timeout");
      } else if(userState[index].isCorrect) {
        btn.classList.add("answered-correct");
      } else {
        btn.classList.add("answered-wrong");
      }
    }
    
    // Highlight current
    if(index === currentQuiz) {
      btn.classList.add("current");
    }
  });
}

function goToQuestion(index) {
  currentQuiz = index;
  loadQuiz();
}

function startTimer() {
  timeLeft = 20;
  timeEl.innerText = timeLeft;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timeEl.innerText = timeLeft;
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimeOut();
    }
  }, 1000);
}

function handleTimeOut() {
  clearInterval(timerInterval);
  timeEl.innerText = "Time Out";
  
  const correctAns = quizData[currentQuiz].ans;
  const allBtns = optionsEl.querySelectorAll(".option");
  
  allBtns[correctAns].classList.add("correct");
  allBtns.forEach(b => { b.disabled = true; b.style.cursor = "default"; b.style.opacity = "0.7"; });
  
  // Save State
  userState[currentQuiz] = {
      status: "timeout",
      selected: "समय समाप्त ⏱",
      correct: quizData[currentQuiz].options[correctAns],
      isCorrect: false
  };

  updatePaletteUI();
  nextBtn.style.display = "block";
  checkQuizEnd();
}

function loadQuiz() {
  clearInterval(timerInterval);
  nextBtn.style.display = "none";
  
  const currentData = quizData[currentQuiz];
  const progressPercent = ((currentQuiz) / quizData.length) * 100;
  progressBar.style.width = progressPercent + "%";
  
  questionEl.innerText = currentData.q;
  qCount.innerText = "प्र " + (currentQuiz + 1) + " / " + quizData.length;
  scoreTracker.innerText = "⭐ " + score;
  optionsEl.innerHTML = "";
  
  // Check if question was already answered
  const state = userState[currentQuiz];

  currentData.options.forEach((opt, index) => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.classList.add("option");
    
    // Apply saved state
    if(state) {
        btn.disabled = true;
        btn.style.cursor = "default";
        
        if(state.status === "timeout" && index === currentData.ans) {
           btn.classList.add("correct");
           btn.style.opacity = "0.7";
        }
        else if (state.status === "answered") {
           if(index === currentData.ans) btn.classList.add("correct");
           if(index === state.selectedIndex && !state.isCorrect) btn.classList.add("wrong");
        }
    } else {
        btn.onclick = () => selectOption(index, btn);
    }
    
    optionsEl.appendChild(btn);
  });

  updatePaletteUI();
  
  if(state) {
      timeEl.innerText = state.status === "timeout" ? "Out" : "Done";
      nextBtn.style.display = "block";
      checkQuizEnd();
  } else {
      startTimer();
  }
}

function selectOption(index, btn) {
  clearInterval(timerInterval); 
  
  const correctAns = quizData[currentQuiz].ans;
  const allBtns = optionsEl.querySelectorAll(".option");
  const isCorrect = index === correctAns;
  
  if(isCorrect) {
    btn.classList.add("correct");
    score++;
    scoreTracker.innerText = "⭐ " + score;
  } else {
    btn.classList.add("wrong");
    allBtns[correctAns].classList.add("correct");
  }

  // Save State
  userState[currentQuiz] = {
      status: "answered",
      selectedIndex: index,
      selected: quizData[currentQuiz].options[index],
      correct: quizData[currentQuiz].options[correctAns],
      isCorrect: isCorrect
  };
  
  allBtns.forEach(b => { b.disabled = true; b.style.cursor = "default"; });
  updatePaletteUI();
  
  nextBtn.style.display = "block";
  checkQuizEnd();
}

function checkQuizEnd() {
    // If all questions are answered, show result button
    const allAnswered = userState.every(state => state !== null);
    if(allAnswered || currentQuiz === quizData.length - 1) { 
        nextBtn.innerText = allAnswered ? "रिजल्ट देखें 🏆" : "अगला प्रश्न ➔";
    }
}

function nextQuestion() {
  const allAnswered = userState.every(state => state !== null);
  if(allAnswered && currentQuiz === quizData.length - 1) {
      showScore();
      return;
  }
  
  if(currentQuiz < quizData.length - 1) { 
      currentQuiz++;
      loadQuiz(); 
  } else { 
      showScore(); 
  }
}

function showScore() {
  quizDiv.style.display = "none";
  scoreBox.style.display = "block";
  progressBar.style.width = "100%";
  finalScore.innerText = score + " / " + quizData.length;
  
  let summaryHTML = "<h3 style='text-align:center; margin-top:0; color:#1c1e21;'>उत्तरों की समीक्षा (Review)</h3>";
  
  userState.forEach((ans, i) => {
      if(!ans) return; // Skip if somehow unanswered
      summaryHTML += `<div class="summary-item">
          <div class="s-q">Q${i+1}. ${quizData[i].q}</div>
          ${ans.isCorrect
              ? `<div class="s-correct">✅ आपका उत्तर: ${ans.selected}</div>`
              : `<div class="s-wrong">❌ आपका उत्तर: ${ans.selected}</div>
                 <div class="s-true-ans">👉 सही उत्तर: ${ans.correct}</div>`
          }
      </div>`;
  });
  summaryBox.innerHTML = summaryHTML;

  confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#1a73e8', '#34a853', '#fbbc04', '#ea4335'] });
}

function retryQuiz() {
  currentQuiz = 0; 
  score = 0; 
  userState = new Array(quizData.length).fill(null); 
  
  quizDiv.style.display = "block"; 
  scoreBox.style.display = "none";
  nextBtn.innerText = "अगला प्रश्न ➔";
  
  initPalette();
  loadQuiz();
}

// Initialize on page load
initPalette();
loadQuiz();
</script>
</body>
</html>
