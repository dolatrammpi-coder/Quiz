        ["भाला फेंक दिवस (नीरज चोपड़ा)", "7 अगस्त", ""],

        ["स्वतंत्रता दिवस (भारत)", "15 अगस्त", ""],
        ["सद्भावना दिवस (राजीव गांधी)", "20 अगस्त", ""],
        ["राष्ट्रीय शिक्षक दिवस", "5 सितम्बर", ""],
        ["हिन्दी दिवस", "14 सितम्बर", ""],
        ["अहिंसा दिवस/गांधी जयंती", "2 अक्टूबर", ""],

        ["भारतीय वायुसेना दिवस", "8 अक्टूबर", ""],
        ["अंतर्राष्ट्रीय बालिका दिवस", "11 अक्टूबर", ""],
        ["विश्व छात्र दिवस (एपीजे अब्दुल कलाम)", "15 अक्टूबर", ""],
        ["संयुक्त राष्ट्र दिवस", "24 अक्टूबर", ""],
        ["अंतर्राष्ट्रीय बायोस्फीयर रिजर्व दिवस", "3 नवम्बर", ""],
        ["विश्व विज्ञान दिवस", "10 नवम्बर", ""],
        ["राष्ट्रीय शिक्षा दिवस", "11 नवम्बर", ""],
        ["राष्ट्रीय पक्षी दिवस", "12 नवम्बर", ""],
        ["जनजातीय गौरव दिवस (बिरसा मुंडा)", "15 नवम्बर", ""],
        ["शहादत दिवस (गुरू तेग बहादुर)", "24 नवम्बर", ""],
        ["नो नॉन-वेज डे (उत्तर प्रदेश)", "25 नवम्बर", ""],
        ["विश्व कम्प्यूटर साक्षरता दिवस", "2 दिसम्बर", ""],
        ["भारतीय नौसेना दिवस", "4 दिसम्बर", ""],
        ["विश्व मृदा दिवस", "5 दिसम्बर", ""],
        ["मैत्री दिवस (भारत-बांग्लादेश)", "6 दिसम्बर", ""],
        ["झंडा दिवस", "7 दिसम्बर", ""],
        ["राष्ट्रीय ऊर्जा संरक्षण/विश्व ऊर्जा दिवस", "14 दिसम्बर", ""],
        ["राष्ट्रीय गणित दिवस (श्री रामानुजन)", "22 दिसम्बर", ""],
        ["किसान दिवस (चौधरी चरण सिंह)", "23 दिसम्बर", ""],
        ["सुशासन दिवस / क्रिसमस-डे", "25 दिसम्बर", ""],
        ["वीर बाल दिवस", "26 दिसम्बर", ""]
    ];

    // सभी संभव विकल्प (गलत विकल्पों के लिए)
    const allEvents = [...new Set(rawData.map(d => d[0]))];
    const allDates = [...new Set(rawData.map(d => d[1]))];
    const allThemes = [...new Set(rawData.filter(d => d[2] !== "").map(d => d[2]))];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let userAnswers = {}; 
    let isCurrentAnswered = false;

    // शफल फंक्शन
    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function changeSet() {
        const mode = document.getElementById('set-select').value;
        loadQuiz(mode);
    }

    function loadQuiz(mode) {
        let filteredData = rawData;
        let limit = 100;

        if (mode === 'themes') {
            filteredData = rawData.filter(d => d[2] !== ""); // सिर्फ थीम वाले प्रश्न
            limit = filteredData.length; // जितने उपलब्ध हैं सब
        }

        let shuffledData = shuffleArray(filteredData).slice(0, limit);

        currentQuestions = shuffledData.map(d => {
            let questionText, correctAns, pool;

            if (mode === 'dates') {
                questionText = `"${d[0]}" कब मनाया जाता है?`;
                correctAns = d[1];
                pool = allDates;
            } else if (mode === 'days') {
                questionText = `"${d[1]}" को कौन सा महत्वपूर्ण दिवस मनाया जाता है?`;
                correctAns = d[0];
                pool = allEvents;
            } else {
                questionText = `"${d[0]}" का नवीनतम मुख्य विषय (Theme) क्या है?`;
                correctAns = d[2];
                pool = allThemes;
            }

            let distractors = pool.filter(item => item !== correctAns);
            distractors = shuffleArray([...new Set(distractors)]).slice(0, 3);
            let displayOpts = shuffleArray([correctAns, ...distractors]);

            return { question: questionText, answer: correctAns, options: displayOpts };
        });

        currentQuestionIndex = 0;
        userAnswers = {};
        
        document.getElementById('total-q-num').innerText = currentQuestions.length;
        document.getElementById('quiz-main-container').style.display = 'block';
        document.getElementById('summary-container').style.display = 'none';
        
        renderQuestion();
        renderPagination();
    }

    function renderQuestion() {
        isCurrentAnswered = !!userAnswers[currentQuestionIndex];
        const qText = document.getElementById('question-text');
        const optionsList = document.getElementById('options-list');
        const resultText = document.getElementById('result-text');
        const qData = currentQuestions[currentQuestionIndex];

        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
        qText.innerText = `${currentQuestionIndex + 1}. ${qData.question}`;
        optionsList.innerHTML = '';
        resultText.innerText = '';

        qData.options.forEach((opt) => {
            const li = document.createElement('li');
            li.innerText = opt;
            if (!isCurrentAnswered) {
                li.onclick = () => selectOption(opt, li);
            } else {
                li.classList.add('disabled');
                if (opt === qData.answer) li.classList.add('correct');
                else if (userAnswers[currentQuestionIndex] === opt) li.classList.add('wrong');
            }
            optionsList.appendChild(li);
        });

        updateButtons();
        updatePaginationHighlight();
    }

    function selectOption(selectedOpt, liElement) {
        if (isCurrentAnswered) return;
        isCurrentAnswered = true;
        
        userAnswers[currentQuestionIndex] = selectedOpt;
        const correctAns = currentQuestions[currentQuestionIndex].answer;
        const allLis = document.getElementById('options-list').querySelectorAll('li');
        const resultText = document.getElementById('result-text');

        allLis.forEach(li => {
            li.classList.add('disabled');
            li.onclick = null;
            if (li.innerText === correctAns) li.classList.add('correct');
            if (li.innerText === selectedOpt && selectedOpt !== correctAns) li.classList.add('wrong');
        });

        if (selectedOpt === correctAns) {
            resultText.innerText = "✅ शानदार! सही उत्तर।";
            resultText.style.color = "green";
        } else {
            resultText.innerText = "❌ ऊप्स! गलत उत्तर।";
            resultText.style.color = "red";
        }
        updatePaginationHighlight();
    }

    function nextQuestion() {
        if (currentQuestionIndex < currentQuestions.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    }

    function renderPagination() {
        const container = document.getElementById('pagination-container');
        container.innerHTML = '';
        currentQuestions.forEach((_, index) => {
            const div = document.createElement('div');
            div.className = 'page-num';
            div.innerText = index + 1;
            div.onclick = () => { currentQuestionIndex = index; renderQuestion(); };
            container.appendChild(div);
        });
        updatePaginationHighlight();
    }

    function updatePaginationHighlight() {
        const pages = document.querySelectorAll('.page-num');
        pages.forEach((page, index) => {
            page.classList.remove('active', 'answered-correct', 'answered-wrong');
            if (index === currentQuestionIndex) {
                page.classList.add('active');
                page.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            if (userAnswers[index]) {
                if (userAnswers[index] === currentQuestions[index].answer) page.classList.add('answered-correct');
                else page.classList.add('answered-wrong');
            }
        });
    }

    function updateButtons() {
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        document.getElementById('next-btn').disabled = currentQuestionIndex === currentQuestions.length - 1;
    }

    function showSummary() {
        document.getElementById('quiz-main-container').style.display = 'none';
        const summaryContainer = document.getElementById('summary-container');
        summaryContainer.style.display = 'block';
        
        let score = 0;
        const setName = document.getElementById('set-select').options[document.getElementById('set-select').selectedIndex].text.split('(')[0];
        
        let summaryHTML = `<div class="header"><h2>टेस्ट का परिणाम<br><span style="font-size:18px; color:#555;">${setName}</span></h2></div>`;
        let listHTML = '';
        
        currentQuestions.forEach((q, index) => {
            const userAns = userAnswers[index];
            const isCorrect = userAns === q.answer;
            let itemClass = 'summary-unattempted';
            
            if (userAns) {
                if (isCorrect) { score++; itemClass = 'summary-correct'; } 
                else { itemClass = 'summary-wrong'; }
            }

            listHTML += `
                <div class="summary-item ${itemClass}">
                    <p style="color:#0056b3;"><strong>प्रश्न ${index + 1}:</strong> ${q.question}</p>
                    <p style="color: ${!userAns ? '#856404' : (isCorrect ? '#155724' : '#721c24')}">
                        <strong>आपका उत्तर:</strong> ${userAns || 'कोई उत्तर नहीं दिया (Unattempted)'}
                    </p>
                    ${!isCorrect ? `<p style="color: #155724;"><strong>सही उत्तर:</strong> ${q.answer}</p>` : ''}
                </div>
            `;
        });
        
        summaryHTML += `<div class="score-board">आपका स्कोर: <span style="color:#007bff">${score}</span> / ${currentQuestions.length}</div>`;
        summaryHTML += listHTML;
        summaryHTML += `<button class="submit-btn" onclick="location.reload()" style="margin-top:20px;">फिर से नया टेस्ट शुरू करें (Restart)</button>`;
        
        summaryContainer.innerHTML = summaryHTML;
        window.scrollTo(0, 0); 
    }

    window.onload = () => loadQuiz('dates');

</script>
