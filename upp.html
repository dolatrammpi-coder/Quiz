<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>यूपीपी सामान्य ज्ञान</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
        }
        .header {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        .back-btn {
            text-decoration: none;
            background-color: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            margin-right: 20px;
            font-size: 14px;
        }
        .back-btn:hover {
            background-color: #555;
        }
        h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 22px;
            flex-grow: 1;
            text-align: center;
        }
        .set-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }
        .set-card {
            text-decoration: none;
            background-color: #ffffff;
            color: #2980b9;
            padding: 18px 10px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: 600;
            border: 1px solid #dcdde1;
            transition: all 0.3s ease;
        }
        .set-card:hover {
            background-color: #2980b9;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(41, 128, 185, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">⬅ Back</a>
        <h1>यूपीपी सामान्य ज्ञान</h1>
    </div>

    <div class="set-grid">
        <a href="set1.html" class="set-card">Set 1</a>
        <a href="set2.html" class="set-card">Set 2</a>
        <a href="set3.html" class="set-card">Set 3</a>
        <a href="set4.html" class="set-card">Set 4</a>
        <a href="set5.html" class="set-card">Set 5</a>
        <a href="set6.html" class="set-card">Set 6</a>
        <a href="set7.html" class="set-card">Set 7</a>
        <a href="set8.html" class="set-card">Set 8</a>
        <a href="set9.html" class="set-card">Set 9</a>
        <a href="set10.html" class="set-card">Set 10</a>
        <a href="set11.html" class="set-card">Set 11</a>
        <a href="set12.html" class="set-card">Set 12</a>
        <a href="set13.html" class="set-card">Set 13</a>
        <a href="set14.html" class="set-card">Set 14</a>
        <a href="set15.html" class="set-card">Set 15</a>
        <a href="set16.html" class="set-card">Set 16</a>
        <a href="set17.html" class="set-card">Set 17</a>
        <a href="set18.html" class="set-card">Set 18</a>
        <a href="set19.html" class="set-card">Set 19</a>
        <a href="set20.html" class="set-card">Set 20</a>
    </div>

</body>
</html>
