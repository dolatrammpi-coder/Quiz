<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भारत की प्रसिद्ध कढ़ाई कला - MCQ Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            margin: 0;
            padding: 0;
        }
        /* Header & Back Button */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-right: 15px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background-color: #c0392b;
        }
        .header-title {
            font-size: 1.2rem;
            margin: 0;
        }

        /* Container */
        .container {
            max-width: 850px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        h1, h2 {
            text-align: center;
            color: #2980b9;
        }
        
        /* Screens */
        .menu-screen, .quiz-screen, .result-screen { display: none; }
        .active { display: block; }
        
        /* Buttons */
        .btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn:hover { background-color: #219150; }
        .btn-start {
            width: 100%;
            max-width: 350px;
            display: block;
            margin: 15px auto;
        }
        
        /* Quiz Elements */
        .question-box {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;
        }
        .question-text {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .options-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-label {
            background-color: #fff;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }
        .option-label:hover {
            background-color: #f1f8ff;
            border-color: #3498db;
        }
        input[type="radio"] {
            transform: scale(1.3);
            margin-right: 10px;
            cursor: pointer;
        }
        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 2px solid #ecf0f1;
            padding-top: 15px;
        }
        .progress {
            font-weight: bold;
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        .category-badge {
            display: inline-block;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .cat-place { background: #d35400; }
        .cat-feature { background: #8e44ad; }
        
        .correct-ans { color: #27ae60; font-weight: bold; margin-top: 15px; display: none; font-size: 1.1rem;}
        .wrong-ans { color: #e74c3c; font-weight: bold; margin-top: 15px; display: none; font-size: 1.1rem;}
        
        .shuffle-note {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<!-- Header with Back Button -->
<div class="header">
    <a href="anc.html" class="back-btn">⬅ Back</a>
    <h3 class="header-title">कला एवं संस्कृति - कढ़ाई कलाएँ</h3>
</div>

<div class="container">
    <!-- Menu Screen -->
    <div id="menuScreen" class="menu-screen active">
        <h1>भारत की प्रसिद्ध कढ़ाई कलाएँ</h1>
        <p class="shuffle-note">🔀 Shuffle Feature Active: हर बार टेस्ट देने पर प्रश्न और विकल्प अपने आप बदल जाएंगे।</p>
        
        <button class="btn btn-start" onclick="startTest('all')">🏆 सम्पूर्ण टेस्ट: 58 MCQs<br><small>(29 स्थान + 29 विशेषताएं)</small></button>
        <button class="btn btn-start" onclick="startTest(30)">⚡ मिनी टेस्ट: 30 MCQs<br><small>(रैंडम प्रश्न)</small></button>
        <button class="btn btn-start" onclick="startTest(20)">🎯 क्विक टेस्ट: 20 MCQs<br><small>(रैंडम प्रश्न)</small></button>
    </div>

    <!-- Quiz Screen -->
    <div id="quizScreen" class="quiz-screen">
        <h2 id="quizTitle">Test</h2>
        <div class="question-box">
            <span id="catBadge" class="category-badge"></span>
            <div id="questionText" class="question-text">प्रश्न यहाँ आएगा</div>
            <div id="optionsContainer" class="options-box"></div>
            <div id="feedbackText" class="correct-ans"></div>
        </div>
        <div class="quiz-footer">
            <span id="progressText" class="progress"></span>
            <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display: none; background-color: #3498db;">अगला प्रश्न ➡</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="result-screen">
        <h1>परिणाम</h1>
        <h2 id="scoreText">Your Score: 0</h2>
        <button class="btn btn-start" onclick="location.reload()">होम पर वापस जाएँ</button>
    </div>
</div>

<script>
    // --- 58 QUESTIONS FROM THE EMBROIDERY TABLES ---
    const rawQuestionBank = [
        // ================= 29 PLACES (स्थान आधारित) =================
        { category: "place", question: "प्रसिद्ध 'चिकनकारी' कढ़ाई का संबंध मुख्य रूप से कहाँ से है?", options: ["लखनऊ, उत्तर प्रदेश", "जयपुर, राजस्थान", "सूरत, गुजरात", "अमृतसर, पंजाब"], answer: "लखनऊ, उत्तर प्रदेश" },
        { category: "place", question: "'कांथा' कढ़ाई का संबंध मुख्य रूप से किन राज्यों से है?", options: ["पश्चिम बंगाल और ओडिशा", "गुजरात और राजस्थान", "कर्नाटक और केरल", "बिहार और झारखंड"], answer: "पश्चिम बंगाल और ओडिशा" },
        { category: "place", question: "'फुलकारी' और 'बाग' कढ़ाई कलाएँ किस राज्य की विशेषता हैं?", options: ["पंजाब", "हरियाणा", "जम्मू एवं कश्मीर", "गुजरात"], answer: "पंजाब" },
        { category: "place", question: "सोने-चांदी के तारों वाली 'ज़रदोज़ी' कढ़ाई मुख्य रूप से कहाँ उत्पादित की जाती है?", options: ["उत्तर प्रदेश", "महाराष्ट्र", "तमिलनाडु", "ओडिशा"], answer: "उत्तर प्रदेश" },
        { category: "place", question: "'कशीदाकारी' कढ़ाई किस राज्य/केन्द्र-शासित प्रदेश से संबंधित है?", options: ["जम्मू एवं कश्मीर", "हिमाचल प्रदेश", "उत्तराखंड", "सिक्किम"], answer: "जम्मू एवं कश्मीर" },
        { category: "place", question: "सुई (क्रोशिया) वाली 'आरी' कढ़ाई किस राज्य की कला है?", options: ["गुजरात", "राजस्थान", "मध्य प्रदेश", "बिहार"], answer: "गुजरात" },
        { category: "place", question: "'शीशे का काम' (Mirror work) मुख्य रूप से किन राज्यों की कढ़ाई में देखा जाता है?", options: ["राजस्थान और गुजरात", "उत्तर प्रदेश और बिहार", "पंजाब और हरियाणा", "कर्नाटक और तमिलनाडु"], answer: "राजस्थान और गुजरात" },
        { category: "place", question: "दीवार हैंगिंग के रूप में 'धारणीया' और ज्यामितीय पैटर्न 'हीर' कढ़ाई किस राज्य से है?", options: ["गुजरात", "महाराष्ट्र", "आंध्र प्रदेश", "तेलंगाना"], answer: "गुजरात" },
        { category: "place", question: "सोने की जरी के फीतों वाला 'गोटा' कार्य मुख्य रूप से कहाँ किया जाता है?", options: ["राजस्थान", "पंजाब", "उत्तर प्रदेश", "कर्नाटक"], answer: "राजस्थान" },
        { category: "place", question: "बाग के समान 'अक्षिदा' कढ़ाई का संबंध किस राज्य से है?", options: ["बिहार", "झारखंड", "उत्तर प्रदेश", "ओडिशा"], answer: "बिहार" },
        { category: "place", question: "'कसूती' कढ़ाई किस राज्य की प्रमुख विशेषता है?", options: ["कर्नाटक", "केरल", "तमिलनाडु", "आंध्र प्रदेश"], answer: "कर्नाटक" },
        { category: "place", question: "रबारी जनजाति द्वारा की जाने वाली 'रबारी' कढ़ाई किस राज्य से संबंधित है?", options: ["गुजरात", "राजस्थान", "मध्य प्रदेश", "छत्तीसगढ़"], answer: "गुजरात" },
        { category: "place", question: "बुनाई और कढ़ाई का मिश्रण 'शामिलामी' किस उत्तर-पूर्वी राज्य से है?", options: ["मणिपुर", "मिजोरम", "नागालैंड", "असम"], answer: "मणिपुर" },
        { category: "place", question: "'फूल पत्ती का काम' उत्तर प्रदेश के किस स्थान पर मुख्य रूप से उत्पादित किया जाता है?", options: ["अलीगढ़", "लखनऊ", "वाराणसी", "आगरा"], answer: "अलीगढ़" },
        { category: "place", question: "टोडा जनजातियों द्वारा की जाने वाली 'टोडा' कढ़ाई किस राज्य से संबंधित है?", options: ["तमिलनाडु", "केरल", "कर्नाटक", "ओडिशा"], answer: "तमिलनाडु" },
        { category: "place", question: "लोहाना समुदाय द्वारा की जाने वाली 'बन्नी' कढ़ाई का संबंध कहाँ से है?", options: ["गुजरात", "महाराष्ट्र", "राजस्थान", "पंजाब"], answer: "गुजरात" },
        { category: "place", question: "'बंजारा' कढ़ाई मुख्य रूप से किन राज्यों में उत्पादित की जाती है?", options: ["आंध्र प्रदेश और मध्य प्रदेश", "गुजरात और राजस्थान", "पंजाब और हरियाणा", "बिहार और झारखंड"], answer: "आंध्र प्रदेश और मध्य प्रदेश" },
        { category: "place", question: "पतले धात्विक धागे वाली 'मुकेश' कढ़ाई किस राज्य की विशेषता है?", options: ["उत्तर प्रदेश", "राजस्थान", "गुजरात", "महाराष्ट्र"], answer: "उत्तर प्रदेश" },
        { category: "place", question: "'कारचोबी' (Karchobi) कढ़ाई का काम मुख्य रूप से किस राज्य में होता है?", options: ["राजस्थान", "मध्य प्रदेश", "गुजरात", "पंजाब"], answer: "राजस्थान" },
        { category: "place", question: "पैचवर्क पर आधारित 'पिपली' कढ़ाई किस राज्य की कला है?", options: ["ओडिशा", "पश्चिम बंगाल", "बिहार", "झारखंड"], answer: "ओडिशा" },
        { category: "place", question: "'खटवा एप्लिक वर्क' (Khatwa) का संबंध भारत के किस राज्य से है?", options: ["बिहार", "उत्तर प्रदेश", "ओडिशा", "कर्नाटक"], answer: "बिहार" },
        { category: "place", question: "संडूर क्षेत्र की 'लम्बानी (GI)' कढ़ाई किस राज्य से है?", options: ["कर्नाटक", "आंध्र प्रदेश", "तेलंगाना", "महाराष्ट्र"], answer: "कर्नाटक" },
        { category: "place", question: "दोरूखा तकनीक वाली 'सुज़ानी (Suzani)' कढ़ाई किस क्षेत्र से संबंधित है?", options: ["जम्मू और कश्मीर", "हिमाचल प्रदेश", "पंजाब", "राजस्थान"], answer: "जम्मू और कश्मीर" },
        { category: "place", question: "मोटी चेन सिलाई वाली 'सुजनी (Sujani GI)' कढ़ाई का संबंध किस राज्य से है?", options: ["बिहार", "ओडिशा", "झारखंड", "छत्तीसगढ़"], answer: "बिहार" },
        { category: "place", question: "पारसियों द्वारा शुरू की गई 'गारा' कढ़ाई किस राज्य में उत्पादित की जाती है?", options: ["गुजरात", "महाराष्ट्र", "गोवा", "कर्नाटक"], answer: "गुजरात" },
        { category: "place", question: "कलाबट्टू के प्रयोग वाली 'किमखाब' कढ़ाई कहाँ से संबंधित है?", options: ["वाराणसी (उत्तर प्रदेश)", "सूरत (गुजरात)", "कांजीवरम (तमिलनाडु)", "मैसूर (कर्नाटक)"], answer: "वाराणसी (उत्तर प्रदेश)" },
        { category: "place", question: "'डोंगरिया स्कार्फ' (कपड़ागंधा) किस राज्य की जनजाति से संबंधित है?", options: ["ओडिशा", "मध्य प्रदेश", "छत्तीसगढ़", "झारखंड"], answer: "ओडिशा" },

        // ================= 29 FEATURES (विशेषता आधारित) =================
        { category: "feature", question: "कपड़े पर ब्लॉक छपाई द्वारा पैटर्न बनाकर फिर कढ़ाई करने की तकनीक को क्या कहते हैं?", options: ["चिकनकारी", "कांथा", "गोटा", "आरी"], answer: "चिकनकारी" },
        { category: "feature", question: "किस कढ़ाई में प्रयोग किए जाने वाले धागे को आमतौर पर कपड़े के किनारों से लिया जाता है?", options: ["कांथा", "फुलकारी", "कशीदाकारी", "बंजारा"], answer: "कांथा" },
        { category: "feature", question: "हल्के रंग के कपड़े पर चमकीले रंगों का वैषम्य और टांके कपड़े के विपरीत पक्ष पर लगाना किसकी विशेषता है?", options: ["फुलकारी", "चिकनकारी", "मुकेश", "रबारी"], answer: "फुलकारी" },
        { category: "feature", question: "पंजाब की किस कढ़ाई में काम कपड़े की पूरी सतह पर होता है?", options: ["बाग", "फुलकारी", "कारचोबी", "अक्षिदा"], answer: "बाग" },
        { category: "feature", question: "सोने, चांदी या तांबे के तारों एवं रेशम के धागों के संयोजन वाली कढ़ाई क्या कहलाती है?", options: ["ज़रदोज़ी", "मुकेश", "किमखाब", "गोटा"], answer: "ज़रदोज़ी" },
        { category: "feature", question: "साधारण चैन स्टिच का उपयोग और मानव/पशु आकृतियों की अनुपस्थिति किस कढ़ाई की पहचान है?", options: ["कशीदाकारी", "चिकनकारी", "रबारी", "बन्नी"], answer: "कशीदाकारी" },
        { category: "feature", question: "लंबी हुक युक्त सुई (क्रोशिया) का उपयोग करके संकेंद्री वलयों के रूप में कौन सी कढ़ाई की जाती है?", options: ["आरी", "सुजनी", "कांथा", "सुज़ानी"], answer: "आरी" },
        { category: "feature", question: "रंग-बिरंगी कढ़ाई के बीच विभिन्न आकारों के शीशे के टुकड़ों का प्रयोग किस काम में होता है?", options: ["शीशे का काम", "पिपली", "खटवा", "लम्बानी"], answer: "शीशे का काम" },
        { category: "feature", question: "गुजरात में घरों में उपयोग की जाने वाली कढ़ाई युक्त दीवार हैंगिंग को क्या कहते हैं?", options: ["धारणीया", "हीर", "गारा", "बन्नी"], answer: "धारणीया" },
        { category: "feature", question: "गुजरात की किस कला में रेशम से मोटे ज्यामितीय पैटर्न बनाए जाते हैं?", options: ["हीर", "धारणीया", "आरी", "रबारी"], answer: "हीर" },
        { category: "feature", question: "कपड़े पर सोने की जरी के फीतों के छोटे टुकड़े लगाकर विस्तृत पैटर्न बनाने को क्या कहते हैं?", options: ["गोटा", "कारचोबी", "मुकेश", "ज़रदोज़ी"], answer: "गोटा" },
        { category: "feature", question: "बिहार की 'अक्षिदा' कढ़ाई किस अन्य कढ़ाई के समान मानी जाती है?", options: ["बाग के समान", "कांथा के समान", "चिकनकारी के समान", "कशीदाकारी के समान"], answer: "बाग के समान" },

        { category: "feature", question: "शीशे और कांच के मोती के काम के साथ सीपली (एप्लिक) तकनीक का प्रयोग कौन सी जनजाति करती है?", options: ["बंजारा / लंबाडा जनजाति", "डोंगरिया कंध जनजाति", "टोडा जनजाति", "रबारी जनजाति"], answer: "बंजारा / लंबाडा जनजाति" },
        { category: "feature", question: "पूरे कपड़े पर प्रतिमान बनाने के लिए पतले घुमावदार धात्विक धागे का उपयोग क्या कहलाता है?", options: ["मुकेश", "गोटा", "कारचोबी", "किमखाब"], answer: "मुकेश" },
        { category: "feature", question: "कपास की गद्दी पर सादे टांके लगाकर उभरी हुई ज़री की धात्विक कढ़ाई को क्या कहते हैं?", options: ["कारचोबी", "ज़रदोज़ी", "मुकेश", "कसूती"], answer: "कारचोबी" },
        { category: "feature", question: "विभिन्न प्रतिमाओं के कपड़े के टुकड़े सादी पृष्ठभूमि पर सिलने वाले पैचवर्क पर आधारित कला कौन सी है?", options: ["पिपली", "खटवा", "बंजारा", "शामिलामी"], answer: "पिपली" },
        { category: "feature", question: "बिहार का 'खटवा एप्लिक वर्क' आमतौर पर किन चीज़ों में पाया जाता है?", options: ["टेंट, शामियाना, कुशन कवर", "केवल साड़ियों में", "दीवार हैंगिंग में", "पशुओं की सजावट में"], answer: "टेंट, शामियाना, कुशन कवर" },
        { category: "feature", question: "कर्नाटक की 'लम्बानी' कढ़ाई की मुख्य पहचान क्या है?", options: ["यह महिलाओं द्वारा किया गया एक अनूठा सुई शिल्प है", "इसमें भारी सोने के तार होते हैं", "यह पारसियों द्वारा की जाती है", "यह ब्लॉक प्रिंटिंग है"], answer: "यह महिलाओं द्वारा किया गया एक अनूठा सुई शिल्प है" },
        { category: "feature", question: "जम्मू कश्मीर की किस कढ़ाई को 'दोरूखा' भी कहा जाता है जिसमें दोनों तरफ समान रूप से काम होता है लेकिन रंग अलग होते हैं?", options: ["सुज़ानी", "कशीदाकारी", "कांथा", "कसूती"], answer: "सुज़ानी" },
        { category: "feature", question: "बिहार की 'सुजनी' कढ़ाई में रूपांकन की रूपरेखा को किस सिलाई के साथ सुशोभित किया जाता है?", options: ["मोटी चेन सिलाई", "साधारण क्रॉस स्टिच", "साटन स्टिच", "बिना गांठ के टांके"], answer: "मोटी चेन सिलाई" },
        { category: "feature", question: "गुजरात की 'गारा' कढ़ाई चीन से यह तकनीक लाने वाले किस समुदाय द्वारा शुरू की गई थी?", options: ["पारसियों द्वारा", "लोहाना समुदाय द्वारा", "टोडा जनजाति द्वारा", "बंजारा जनजाति द्वारा"], answer: "पारसियों द्वारा" },
        { category: "feature", question: "वाराणसी की 'किमखाब' कढ़ाई में इस्तेमाल होने वाले सोने के धागे को क्या कहा जाता है?", options: ["कलाबट्टू", "मुकेश", "गोटा", "ज़री"], answer: "कलाबट्टू" },
        { category: "feature", question: "डोंगरिया कंध जनजाति की महिलाएं लाल रंग की बॉर्डर वाली सफेद साड़ी के ऊपर क्या पहनती हैं?", options: ["डोंगरिया स्कार्फ (कपड़ागंधा)", "सुजनी", "धारणीया", "हीर"], answer: "डोंगरिया स्कार्फ (कपड़ागंधा)" }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let isChecked = false;

    // SHUFFLE FUNCTION: This shuffles any array passed to it
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function startTest(count) {
        let allShuffled = shuffleArray(rawQuestionBank);
        
        if (count === 'all') {
            currentQuestions = allShuffled;
        } else {
            currentQuestions = allShuffled.slice(0, count);
        }
        
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('quizTitle').innerText = `Test: ${currentQuestions.length} MCQs`;
        
        document.getElementById('menuScreen').classList.remove('active');
        document.getElementById('quizScreen').classList.add('active');
        
        loadQuestion();
    }

    function loadQuestion() {
        isChecked = false;
        document.getElementById('feedbackText').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none'; // अगला बटन छिपा दें

        const qText = document.getElementById('questionText');
        const optionsCont = document.getElementById('optionsContainer');
        const progressText = document.getElementById('progressText');
        const catBadge = document.getElementById('catBadge');
        
        let currentQ = currentQuestions[currentQuestionIndex];
        
        progressText.innerText = `प्रश्न: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        
        // Set Badge
        if(currentQ.category === 'place') {
            catBadge.innerText = "📍 स्थान (Place)";
            catBadge.className = "category-badge cat-place";
        } else {
            catBadge.innerText = "⚙️ विशेषता (Feature)";
            catBadge.className = "category-badge cat-feature";
        }

        qText.innerText = currentQ.question;
        optionsCont.innerHTML = "";
        
        // SHUFFLE OPTIONS internally for each question
        let optionsWithCorrect = currentQ.options.map(opt => {
            return { text: opt, isCorrect: (opt === currentQ.answer) };
        });
        optionsWithCorrect = shuffleArray(optionsWithCorrect);
        
        optionsWithCorrect.forEach((optData, index) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'optLabel_' + index;
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'quizOption';
            radio.value = index;
            
            // क्लिक करते ही उत्तर चेक करने के लिए
            radio.onclick = function() { checkAnswer(index, optData, optionsWithCorrect); };
            
            label.appendChild(radio);
            label.appendChild(document.createTextNode(optData.text));
            optionsCont.appendChild(label);
        });
    }

    function checkAnswer(selectedIndex, selectedOptData, allOptions) {
        if (isChecked) return; // एक बार क्लिक होने के बाद लॉक करें
        isChecked = true;
        
        let feedback = document.getElementById('feedbackText');
        
        // Find the index of the correct answer in the shuffled options
        let correctIndex = allOptions.findIndex(o => o.isCorrect === true);

        // सही उत्तर को हरा करें
        document.getElementById('optLabel_' + correctIndex).style.backgroundColor = '#d4efdf';
        document.getElementById('optLabel_' + correctIndex).style.borderColor = '#27ae60';

        if (selectedOptData.isCorrect) {
            score++;
            feedback.innerText = "✅ सही उत्तर!";
            feedback.className = "correct-ans";
        } else {
            // गलत उत्तर को लाल करें
            document.getElementById('optLabel_' + selectedIndex).style.backgroundColor = '#fadbd8';
            document.getElementById('optLabel_' + selectedIndex).style.borderColor = '#e74c3c';
            feedback.innerText = "❌ गलत उत्तर! सही उत्तर: " + allOptions[correctIndex].text;
            feedback.className = "wrong-ans";
        }
        
        feedback.style.display = 'block';
        
        // सभी रेडियो बटन डिसेबल कर दें
        document.querySelectorAll('input[name="quizOption"]').forEach(r => r.disabled = true);
        
        // "अगला प्रश्न" बटन दिखाएँ
        document.getElementById('nextBtn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex >= currentQuestions.length) {
            showResult();
        } else {
            loadQuestion();
        }
    }

    function showResult() {
        document.getElementById('quizScreen').classList.remove('active');
        document.getElementById('resultScreen').classList.add('active');
        document.getElementById('scoreText').innerText = `आपका कुल स्कोर: ${score} / ${currentQuestions.length}`;
    }
</script>
