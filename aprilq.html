<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अप्रैल 2026 करंट अफेयर्स क्विज़ (200 MCQs)</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #34a853;
            --danger-color: #ea4335;
            --warning-color: #fbbc04;
            --dark-color: #202124;
            --light-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f3f4;
            color: var(--dark-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e8eaed;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .back-btn {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: #1557b0;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            color: #3c4043;
        }

        .quiz-box {
            min-height: 250px;
        }

        .question {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option {
            background-color: var(--light-color);
            border: 2px solid #dadce0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option:hover {
            background-color: #f1f3f4;
            border-color: #bdc1c6;
        }

        .option.correct {
            background-color: #e6f4ea !important;
            border-color: var(--success-color) !important;
            color: #137333;
        }

        .option.incorrect {
            background-color: #fce8e6 !important;
            border-color: var(--danger-color) !important;
            color: #c5221f;
        }

        .option.disabled {
            pointer-events: none;
        }

        /* कण्ट्रोल बटन्स (Next, Prev, Shuffle) */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            border-top: 2px solid #e8eaed;
            padding-top: 20px;
        }

        .control-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            background-color: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover:not(:disabled) {
            background-color: #1557b0;
        }

        .control-btn:disabled {
            background-color: #bdc1c6;
            cursor: not-allowed;
        }

        .shuffle-btn {
            background-color: var(--warning-color);
            color: #202124;
        }

        .shuffle-btn:hover {
            background-color: #f2a900;
        }

        /* नैविगेशन बोर्ड स्टाइल्स */
        .navigation-board {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .board-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: #5f6368;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .grid-item {
            background-color: white;
            border: 1px solid #dadce0;
            border-radius: 6px;
            padding: 10px 0;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .grid-item:hover {
            background-color: #f1f3f4;
            border-color: var(--primary-color);
        }

        .grid-item.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .grid-item.answered {
            background-color: #e8f0fe;
            border-color: #1a73e8;
            color: #1a73e8;
        }
        
        /* मोबाइल रिस्पॉन्सिव */
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                gap: 15px;
            }
            .control-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 id="quiz-title">करंट अफेयर्स क्विज़</h2>
            <a href="current_affairs.html" class="back-btn">← Back</a>
        </div>

        <div class="quiz-box">
            <div class="question" id="question-text">लोड हो रहा है...</div>
            <ul class="options-list" id="options-container">
                <!-- ऑप्शन्स यहाँ डायनामिकली आएंगे -->
            </ul>
        </div>

        <!-- कंट्रोल बटन्स (पिछला, सफल, अगला) -->
        <div class="controls">
            <button class="control-btn" id="prev-btn" onclick="prevQuestion()">← पिछला (Prev)</button>
            <button class="control-btn shuffle-btn" id="shuffle-btn" onclick="shuffleQuiz()">🔀 सफल करें (Shuffle)</button>
            <button class="control-btn" id="next-btn" onclick="nextQuestion()">अगला (Next) →</button>
        </div>
    </div>

    <!-- नीचे क्वेश्चन नंबर सूची बोर्ड -->
    <div class="navigation-board">
        <div class="board-title">क्वेश्चन नंबर सूची बोर्ड (सीधे प्रश्न पर जाएँ)</div>
        <div class="grid-container" id="grid-container">
            <!-- 1 से 200 तक की ग्रिड लिस्ट यहाँ आएगी -->
        </div>
    </div>

    <script>
        // सभी 200 प्रश्नों का डेटाबेस
        let quizData = [
            { q: "नोकिया ने भारत में कंट्री बिजनेस लीडर के रूप में किसे नियुक्त किया है?", o: ["विभा मेहरा", "समर मित्तल", "चंचल कुमार", "धीरज सेठ"], a: 1 },
            { q: "दिवंगत विजयपत सिंघानिया किस समूह के पूर्व अध्यक्ष थे?", o: ["रिलायंस", "टाटा", "रेमंड", "महिंद्रा"], a: 2 },
            { q: "उखना खुरेलसुख किस देश के प्रधानमंत्री चुने गए हैं?", o: ["वियतनाम", "मंगोलिया", "सूरीनाम", "म्यांमार"], a: 1 },
            { q: "चंद्रिका प्रसाद संतोखी, जिनका हाल ही में निधन हो गया, किस देश के पूर्व राष्ट्रपति थे?", o: ["सूरीनाम", "गुयाना", "जिबूती", "मंगोलिया"], a: 0 },
            { q: "सूचना और प्रसारण मंत्रालय में सचिव किसे नियुक्त किया गया है?", o: ["वीर विक्रम यादव", "संदीप जैन", "चंचल कुमार", "धीरज सेठ"], a: 2 },
            { q: "भारतीय सेना के उप प्रमुख का पदभार किसने ग्रहण किया है?", o: ["वी एमबी कृष्णन", "धीरज सेठ", "संदीप जैन", "उपेंद्र द्विवेदी"], a: 1 },
            { q: "नागर विमानन महानिदेशालय (DGCA) का नया महानिदेशक किसे नियुक्त किया गया है?", o: ["वीर विक्रम यादव", "फैज अहमद किदवई", "संदीप जैन", "चंचल कुमार"], a: 0 },
            { q: "भारतीय सेना की दक्षिणी कमान के जनरल ऑफिसर कमांडिंग-इन-चीफ कौन बने हैं?", o: ["वी एमबी कृष्णन", "धीरज सेठ", "उपेंद्र द्विवेदी", "संदीप जैन"], a: 3 },
            { q: "भारतीय सेना की पूर्वी कमान के जनरल ऑफिसर कमांडिंग-इन-चीफ किसे नियुक्त किया गया है?", o: ["संदीप जैन", "वी एमबी कृष्णन", "धीरज सेठ", "उपेंद्र द्विवेदी"], a: 1 },
            { q: "दिवंगत प्रोफेसर उंगचांग किसके पूर्व सदस्य थे?", o: ["WHO", "WEF", "IOC (अंतर्राष्ट्रीय ओलंपिक समिति)", "ICC"], a: 2 },
            { q: "स्टील अथॉरिटी ऑफ इंडिया लिमिटेड (SAIL) के अध्यक्ष और प्रबंध निदेशक का अतिरिक्त प्रभार किसने संभाला है?", o: ["दिलीप कुमार", "कृष्ण कुमार सिंह", "संजय खन्ना", "अनंत स्वरूप"], a: 1 },
            { q: "निशा मेहता किस देश की स्वास्थ्य और जनसंख्या मंत्री बनी हैं?", o: ["श्रीलंका", "मालदीव", "मॉरीशस", "नेपाल"], a: 3 },
            { q: "मिन आंग ह्लाइंग किस देश के राष्ट्रपति चुने गए हैं?", o: ["वियतनाम", "म्यांमार", "कंबोडिया", "थाईलैंड"], a: 1 },
            { q: "दिवंगत गिलबर्टसन संगमा का संबंध किस खेल से था?", o: ["हॉकी", "क्रिकेट", "फुटबॉल", "बैडमिंटन"], a: 2 },
            { q: "टो लाम को किस देश के नए राष्ट्रपति के रूप में चुना गया है?", o: ["मंगोलिया", "वियतनाम", "कंबोडिया", "लाओस"], a: 1 },
            { q: "भारत की पहली खुले तौर पर क्वीर सांसद कौन बनी हैं?", o: ["सयानी गुप्ता", "MAINAKA गुरुस्वामी", "रतिका श्री", "अपराजिता रामनाथ"], a: 1 },
            { q: "कैम्पबेल विल्सन ने किस कंपनी के सीईओ पद से इस्तीफा दिया है?", o: ["इंडिगो", "एयर इंडिया", "स्पाइसजेट", "गो एयर"], a: 1 },
            { q: "जनरल फान वान गियांग को किस देश का नया उप प्रधानमंत्री और रक्षा मंत्री नियुक्त किया गया है?", o: ["म्यांमार", "लाओस", "वियतनाम", "कंबोडिया"], a: 2 },
            { q: "यूएन आर्थिक, सामाजिक और सांस्कृतिक अधिकारों की समिति (CESCR) के लिए किस भारतीय को निर्वाचित किया गया है?", o: ["प्रीति सरण", "मेनका गुरुस्वामी", "सयानी गुप्ता", "अनीता चौधरी"], a: 0 },
            { q: "मोहसीना किदवई, जिनका हाल ही में निधन हुआ, का संबंध किस क्षेत्र से था?", o: ["खेल", "सिनेमा", "राजनीति", "पत्रकारिता"], a: 2 },
            { q: "निजार अमेदी को किस देश का नया राष्ट्रपति चुना गया है?", o: ["इरान", "इराक", "सूडान", "जिबूती"], a: 1 },
            { q: "जिबूती का राष्ट्रपति किसे चुना गया है?", o: ["इस्माइल उमर गुलेह", "निजार अमेदी", "टो लाम", "मिन आंग ह्लाइंग"], a: 0 },
            { q: "भारत पेट्रोलियम कॉर्पोरेशन लिमिटेड (BPCL) का नया अध्यक्ष और प्रबंध निदेशक किसे नियुक्त किया गया है?", o: ["संजय खन्ना", "अनंत स्वरूप", "दिलीप कुमार", "कृष्ण कुमार सिंह"], a: 0 },
            { q: "सुसान कोयल किस देश की पहली महिला आर्मी चीफ बनी हैं?", o: ["अमेरिका", "ब्रिटेन", "ऑस्ट्रेलिया", "न्यूजीलैंड"], a: 2 },
            { q: "बिहार के नए मुख्यमंत्री के रूप में किसने शपथ ली है?", o: ["नीतीश कुमार", "सम्राट चौधरी", "तेजस्वी यादव", "विजय सिन्हा"], a: 1 },
            { q: "फिक्की (FICCI) का नया महासचिव किसे नियुक्त किया गया है?", o: ["अनंत स्वरूप", "संजय खन्ना", "अशोक लाहिड़ी", "जॉन टर्नस"], a: 0 },
            { q: "वर्ल्ड इकोनॉमिक फोरम द्वारा यंग ग्लोबल लीडर 2026 के रूप में किसे मान्यता दी गई है?", o: ["जय शाह", "आर्थर लॉ", "A और B दोनों", "इनमें से कोई नहीं"], a: 2 },
            { q: "राज्यसभा के उपाध्यक्ष के रूप में चुने जाने वाले पहले नामित सदस्य कौन बने हैं?", o: ["हरिवंश नारायण सिंह", "जगदीप धनखड़", "पीटी उषा", "रंजन गोगोई"], a: 0 },
            { q: "गोदरेज इंडस्ट्रीज ग्रुप का नया चेयरपर्सन किसे नियुक्त किया गया है?", o: ["नादिर गोदरेज", "आदि गोदरेज", "पिरोजशा गोदरेज", "इनमें से कोई नहीं"], a: 2 },
            { q: "एप्पल का अगला मुख्य कार्यकारी अधिकारी (CEO) किसे नियुक्त किया गया है?", o: ["टिम कुक", "जॉन टर्नस", "क्रेग फेडेरिघी", "जेफ विलियम्स"], a: 1 },
            { q: "यूएस आर्मी वॉर कॉलेज के इंटरनेशनल हॉल ऑफ फेम में किस भारतीय को शामिल किया गया है?", o: ["वी के सिंह", "जनरल विक्रम सिंह", "उपेंद्र द्विवेदी", "धीरज सेठ"], a: 2 },
            { q: "नीति आयोग का उपाध्यक्ष किसे नियुक्त किया गया है?", o: ["सुमन बेरी", "अशोक लाहिड़ी", "अरविंद पनगढ़िया", "राजीव कुमार"], a: 1 },
            { q: "दिवंगत शिव रतन अग्रवाल किस कंपनी के संस्थापक थे?", o: ["हल्दीराम", "बीकाजी फूड्स", "बालाजी वेफर्स", "पार्ले"], a: 1 },
            { q: "दिवंगत दिलीप सिंह वासन कौन थे?", o: ["राजनेता", "लेखक", "चित्रकार", "खिलाड़ी"], a: 1 },
            { q: "2026-29 के लिए बैडमिंटन वर्ल्ड फेडरेशन (BWF) एथलीट्स कमीशन का अध्यक्ष किसे चुना गया है?", o: ["साइना नेहवाल", "पीवी सिंधु", "कैरोलिना मारिन", "ताई त्ज़ु-यिंग"], a: 1 },
            { q: "सेल (SAIL) का नया मुख्य सतर्कता अधिकारी (CVO) किसे नियुक्त किया गया है?", o: ["दिलीप कुमार", "कृष्ण कुमार सिंह", "संजय खन्ना", "अनंत स्वरूप"], a: 0 },
            { q: "भारत की पहली ट्रांसजेंडर अंपायर कौन बनी हैं?", o: ["सयानी गुप्ता", "रतिका श्री", "मेनका गुरुस्वामी", "पायल नाग"], a: 1 },
            { q: "2027 की जनगणना का ब्रांड एंबेसडर किसे बनाया गया है?", o: ["एआर रहमान", "महेंद्र सिंह धोनी", "सुदर्शन पटनायक", "विराट कोहली"], a: 2 },
            { q: "कुकू टीवी के ब्रांड एंबेसडर और निवेशक कौन बने हैं?", o: ["विराट कोहली", "महेंद्र सिंह धोनी", "रोहित शर्मा", "सचिन तेंदुलकर"], a: 1 },
            { q: "यामाहा म्यूजिक इंडिया का ब्रांड एंबेसडर किसको बनाया गया है?", o: ["एआर रहमान", "अरिजीत सिंह", "श्रेया घोषाल", "सोनू निगम"], a: 0 },
            { q: "इन्फोसिस (Infosys) ने अपना नया वैश्विक ब्रांड एंबेसडर किसे नियुक्त किया है?", o: ["राफेल नडाल", "रोजर फेडरर", "कार्लोस अल्कराज", "नोवाक जोकोविच"], a: 2 },

            { q: "अमेरिका के किस शहर में स्वामी विवेकानंद की प्रतिमा का अनावरण किया गया?", o: ["न्यूयॉर्क", "वाशिंगटन डीसी", "सिएटल", "सैन फ्रांसिस्को"], a: 2 },

            { q: "समान नागरिक संहिता (UCC) के मसौदे के लिए समिति का गठन करने वाला नवीनतम राज्य कौन सा है?", o: ["उत्तराखंड", "गुजरात", "छत्तीसगढ़", "असम"], a: 2 },
            { q: "आईआरसीटीसी (IRCTC) ने 'दिव्य दक्षिण यात्रा' ट्रेन कहाँ से शुरू की?", o: ["चेन्नई", "बेंगलुरु", "विशाखापत्तनम", "हैदराबाद"], a: 2 },
            { q: "ब्रेल सेवाएँ प्रदान करने वाला भारत का पहला क्षेत्रीय पासपोर्ट कार्यालय (RPO) कौन सा बना है?", o: ["नई दिल्ली", "भोपाल", "मुंबई", "चेन्नई"], a: 1 },
            { q: "प्रधानमंत्री ग्राम सड़क योजना (PMGSY-III) को किस वर्ष तक के लिए बढ़ा दिया गया है?", o: ["2026", "2027", "2028", "2030"], a: 2 }
        ];

        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizData.length).fill(null);

        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const gridContainer = document.getElementById('grid-container');
        const quizTitleElement = document.getElementById('quiz-title');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // ग्रिड बोर्ड (सूची) बनाना
        function initGridBoard() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < quizData.length; i++) {
                const button = document.createElement('div');
                button.className = 'grid-item';
                button.innerText = i + 1;
                button.id = `grid-item-${i}`;
                button.onclick = () => jumpToQuestion(i);
                
                // अगर आंसर दे चुके हैं तो नीला रंग
                if(userAnswers[i] !== null) {
                    button.classList.add('answered');
                }

                gridContainer.appendChild(button);
            }
        }

        // प्रश्न लोड करना
        function loadQuestion(index) {
            currentQuestionIndex = index;
            const currentQuestion = quizData[index];
            
            // शीर्षक अपडेट करें
            quizTitleElement.innerText = `प्रश्न ${index + 1} / ${quizData.length}`;
            questionTextElement.innerText = `${index + 1}. ${currentQuestion.q}`;
            optionsContainer.innerHTML = '';

            // बोर्ड पर एक्टिव क्लास लगाएँ
            document.querySelectorAll('.grid-item').forEach(btn => btn.classList.remove('active'));
            const currentGridItem = document.getElementById(`grid-item-${index}`);
            if (currentGridItem) currentGridItem.classList.add('active');

            // विकल्प लोड करें
            currentQuestion.o.forEach((option, i) => {
                const li = document.createElement('li');
                li.className = 'option';
                li.innerText = option;
                li.onclick = () => checkAnswer(i, li);

                // यदि पहले से उत्तर दे चुके हैं तो रीस्टोर करें
                if (userAnswers[index] !== null) {
                    li.classList.add('disabled');
                    if (i === currentQuestion.a) {
                        li.classList.add('correct');
                    }
                    if (userAnswers[index] === i && i !== currentQuestion.a) {
                        li.classList.add('incorrect');
                    }
                }
                optionsContainer.appendChild(li);
            });

            // कंट्रोल बटन्स को अपडेट करें
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === quizData.length - 1;
            
            // ऑटो-स्क्रॉल (scrollIntoView) हटा दिया गया है ताकि पेज अपने आप जंप न करे।
        }

        // उत्तर की जाँच करना
        function checkAnswer(selectedIndex, optionElement) {
            const currentQuestion = quizData[currentQuestionIndex];
            userAnswers[currentQuestionIndex] = selectedIndex;

            const options = optionsContainer.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.add('disabled'); 
                if (i === currentQuestion.a) {
                    opt.classList.add('correct'); 
                }
            });

            if (selectedIndex !== currentQuestion.a) {
                optionElement.classList.add('incorrect'); 
            }

            // ग्रिड लिस्ट अपडेट करें
            const currentGridItem = document.getElementById(`grid-item-${currentQuestionIndex}`);
            if (currentGridItem) currentGridItem.classList.add('answered');

            // ऑटो-नेक्स्ट हटा दिया गया है।
        }

        // पिछला प्रश्न
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                loadQuestion(currentQuestionIndex - 1);
            }
        }

        // अगला प्रश्न
        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                loadQuestion(currentQuestionIndex + 1);
            }
        }

        // बोर्ड सूची से प्रश्न पर जाना
        function jumpToQuestion(index) {
            loadQuestion(index);
        }

        // सफल (Shuffle) क्विज़ फीचर - Fisher-Yates Algorithm
        function shuffleQuiz() {
            if(confirm("क्या आप पक्का क्विज़ को शफल (Shuffle) करके रीसेट करना चाहते हैं? आपकी पूरी प्रोग्रेस मिट जाएगी।")) {
                for (let i = quizData.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
                }
                
                // प्रोग्रेस रीसेट करें
                userAnswers.fill(null);
                currentQuestionIndex = 0;
                
                // ग्रिड और पहला क्वेश्चन फिर से लोड करें
                initGridBoard();
                loadQuestion(0);
            }
        }

        // स्टार्ट
        initGridBoard();
        loadQuestion(0);
    </script>
