<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April 2026 - Mega Current Affairs Quiz</title>
    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --success: #10B981;
            --danger: #EF4444;
            --shuffle: #8B5CF6;
            --shuffle-hover: #7C3AED;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* --- Navigation Links --- */
        .nav-links {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-btn {
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn { background-color: #374151; color: white; }
        .back-btn:hover { background-color: #1F2937; }

        .revision-link { background-color: #F59E0B; color: white; }
        .revision-link:hover { background-color: #D97706; }

        .shuffle-btn { background-color: var(--shuffle); color: white; flex: 1; min-width: 200px;}
        .shuffle-btn:hover { background-color: var(--shuffle-hover); }

        /* --- Quiz Container --- */
        .quiz-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .question-text {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            background: #F9FAFB;
        }

        .option:hover:not(.disabled) {
            border-color: var(--primary);
            background: #EFF6FF;
        }

        .option.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }

        .option.wrong {
            background-color: #FEE2E2;
            border-color: var(--danger);
            color: #991B1B;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* --- Explanation Box --- */
        .explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
            font-size: 15px;
        }

        .explanation.show { display: block; animation: fadeIn 0.5s ease-in; }
        .explanation.success-bg { background-color: #ECFDF5; border-left: 5px solid var(--success); }
        .explanation.danger-bg { background-color: #FEF2F2; border-left: 5px solid var(--danger); }

        /* --- Controls --- */
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover:not(:disabled) { background-color: var(--primary-hover); }
        .btn:disabled { background-color: #9CA3AF; cursor: not-allowed; }

        /* --- Numbered Progress Bar --- */
        .progress-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
            justify-content: center;
        }

        .prog-num {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px solid var(--border);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .prog-num:hover { border-color: var(--primary); }
        .prog-num.active { border-color: var(--primary); background: var(--primary); color: white; }
        .prog-num.answered-correct { background: var(--success); border-color: var(--success); color: white; }
        .prog-num.answered-wrong { background: var(--danger); border-color: var(--danger); color: white; }

        /* --- Summary Section --- */
        .summary-card {
            display: none;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .summary-title { font-size: 24px; color: var(--primary); margin-bottom: 20px; }
        .stat-row { font-size: 18px; margin: 10px 0; font-weight: 600; }
        .stat-correct { color: var(--success); }
        .stat-wrong { color: var(--danger); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        // activeQuizData वह एरे है जिसे स्क्रीन पर दिखाया जाएगा (यह शफल हो सकता है)
        let activeQuizData = [...originalQuizData];
        let currentQuestionIndex = 0;
        let userAnswers = new Array(activeQuizData.length).fill(null);

        const elements = {
            qCounter: document.getElementById('questionCounter'),
            category: document.getElementById('categoryLabel'),
            qText: document.getElementById('questionText'),
            optionsBox: document.getElementById('optionsContainer'),
            explanation: document.getElementById('explanationBox'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            submitBtn: document.getElementById('submitBtn'),
            progBar: document.getElementById('progressBar'),
            quizCard: document.getElementById('quizCard'),
            summaryCard: document.getElementById('summaryCard')
        };

        // --- SHUFFLE FUNCTIONALITY ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function shuffleQuiz() {
            // क्विज डेटा को शफल करें
            shuffleArray(activeQuizData);
            
            // क्विज की स्थिति को रीसेट करें
            currentQuestionIndex = 0;
            userAnswers = new Array(activeQuizData.length).fill(null);
            
            // UI को वापस क्विज पर सेट करें (यदि समरी खुली हो)
            elements.summaryCard.style.display = 'none';
            elements.quizCard.style.display = 'block';
            elements.progBar.style.display = 'flex';
            
            initQuiz();
            alert("✅ क्विज के प्रश्न शफल (Shuffle) कर दिए गए हैं! अब आप नए क्रम में टेस्ट दे सकते हैं।");
        }
        // -----------------------------

        function initQuiz() {
            generateProgressBar();
            loadQuestion(currentQuestionIndex);
        }

        function generateProgressBar() {
            elements.progBar.innerHTML = '';
            activeQuizData.forEach((_, idx) => {
                const btn = document.createElement('div');
                btn.className = 'prog-num';
                btn.innerText = idx + 1;
                btn.onclick = () => jumpToQuestion(idx);
                elements.progBar.appendChild(btn);
            });
            updateProgressStyles();
        }

        function updateProgressStyles() {
            const progBtns = elements.progBar.children;
            for(let i=0; i<activeQuizData.length; i++){
                progBtns[i].className = 'prog-num'; // reset
                if (i === currentQuestionIndex) progBtns[i].classList.add('active');
                
                if (userAnswers[i] !== null) {
                    if (userAnswers[i] === activeQuizData[i].correctAnswer) {
                        progBtns[i].classList.add('answered-correct');
                    } else {
                        progBtns[i].classList.add('answered-wrong');
                    }
                }
            }
        }

        function loadQuestion(index) {
            const data = activeQuizData[index];
            elements.qCounter.innerText = `प्रश्न ${index + 1} / ${activeQuizData.length}`;
            elements.category.innerText = `🏷️ ${data.category}`;
            elements.qText.innerText = data.question;

            elements.optionsBox.innerHTML = '';
            elements.explanation.className = 'explanation';
            elements.explanation.innerText = '';

            const hasAnswered = userAnswers[index] !== null;

            data.options.forEach((optText, i) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = optText;

                if (hasAnswered) {
                    optDiv.classList.add('disabled');
                    if (i === data.correctAnswer) {
                        optDiv.classList.add('correct');
                    } else if (i === userAnswers[index]) {
                        optDiv.classList.add('wrong');
                    }
                } else {
                    optDiv.onclick = () => selectOption(i);
                }

                elements.optionsBox.appendChild(optDiv);
            });

            if (hasAnswered) {
                showExplanation(index);
            }

            elements.prevBtn.disabled = index === 0;
            
            if (index === activeQuizData.length - 1) {
                elements.nextBtn.style.display = 'none';
                elements.submitBtn.style.display = 'inline-block';
            } else {
                elements.nextBtn.style.display = 'inline-block';
                elements.submitBtn.style.display = 'none';
            }

            updateProgressStyles();
        }

        function selectOption(selectedIndex) {
            if (userAnswers[currentQuestionIndex] !== null) return; 

            userAnswers[currentQuestionIndex] = selectedIndex;
            loadQuestion(currentQuestionIndex); 
        }

        function showExplanation(index) {
            const data = activeQuizData[index];
            const isCorrect = userAnswers[index] === data.correctAnswer;
            
            elements.explanation.innerHTML = `<strong>${isCorrect ? '✅ सही उत्तर!' : '❌ गलत उत्तर!'}</strong><br><br>${data.explanation}`;
            elements.explanation.className = `explanation show ${isCorrect ? 'success-bg' : 'danger-bg'}`;
        }

        function nextQuestion() {
            if (currentQuestionIndex < activeQuizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion(currentQuestionIndex);
            }
        }

        function jumpToQuestion(index) {
            currentQuestionIndex = index;
            loadQuestion(index);
        }

        function showSummary() {
            let correct = 0;
            let wrong = 0;
            let unattempted = 0;

            userAnswers.forEach((ans, idx) => {
                if (ans === null) unattempted++;
                else if (ans === activeQuizData[idx].correctAnswer) correct++;
                else wrong++;
            });

            elements.quizCard.style.display = 'none';
            elements.progBar.style.display = 'none';
            elements.summaryCard.style.display = 'block';

            document.getElementById('totalQ').innerText = activeQuizData.length;
            document.getElementById('correctQ').innerText = correct;
            document.getElementById('wrongQ').innerText = wrong;
            document.getElementById('unattemptedQ').innerText = unattempted;
            
            window.scrollTo(0,0);
        }

        // स्टार्ट क्विज
        initQuiz();
