    let currentQuestions = [];
    let userAnswers = {}; 
    let currentIndex = 0;

    function getDeepCopy(arr) {
        return JSON.parse(JSON.stringify(arr));
    }

    function initQuiz(dataPool) {
        currentQuestions = getDeepCopy(dataPool);
        userAnswers = {};
        currentIndex = 0;
        document.getElementById('quiz-interface').style.display = window.innerWidth >= 768 ? 'grid' : 'block';
        document.getElementById('result-interface').style.display = 'none';
        
        renderPalette();
        renderQuestion();
    }

    function renderPalette() {
        const grid = document.getElementById('palette-grid');
        grid.innerHTML = '';
        currentQuestions.forEach((q, idx) => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerText = idx + 1;
            item.setAttribute('id', `palette-item-${idx}`);
            
            if (userAnswers[q.id]) {
                item.classList.add('answered');
            }
            if (idx === currentIndex) {
                item.classList.add('active');
            }
            
            item.onclick = () => {
                const prevActive = document.getElementById(`palette-item-${currentIndex}`);
                if (prevActive) prevActive.classList.remove('active');
                currentIndex = idx;
                renderQuestion();
            };
            grid.appendChild(item);
        });
        updateCounter();
    }

    function updateCounter() {
        const answeredCount = Object.keys(userAnswers).length;
        document.getElementById('answered-counter').innerText = `${answeredCount}/${currentQuestions.length} हल`;
    }

    function renderQuestion() {
        if (currentQuestions.length === 0) return;
        
        const q = currentQuestions[currentIndex];
        
        document.getElementById('question-index-label').innerText = `प्रश्न ${currentIndex + 1} ऑफ़ ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = q.question;
        
        const items = document.querySelectorAll('.grid-item');
        items.forEach(item => item.classList.remove('active'));
        const activeItem = document.getElementById(`palette-item-${currentIndex}`);
        if (activeItem) activeItem.classList.add('active');
        
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            
            if (userAnswers[q.id]) {
                btn.disabled = true;
                const userPick = userAnswers[q.id].chosen;
                
                if (opt === q.correct) {
                    btn.classList.add('correct');
                } else if (opt === userPick) {
                    btn.classList.add('wrong');
                }
            } else {
                btn.onclick = () => selectOption(opt, btn);
            }
            
            optionsBox.appendChild(btn);
        });
        
        document.getElementById('prev-btn').disabled = (currentIndex === 0);
        document.getElementById('next-btn').disabled = (currentIndex === currentQuestions.length - 1);
    }

    function selectOption(selectedOpt, clickedBtn) {
        const q = currentQuestions[currentIndex];
        const isCorrect = (selectedOpt === q.correct);
        
        userAnswers[q.id] = {
            chosen: selectedOpt,
            isCorrect: isCorrect
        };
        
        const paletteItem = document.getElementById(`palette-item-${currentIndex}`);
        if (paletteItem) paletteItem.classList.add('answered');
        updateCounter();
        
        const allBtns = document.getElementById('options-box').querySelectorAll('.option-btn');
        allBtns.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === q.correct) {
                btn.classList.add('correct');
            } else if (btn.innerText === selectedOpt && !isCorrect) {
                btn.classList.add('wrong');
            }
        });
    }

    function navigate(direction) {
        let newIndex = currentIndex + direction;
        if (newIndex >= 0 && newIndex < currentQuestions.length) {
            currentIndex = newIndex;
            renderQuestion();
        }
    }

    function shuffleQuiz() {
        for (let i = currentQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
        }
        
        currentQuestions.forEach(q => {
            for (let i = q.options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
            }
        });
        
        currentIndex = 0;
        renderPalette();
        renderQuestion();
    }

    function submitQuiz() {
        const total = currentQuestions.length;
        const answered = Object.keys(userAnswers).length;
        const unanswered = total - answered;
        
        let confirmMsg = "क्या आप निश्चित रूप से अपना टेस्ट सबमिट करना चाहते हैं?";
        if (unanswered > 0) {
            confirmMsg = `⚠️ चेतावनी: आपने कुल ${unanswered} प्रश्नों के उत्तर नहीं दिए हैं!\n\nक्या आप फिर भी सबमिट करना चाहते हैं?`;
        }
        
        if (confirm(confirmMsg)) {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-interface').style.display = 'none';
        document.getElementById('result-interface').style.display = 'block';
        window.scrollTo(0, 0);

        let correctCount = 0;
        let wrongCount = 0;
        let skippedCount = 0;

        currentQuestions.forEach(q => {
            if (userAnswers[q.id]) {
                if (userAnswers[q.id].isCorrect) correctCount++;
                else wrongCount++;
            } else {
                skippedCount++;
            }
        });

        const percent = Math.round((correctCount / currentQuestions.length) * 100);
        document.getElementById('score-percentage').innerText = `${percent}%`;

        let msg = "";
        if (percent >= 90) msg = "🥇 सर्वोत्कृष्ट प्रदर्शन! आपकी तैयारी अद्भुत स्तर पर है।";
        else if (percent >= 75) msg = "🌟 उत्कृष्ट प्रदर्शन! बहुत बढ़िया प्रयास।";
        else if (percent >= 50) msg = "👍 अच्छा प्रयास! थोड़ा और अभ्यास आपको परफेक्ट बना देगा।";
        else msg = "📚 और अधिक अभ्यास की आवश्यकता है। कृपया री-टेस्ट विकल्प का उपयोग करें।";
        
        document.getElementById('score-message').innerText = msg;
        document.getElementById('score-raw-stats').innerText = `कुल प्रश्न: ${currentQuestions.length} | सही: ${correctCount} | गलत: ${wrongCount} | छूटे हुए: ${skippedCount}`;

        const retestBtn = document.getElementById('retest-btn');
        if (wrongCount + skippedCount === 0) {
            retestBtn.style.display = 'none';
        } else {
            retestBtn.style.display = 'inline-block';
            retestBtn.innerText = `🔄 गलत/छूटे प्रश्नों का री-टेस्ट लें (${wrongCount + skippedCount} प्रश्न)`;
        }

        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '';

        currentQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'review-item';

            const userAnsData = userAnswers[q.id];
            let statusText = "";
            let pickedText = "कुछ नहीं चुना";

            if (userAnsData) {
                pickedText = userAnsData.chosen;
                if (userAnsData.isCorrect) {
                    statusText = `<span class="text-success">[सही (Correct)]</span>`;
                } else {
                    statusText = `<span class="text-danger">[गलत (Incorrect)]</span>`;
                }
            } else {
                statusText = `<span class="text-muted">[छोड़ दिया (Skipped)]</span>`;
            }

            div.innerHTML = `
                <div class="review-q">प्रश्न ${idx + 1}: ${q.question} ${statusText}</div>
                <div class="review-ans">आपका विकल्प: <span class="${userAnsData && userAnsData.isCorrect ? 'text-success' : 'text-danger'}">${pickedText}</span></div>
                <div class="review-ans">सही उत्तर: <span class="text-success">${q.correct}</span></div>
            `;
            reviewList.appendChild(div);
        });
    }

    function startRetestMode() {
        const filteredPool = originalQuizData.filter(q => {
            return !userAnswers[q.id] || !userAnswers[q.id].isCorrect;
        });

        if (filteredPool.length > 0) {
            initQuiz(filteredPool);
        }
    }

    function fullRestart() {
        initQuiz(originalQuizData);
    }

    window.onload = function() {
        initQuiz(originalQuizData);
    };
    
    // Handle resizing for proper layout
    window.addEventListener('resize', function() {
        if (document.getElementById('quiz-interface').style.display !== 'none') {
            document.getElementById('quiz-interface').style.display = window.innerWidth >= 768 ? 'grid' : 'block';
        }
    });
</script>

</body>
</html>
