            "East": ["पश्चिम बंगाल", "ओडिशा", "झारखंड", "बिहार", "असम"],
            "West": ["गुजरात", "राजस्थान", "महाराष्ट्र", "गोवा"],
            "Central": ["मध्य प्रदेश", "छत्तीसगढ़", "उत्तर प्रदेश"],
            "NE": ["असम", "अरुणाचल प्रदेश", "मेघालय", "मणिपुर", "मिजोरम", "त्रिपुरा", "नागालैंड", "सिक्किम"]
        };

        let currentSetQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = []; 
        let activeSet = 1;

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function buildSet1() {
            let set = [];
            dData.forEach(dance => {
                let correctOpt = dance.state;
                let distractors = stateZones[dance.zone].filter(s => !dance.state.includes(s));
                if (distractors.length < 3) {
                    distractors = [...distractors, ...stateZones["Central"], ...stateZones["South"]].filter(s => !dance.state.includes(s));
                }
                distractors = shuffleArray([...new Set(distractors)]).slice(0, 3);
                
                let options = [{ text: correctOpt, isCorrect: true }];
                distractors.forEach(d => options.push({ text: d, isCorrect: false }));
                options = shuffleArray(options);

                set.push({
                    question: `लोक नृत्य "${dance.name}" का संबंध मुख्य रूप से किस राज्य/क्षेत्र से है?\n(संकेत: ${dance.desc})`,
                    options: options.map(o => o.text),
                    answer: options.findIndex(o => o.isCorrect),
                    explanation: `सही उत्तर: ${dance.state}।\n${dance.name} - ${dance.desc}`
                });
            });
            return shuffleArray(set);
        }

        function buildSet2() {
            let set = [];
            // 48 सत्य
            dData.forEach(dance => {
                set.push({
                    question: `कथन पर विचार करें:\n"${dance.name} नृत्य का संबंध मुख्य रूप से ${dance.state} से है।"\nक्या यह कथन सत्य है या असत्य?`,
                    options: ["सत्य (True)", "असत्य (False)"],
                    answer: 0,
                    explanation: `यह कथन सत्य है। ${dance.name} मुख्य रूप से ${dance.state} में ही किया जाता है।`
                });
            });

            // 48 असत्य
            dData.forEach(dance => {
                let wrongZoneKeys = Object.keys(stateZones).filter(k => k !== dance.zone);
                let randomZone = wrongZoneKeys[Math.floor(Math.random() * wrongZoneKeys.length)];
                let wrongState = stateZones[randomZone][Math.floor(Math.random() * stateZones[randomZone].length)];
                
                set.push({
                    question: `कथन पर विचार करें:\n"${dance.name} नृत्य का संबंध मुख्य रूप से ${wrongState} से है।"\nक्या यह कथन सत्य है या असत्य?`,
                    options: ["सत्य (True)", "असत्य (False)"],
                    answer: 1,
                    explanation: `यह कथन असत्य है। "${dance.name}" वास्तव में ${dance.state} का नृत्य है, न कि ${wrongState} का।`
                });
            });
            return shuffleArray(set);
        }

        function loadSet(setNumber) {
            activeSet = setNumber;
            document.getElementById('btn-set1').classList.remove('active-set');
            document.getElementById('btn-set2').classList.remove('active-set');
            document.getElementById(`btn-set${setNumber}`).classList.add('active-set');

            currentSetQuestions = (setNumber === 1) ? buildSet1() : buildSet2();
            userAnswers = new Array(currentSetQuestions.length).fill(undefined);
            currentQuestionIndex = 0;
            renderNavPalette();
            displayQuestion(0);
        }

        function shuffleCurrentSet() {
            loadSet(activeSet);
        }

        function displayQuestion(index) {
            currentQuestionIndex = index;
            const q = currentSetQuestions[index];
            
            document.getElementById('q-num').innerText = `प्रश्न ${index + 1} / ${currentSetQuestions.length}  (Set ${activeSet})`;
            document.getElementById('q-text').innerText = q.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            const explanationBox = document.getElementById('explanation');
            explanationBox.style.display = 'none';
            explanationBox.innerText = q.explanation;

            q.options.forEach((optText, optIndex) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = optText;
                
                if (userAnswers[index] !== undefined) {
                    optDiv.classList.add('disabled');
                    if (optIndex === q.answer) optDiv.classList.add('correct');
                } else {
                    optDiv.onclick = () => selectOption(optIndex, optDiv);
                }
                optionsContainer.appendChild(optDiv);
            });

            if (userAnswers[index] !== undefined) {
                explanationBox.style.display = 'block';
            }

            // Next / Prev बटन की स्थिति नियंत्रित करना
            document.getElementById('prev-btn').disabled = (index === 0);
            document.getElementById('next-btn').disabled = (index === currentSetQuestions.length - 1);

            updateNavPaletteActiveState();
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentSetQuestions.length - 1) {
                displayQuestion(currentQuestionIndex + 1);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                displayQuestion(currentQuestionIndex - 1);
            }
        }

        function selectOption(selectedIndex, clickedDiv) {
            const isCorrect = selectedIndex === currentSetQuestions[currentQuestionIndex].answer;
            userAnswers[currentQuestionIndex] = isCorrect;
            
            const options = document.querySelectorAll('.option');
            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === currentSetQuestions[currentQuestionIndex].answer) opt.classList.add('correct');
            });

            if (!isCorrect) clickedDiv.classList.add('wrong');

            document.getElementById('explanation').style.display = 'block';
            renderNavPalette();
        }

        function renderNavPalette() {
            const nav = document.getElementById('nav-palette');
            nav.innerHTML = '';
            
            for (let i = 0; i < currentSetQuestions.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.innerText = i + 1;
                
                if (userAnswers[i] === true) btn.classList.add('correct-nav');
                if (userAnswers[i] === false) btn.classList.add('wrong-nav');
                if (i === currentQuestionIndex) btn.classList.add('active');
                
                btn.onclick = () => displayQuestion(i);
                nav.appendChild(btn);
            }
        }

        function updateNavPaletteActiveState() {
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach((btn, idx) => {
                if (idx === currentQuestionIndex) {
                    btn.classList.add('active');
                    btn.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        window.onload = () => loadSet(1);
    </script>
</body>
</html>
