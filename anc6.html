<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कठिन लोक नृत्य क्विज़ (UPSC स्तर)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn, .action-btn {
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        .back-btn:hover, .action-btn:hover {
            background-color: #1a252f;
        }
        .quiz-container {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-height: 350px;
        }
        .question-number {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            border: 2px solid #bdc3c7;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .option:hover {
            background: #e0e6ed;
        }
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .option.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .option.disabled {
            pointer-events: none;
        }
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .nav-palette {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #bdc3c7;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .nav-btn.active {
            border: 3px solid #34495e;
            transform: scale(1.1);
        }
        .nav-btn.correct-nav { background: #28a745; }
        .nav-btn.wrong-nav { background: #dc3545; }
    </style>
</head>
<body>

    <div class="header">
        <a href="anc.html" class="back-btn">⬅ Back</a>
        <button class="action-btn" onclick="shuffleAndRestart()">🔀 Shuffle & Restart</button>
    </div>

    <div class="quiz-container">
        <div class="question-number" id="q-num">प्रश्न 1 / 10</div>
        <div class="question-text" id="q-text">प्रश्न लोड हो रहा है...</div>
        <div class="options" id="options-container">
            </div>
        <div class="explanation" id="explanation"></div>
    </div>

    <div class="nav-palette" id="nav-palette">
        </div>

    <script>
        // कठिन प्रश्नों का संग्रह
        const originalQuestions = [
            {
                question: "'चेराव' (Cheraw) नृत्य के संदर्भ में कौन सा विकल्प सबसे सटीक है?",
                options: [
                    "यह मेघालय का एक फसल नृत्य है जिसमें ढोल और नगाड़ों का प्रमुख प्रयोग होता है।",
                    "यह मिजोरम का एक पारंपरिक बांस नृत्य है, जिसे अक्सर मेहमानों के स्वागत या अनुष्ठानों में किया जाता है।",
                    "यह नागालैंड का एक युद्ध नृत्य है जिसमें योद्धा तलवार लेकर नृत्य करते हैं।",
                    "यह त्रिपुरा का एक धार्मिक नृत्य है जो रियांग जनजाति द्वारा होजागिरी के साथ किया जाता है।"
                ],
                answer: 1, // Index of correct option
                explanation: "चेराव मिजोरम का बहुत ही प्रसिद्ध पारंपरिक नृत्य है, जिसे 'बांस नृत्य' (Bamboo Dance) भी कहा जाता है। इसमें पुरुष बांस पकड़ते हैं और महिलाएं उनके बीच लयबद्ध तरीके से नृत्य करती हैं।"
            },
            {
                question: "'तेरह ताली' (Tera Taali) नृत्य मुख्य रूप से किस समुदाय द्वारा और किस अवसर पर किया जाता है?",
                options: [
                    "कालबेलिया समुदाय द्वारा फसल कटाई के अवसर पर।",
                    "गरासिया जनजाति द्वारा गणगौर उत्सव पर।",
                    "कामर जनजाति द्वारा बाबा रामदेव जी (रामदेव पीर) की आराधना में।",
                    "भील जनजाति द्वारा होली के अवसर पर।"
                ],
                answer: 2,
                explanation: "तेरह ताली राजस्थान की कामर जनजाति की महिलाओं द्वारा किया जाता है। इसमें शरीर पर 13 मंजीरे बांधे जाते हैं और यह लोक देवता रामदेव पीर की भक्ति में किया जाता है।"
            },
            {
                question: "निम्नलिखित में से कौन सा नृत्य 'बाघ वेशभूषा' (Tiger Costume/Dance) से संबंधित नहीं है?",
                options: [
                    "हुली वेसा (कर्नाटक)",
                    "पुलिकली (केरल)",
                    "बाघा नाचा (ओडिशा)",
                    "सिंही छम (सिक्किम)"
                ],
                answer: 3,
                explanation: "सिंही छम सिक्किम का 'स्नो लायन' (Snow Lion) नृत्य है, यह बाघ से संबंधित नहीं है। जबकि हुली वेसा, पुलिकली और बाघा नाचा तीनों में नर्तक बाघ की तरह रंगकर नृत्य करते हैं।"
            },
            {
                question: "मणिपुर के 'थांग ता' (Thang Ta) और झारखंड/ओडिशा के 'पाइका' (Paika) के बीच मुख्य समानता क्या है?",
                options: [
                    "दोनों केवल महिलाओं द्वारा किए जाने वाले शास्त्रीय नृत्य हैं।",
                    "दोनों पूर्वोत्तर भारत के फसल कटाई से जुड़े लोक नृत्य हैं।",
                    "दोनों मार्शल आर्ट (युद्ध कला) पर आधारित पारंपरिक नृत्य हैं।",
                    "दोनों में भगवान कृष्ण के जीवन की रासलीला को दर्शाया जाता है।"
                ],
                answer: 2,
                explanation: "थांग ता (तलवार और भाला) मणिपुर की एक प्राचीन मार्शल आर्ट है। पाइका भी झारखंड और ओडिशा का एक पारंपरिक युद्ध नृत्य (Martial Dance) है जिसमें ढाल और तलवार का प्रयोग होता है।"
            },
            {
                question: "'छाऊ' (Chau) नृत्य की तीन प्रमुख शैलियों (सरायकेला, मयूरभंज, पुरुलिया) में से किसमें मुखौटे (Mask) का प्रयोग बिल्कुल नहीं किया जाता है?",
                options: [
                    "सरायकेला छाऊ (झारखंड)",
                    "पुरुलिया छाऊ (पश्चिम बंगाल)",
                    "मयूरभंज छाऊ (ओडिशा)",
                    "तीनों शैलियों में मुखौटे का प्रयोग अनिवार्य है।"
                ],
                answer: 2,
                explanation: "छाऊ की मयूरभंज (ओडिशा) शैली में मुखौटे का प्रयोग नहीं होता है। सरायकेला और पुरुलिया छाऊ में जटिल और कलात्मक मुखौटे अनिवार्य होते हैं।"
            },
            {
                question: "'होजागिरी' (Hojagiri) नृत्य के बारे में कौन सा कथन सत्य है?",
                options: [
                    "यह रियांग जनजाति (त्रिपुरा) द्वारा किया जाता है, जिसमें नर्तक सिर पर बोतल और दीपक रखकर शरीर के ऊपरी हिस्से को संतुलित करते हैं।",
                    "यह बोडो जनजाति (असम) का एक आराधना नृत्य है जिसमें बांस का उपयोग होता है।",
                    "इसमें पुरुष नर्तक तलवार और ढाल लेकर युद्ध का प्रदर्शन करते हैं।",
                    "यह केवल पुडुचेरी में 'गारदी' के साथ किया जाने वाला एक अनुष्ठानिक नृत्य है।"
                ],
                answer: 0,
                explanation: "होजागिरी त्रिपुरा की रियांग जनजाति का नृत्य है। इसमें गजब का शारीरिक संतुलन होता है, जहाँ महिलाएं मिट्टी के घड़े या बोतल पर खड़ी होकर सिर पर दीया रखकर नृत्य करती हैं।"
            },
            {
                question: "निम्नलिखित लोक नृत्यों और उनके राज्यों के युग्मों में से कौन सा गलत सुमेलित है?",
                options: [
                    "डलखाई - ओडिशा",
                    "कुम्मी - तमिलनाडु",
                    "चरबा - हिमाचल प्रदेश",
                    "चकियार कुथु - कर्नाटक"
                ],
                answer: 3,
                explanation: "चकियार कुथु केरल का एक पारंपरिक कला रूप है, कर्नाटक का नहीं। डलखाई ओडिशा का, कुम्मी तमिलनाडु/केरल का और चरबा हिमाचल प्रदेश का है।"
            },
            {
                question: "'गोरमारिया' (Gormaria) नृत्य किस राज्य के किस विशिष्ट भौगोलिक/सांस्कृतिक क्षेत्र से संबंधित है?",
                options: [
                    "मध्य प्रदेश का मालवा क्षेत्र",
                    "छत्तीसगढ़ का बस्तर क्षेत्र",
                    "ओडिशा का मयूरभंज क्षेत्र",
                    "झारखंड का छोटानागपुर पठार"
                ],
                answer: 1,
                explanation: "गोरमारिया (या गौर माड़िया) छत्तीसगढ़ के बस्तर क्षेत्र की माड़िया जनजाति द्वारा किया जाने वाला एक प्रसिद्ध नृत्य है। इसमें गौर (एक जंगली भैंसा) के सींगों वाला मुकुट पहना जाता है।"
            },
            {
                question: "'जवारा' (Jawara) और 'मटकी' (Matki) लोक नृत्य मुख्य रूप से किस क्षेत्र की सांस्कृतिक पहचान हैं?",
                options: [
                    "क्रमशः मारवाड़ और मेवाड़ (राजस्थान)",
                    "क्रमशः विदर्भ और मराठवाड़ा (महाराष्ट्र)",
                    "क्रमशः अवध और पूर्वांचल (उत्तर प्रदेश)",
                    "क्रमशः बुंदेलखंड और मालवा (मध्य प्रदेश)"
                ],
                answer: 3,
                explanation: "जवारा मध्य प्रदेश के बुंदेलखंड क्षेत्र का एक फसल नृत्य है, जबकि मटकी मध्य प्रदेश के मालवा क्षेत्र का एक पारंपरिक नृत्य है जो महिलाओं द्वारा मटके सिर पर रखकर किया जाता है।"
            },
            {
                question: "'फुगड़ी' (Fugdi) और 'तरंगमेल' (Tarangmel) लोक नृत्यों का संबंध मुख्य रूप से भारत के किस राज्य से है?",
                options: [
                    "गोवा",
                    "महाराष्ट्र",
                    "कर्नाटक",
                    "गुजरात"
                ],
                answer: 0,
                explanation: "फुगड़ी और तरंगमेल दोनों गोवा के बहुत लोकप्रिय नृत्य हैं। फुगड़ी आमतौर पर कोंकणी महिलाओं द्वारा गणेश चतुर्थी और अन्य त्योहारों के दौरान किया जाता है।"
            }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = []; // Stores true (correct), false (wrong), or undefined

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function shuffleAndRestart() {
            // Shuffle questions and their internal options
            questions = shuffleArray(originalQuestions).map(q => {
                let optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.answer }));
                let shuffledOptions = shuffleArray(optionsWithIndex);
                
                return {
                    question: q.question,
                    options: shuffledOptions.map(o => o.text),
                    answer: shuffledOptions.findIndex(o => o.isCorrect),
                    explanation: q.explanation
                };
            });
            
            userAnswers = new Array(questions.length).fill(undefined);
            currentQuestionIndex = 0;
            renderNavPalette();
            loadQuestion(0);
        }

        function loadQuestion(index) {
            currentQuestionIndex = index;
            const q = questions[index];
            
            document.getElementById('q-num').innerText = `प्रश्न ${index + 1} / ${questions.length}`;
            document.getElementById('q-text').innerText = q.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            const explanationBox = document.getElementById('explanation');
            explanationBox.style.display = 'none';
            explanationBox.innerText = q.explanation;

            q.options.forEach((optText, optIndex) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = optText;
                
                // If already answered, show correct/wrong state
                if (userAnswers[index] !== undefined) {
                    optDiv.classList.add('disabled');
                    if (optIndex === q.answer) {
                        optDiv.classList.add('correct');
                    } else if (optDiv.dataset.selected === 'true') {
                         // We can't strictly track which wrong option was clicked easily without expanding state, 
                         // so we just highlight the correct one and show explanation if answered.
                    }
                } else {
                    optDiv.onclick = () => selectOption(optIndex, optDiv);
                }
                
                optionsContainer.appendChild(optDiv);
            });

            // If already answered, show explanation
            if (userAnswers[index] !== undefined) {
                explanationBox.style.display = 'block';
            }

            updateNavPaletteActiveState();
        }

        function selectOption(selectedIndex, clickedDiv) {
            const isCorrect = selectedIndex === questions[currentQuestionIndex].answer;
            userAnswers[currentQuestionIndex] = isCorrect;
            
            const options = document.querySelectorAll('.option');
            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === questions[currentQuestionIndex].answer) {
                    opt.classList.add('correct');
                }
            });

            if (!isCorrect) {
                clickedDiv.classList.add('wrong');
            }

            document.getElementById('explanation').style.display = 'block';
            renderNavPalette(); // Update colors on palette
        }

        function renderNavPalette() {
            const nav = document.getElementById('nav-palette');
            nav.innerHTML = '';
            
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.innerText = i + 1;
                
                if (userAnswers[i] === true) btn.classList.add('correct-nav');
                if (userAnswers[i] === false) btn.classList.add('wrong-nav');
                if (i === currentQuestionIndex) btn.classList.add('active');
                
                btn.onclick = () => loadQuestion(i);
                nav.appendChild(btn);
            }
        }

        function updateNavPaletteActiveState() {
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach((btn, idx) => {
                if (idx === currentQuestionIndex) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Initialize quiz on load
        shuffleAndRestart();
    </script>
</body>
</html>
