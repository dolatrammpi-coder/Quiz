<!DOCTYPE html>

<head>

        }
        .menu-screen, .quiz-screen, .result-screen {

        }
        .active {
            display: block;
        }
        .btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #d35400;
        }

            display: block;
            margin: 15px auto;
        }

            padding: 20px;

            border-radius: 8px;

        }
        .question-text {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .options-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-label {
            background-color: #fff;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #ccc;

            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }
        .option-label:hover {
            background-color: #f1f8ff;
            border-color: #3498db;
        }

            margin-right: 10px;
        }
        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 2px solid #ecf0f1;
            padding-top: 15px;

            color: #7f8c8d;

<div class="container">

        <p style="text-align: center; font-size: 1.1rem; color: #555;">(34 तथ्य = 68 प्रश्न)</p>

            <div id="feedbackText" class="correct-ans"></div>
            <div id="referenceText" class="reference-text" style="display:none;"></div>
        </div>
        <div class="quiz-footer">
            <span id="progressText" class="progress"></span>
            <button class="btn" id="nextBtn" onclick="checkAndNext()">चेक करें ➡</button>
        </div>
    </div>

    <div id="resultScreen" class="result-screen">
        <h1>परिणाम</h1>
        <h2 id="scoreText">Your Score: 0</h2>
        <button class="btn btn-start" onclick="location.reload()">होम पर वापस जाएँ</button>
    </div>
</div>

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let isChecked = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startTest(mode) {
        if (mode === 'all') {
            currentQuestions = shuffleArray([...questionBank]);
        } else if (mode === 'saree') {
            currentQuestions = shuffleArray(questionBank.filter(q => q.type === 'saree'));
        } else if (mode === 'craft') {
            currentQuestions = shuffleArray(questionBank.filter(q => q.type === 'craft'));
        }
        
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('quizTitle').innerText = `Test: ${currentQuestions.length} MCQs`;
        
        document.getElementById('menuScreen').classList.remove('active');
        document.getElementById('quizScreen').classList.add('active');
        
        loadQuestion();
    }

    function loadQuestion() {
        isChecked = false;
        document.getElementById('feedbackText').style.display = 'none';
        document.getElementById('referenceText').style.display = 'none';
        document.getElementById('nextBtn').innerText = "चेक करें ➡";

        const qText = document.getElementById('questionText');
        const optionsCont = document.getElementById('optionsContainer');
        const progressText = document.getElementById('progressText');
        const catBadge = document.getElementById('catBadge');
        
        let currentQ = currentQuestions[currentQuestionIndex];
        
        progressText.innerText = `प्रश्न: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        catBadge.innerText = currentQ.category;
        
        if(currentQ.category.includes('Place')) {
            catBadge.style.backgroundColor = '#e67e22'; // Orange for Place
        } else {
            catBadge.style.backgroundColor = '#8e44ad'; // Purple for Feature
        }

        qText.innerText = currentQ.question;
        optionsCont.innerHTML = "";
        
        currentQ.options.forEach((opt, index) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            label.id = 'optLabel_' + index;
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'quizOption';
            radio.value = index;
            
            label.appendChild(radio);
            label.appendChild(document.createTextNode(opt));
            optionsCont.appendChild(label);
        });
    }

    function checkAndNext() {
        const selectedOption = document.querySelector('input[name="quizOption"]:checked');
        let currentQ = currentQuestions[currentQuestionIndex];
        let feedback = document.getElementById('feedbackText');
        let refText = document.getElementById('referenceText');

        if (!isChecked) {
            if (!selectedOption) {
                alert("कृपया पहले एक विकल्प चुनें!");
                return;
            }

            isChecked = true;
            let selectedVal = parseInt(selectedOption.value);
            let correctVal = currentQ.answer;

            document.getElementById('optLabel_' + correctVal).style.backgroundColor = '#d4efdf';
            document.getElementById('optLabel_' + correctVal).style.borderColor = '#27ae60';

            if (selectedVal === correctVal) {
                score++;
                feedback.innerText = "✅ सही उत्तर!";
                feedback.className = "correct-ans";
            } else {
                document.getElementById('optLabel_' + selectedVal).style.backgroundColor = '#fadbd8';
                document.getElementById('optLabel_' + selectedVal).style.borderColor = '#e74c3c';
                feedback.innerText = "❌ गलत उत्तर! सही उत्तर: " + currentQ.options[correctVal];
                feedback.className = "wrong-ans";
            }
            
            refText.innerText = "(संदर्भ: " + currentQ.ref + ")";
            feedback.style.display = 'block';
            refText.style.display = 'block';
            document.getElementById('nextBtn').innerText = "अगला प्रश्न ➡";
            
            document.querySelectorAll('input[name="quizOption"]').forEach(r => r.disabled = true);
            
        } else {
            currentQuestionIndex++;
            if (currentQuestionIndex >= currentQuestions.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }
    }

    function showResult() {
        document.getElementById('quizScreen').classList.remove('active');
        document.getElementById('resultScreen').classList.add('active');
        document.getElementById('scoreText').innerText = `आपका कुल स्कोर: ${score} / ${currentQuestions.length}`;
    }
